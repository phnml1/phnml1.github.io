pt src="/_next/static/chunks/pages/%5B...detail%5D-462eb16d74bf0376.js" defer="" crossorigin=""></script><script src="/_next/static/sHwiCpr0I6yryhs4L_oOJ/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/sHwiCpr0I6yryhs4L_oOJ/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"><script>!function(){try{var d=document.documentElement,c=d.classList;c.remove('light','dark');var e=localStorage.getItem('theme');if('system'===e||(!e&&true)){var t='(prefers-color-scheme: dark)',m=window.matchMedia(t);if(m.media!==t||m.matches){d.style.colorScheme = 'dark';c.add('dark')}else{d.style.colorScheme = 'light';c.add('light')}}else if(e){c.add(e|| '')}if(e==='light'||e==='dark')d.style.colorScheme=e}catch(e){}}()</script></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"post":{"slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 구현기_4","title":"React Native 칸반보드 드래그 앤 드롭 구현기 (4)","date":"2026-02-08T22:00:00.000Z","image":"index.png","summary":"드래그 중 화면 경계에서 자동으로 스크롤되는 기능을 requestAnimationFrame 기반으로 구현합니다.","tags":["react native","드래그 앤 드롭","자동 스크롤","requestAnimationFrame","칸반보드"],"content":"\r\n# React Native 칸반보드 드래그 앤 드롭 구현기(4)\r\n\r\n## 서론\r\n\r\n3편에서는 Portal 패턴으로 Floating Card를 최상위에 렌더링하여 드래그 앤 드롭의 시각적 완성도를 높이는 방법을 다뤘다.\r\n\r\n이번 편에서는 드래그 앤 드롭의 **사용성**을 크게 좌우하는 기능을 다룬다:\r\n\r\n- **자동 스크롤** - 화면 경계에서 자동으로 스크롤되게 하기\r\n\r\n---\r\n\r\n## 왜 자동 스크롤이 필요한가?\r\n\r\n칸반보드에 Day가 많아지면 세로 스크롤이 생긴다. 이때 문제가 하나 생기는데:\r\n\r\n\u003e 카드를 드래그해서 Day 3에서 Day 7로 옮기고 싶은데... 화면에 Day 7이 안 보인다?\r\n\r\n손가락을 떼면 드래그가 끝나버리니, 드래그를 유지하면서 스크롤할 방법이 없다.\r\n\r\n```\r\n┌──────────────────────────────┐\r\n│  Day 1                       │\r\n│  ┌──────┐                    │\r\n│  │Card A│ ← 이걸 드래그 중    │\r\n│  └──────┘                    │\r\n│  Day 2                       │\r\n│  ┌──────┐                    │\r\n│  │Card B│                    │\r\n│  └──────┘                    │\r\n│  Day 3                       │\r\n│  ┌──────┐                    │  ← 화면 하단 경계\r\n├──│Card C│────────────────────┤\r\n│  └──────┘                    │\r\n│  Day 4  (화면 밖)             │  ← 여기로 옮기고 싶은데\r\n│  Day 5  (화면 밖)             │    스크롤이 안 된다!\r\n│  ...                         │\r\n└──────────────────────────────┘\r\n```\r\n\r\n**해결책:** 드래그 중 손가락이 화면 경계 근처에 오면 자동으로 스크롤해주면 된다!\r\n\r\n---\r\n\r\n## 자동 스크롤의 핵심 개념: 스크롤 존\r\n\r\n화면의 위아래에 **스크롤 존(Scroll Zone)**이라는 가상의 영역을 만든다. 드래그 중 손가락이 이 영역에 들어오면 자동 스크롤을 시작하고, 벗어나면 멈춘다.\r\n\r\n```\r\n┌──────────────────────────────┐\r\n│ ▒▒▒▒▒▒ 상단 스크롤 존 ▒▒▒▒▒▒ │ ← threshold (40px)\r\n│  ↑ 여기로 오면 위로 스크롤    │\r\n├──────────────────────────────┤\r\n│                              │\r\n│                              │\r\n│     일반 영역                 │ ← 스크롤 안 함\r\n│     (드래그만 처리)            │\r\n│                              │\r\n│                              │\r\n├──────────────────────────────┤\r\n│  ↓ 여기로 오면 아래로 스크롤   │\r\n│ ▒▒▒▒▒▒ 하단 스크롤 존 ▒▒▒▒▒▒ │ ← threshold (40px)\r\n└──────────────────────────────┘\r\n```\r\n\r\n이 개념을 코드로 구현한 것이 `useAutoScroll` 훅이다.\r\n\r\n---\r\n\r\n## useAutoScroll 훅 구현\r\n\r\n### 설정값과 상태\r\n\r\n```tsx\r\ninterface UseAutoScrollOptions {\r\n  scrollSpeed?: number;  // 한 프레임당 스크롤할 픽셀 수\r\n  threshold?: number;    // 스크롤 존의 크기 (px)\r\n}\r\n\r\nexport const useAutoScroll = (options: UseAutoScrollOptions = {}) =\u003e {\r\n  const { scrollSpeed = 15, threshold = 40 } = options;\r\n\r\n  const scrollViewRef = useRef\u003cScrollView\u003e(null);\r\n  const scrollOffsetRef = useRef(0);              // 현재 스크롤 위치\r\n  const isAutoScrollingRef = useRef(false);        // 자동 스크롤 중인지\r\n  const autoScrollDirectionRef = useRef\u003c'up' | 'down' | null\u003e(null);\r\n  const autoScrollFrameId = useRef\u003cnumber | null\u003e(null);  // rAF ID (정리용)\r\n\r\n  // ...\r\n};\r\n```\r\n\r\n두 가지 설정값이 있다:\r\n- **scrollSpeed (기본값: 15)** - 프레임당 스크롤할 픽셀 수. 값이 클수록 빠르게 스크롤된다.\r\n- **threshold (기본값: 40)** - 스크롤 존의 크기(px). 화면 위/아래에서 이 범위 안에 손가락이 들어오면 스크롤이 시작된다.\r\n\r\n모든 상태를 `useRef`로 관리하는 이유가 있다. `useState`를 쓰면 매 프레임마다 리렌더링이 발생하는데, 자동 스크롤은 requestAnimationFrame으로 **매 프레임**(약 16ms 간격)마다 실행되기 때문에 리렌더링이 발생하면 성능이 급격히 떨어진다.\r\n\r\n### 스크롤 오프셋 추적\r\n\r\n자동 스크롤을 구현하려면 먼저 **현재 스크롤 위치**를 항상 알고 있어야 한다.\r\n\r\n```tsx\r\nconst handleScroll = useCallback((event: ScrollEvent) =\u003e {\r\n  scrollOffsetRef.current = event.nativeEvent.contentOffset.y;\r\n}, []);\r\n```\r\n\r\nScrollView의 `onScroll` 이벤트에 연결해서, 스크롤이 발생할 때마다 현재 오프셋을 ref에 저장한다. 이 값은 자동 스크롤 시 \"어디서부터 스크롤할지\"의 기준점이 된다.\r\n\r\n```tsx\r\n// TravelKanban/index.tsx\r\n\u003cScrollView\r\n  ref={scrollViewRef}\r\n  onScroll={handleScroll}\r\n  scrollEventThrottle={16}  // 16ms 간격으로 이벤트 발생 (60fps)\r\n\u003e\r\n```\r\n\r\n`scrollEventThrottle={16}`을 설정해야 스크롤 이벤트가 충분히 자주 발생한다. 이걸 빠뜨리면 스크롤 위치가 부정확해져서 자동 스크롤이 뚝뚝 끊기게 된다.\r\n\r\n---\r\n\r\n### 자동 스크롤 시작: requestAnimationFrame 루프\r\n\r\n자동 스크롤의 핵심은 **requestAnimationFrame(rAF) 루프**다.\r\n\r\n```tsx\r\nconst startAutoScroll = useCallback((direction: 'up' | 'down') =\u003e {\r\n  // 이미 같은 방향으로 스크롤 중이면 무시\r\n  if (isAutoScrollingRef.current \u0026\u0026 autoScrollDirectionRef.current === direction) {\r\n    return;\r\n  }\r\n\r\n  // 기존 스크롤 중지 후 새로 시작\r\n  stopAutoScroll();\r\n  isAutoScrollingRef.current = true;\r\n  autoScrollDirectionRef.current = direction;\r\n\r\n  const scroll = () =\u003e {\r\n    // 스크롤이 중지되었으면 루프 탈출\r\n    if (!isAutoScrollingRef.current) return;\r\n\r\n    const currentOffset = scrollOffsetRef.current;\r\n    const newOffset = direction === 'up'\r\n      ? Math.max(0, currentOffset - scrollSpeed)   // 위로: 오프셋 감소\r\n      : currentOffset + scrollSpeed;                // 아래로: 오프셋 증가\r\n\r\n    // 맨 위에 도달하면 스크롤 중지\r\n    if (direction === 'up' \u0026\u0026 newOffset \u003c= 0) {\r\n      stopAutoScroll();\r\n      return;\r\n    }\r\n\r\n    // 실제 스크롤 실행\r\n    if (scrollViewRef.current) {\r\n      scrollViewRef.current.scrollTo({\r\n        y: newOffset,\r\n        animated: false  // ⚠️ 중요: false여야 즉시 이동\r\n      });\r\n    }\r\n\r\n    // 다음 프레임에서 다시 실행\r\n    autoScrollFrameId.current = requestAnimationFrame(scroll);\r\n  };\r\n\r\n  // 루프 시작\r\n  autoScrollFrameId.current = requestAnimationFrame(scroll);\r\n}, [scrollSpeed, stopAutoScroll]);\r\n```\r\n\r\n#### 왜 requestAnimationFrame인가?\r\n\r\n자동 스크롤을 구현하는 방법은 여러 가지가 있다:\r\n\r\n| 방법 | 장점 | 단점 |\r\n|:------|:------|:------|\r\n| `setInterval` | 구현 간단 | 프레임과 무관하게 실행, 끊김 발생 |\r\n| `Animated.timing` | Native Driver 사용 가능 | 스크롤 위치를 직접 제어하기 어려움 |\r\n| `requestAnimationFrame` | 화면 주사율에 맞춰 실행, 부드러움 | 직접 루프를 관리해야 함 |\r\n\r\n**requestAnimationFrame(rAF)**은 브라우저/런타임이 다음 화면을 그리기 직전에 콜백을 실행한다. 즉, 화면 주사율(보통 60fps)에 정확히 맞춰서 스크롤이 실행되므로 가장 부드러운 결과를 얻을 수 있다.\r\n\r\n#### animated: false가 중요한 이유\r\n\r\n```tsx\r\nscrollViewRef.current.scrollTo({\r\n  y: newOffset,\r\n  animated: false  // 이거!\r\n});\r\n```\r\n\r\n`animated: true`로 하면 ScrollView가 자체적으로 스크롤 애니메이션을 실행하는데, 이게 rAF 루프와 겹치면 **서로 간섭**하면서 스크롤이 덜덜 떨리게 된다. `animated: false`로 즉시 이동시키고, rAF 루프가 부드러움을 담당하는 게 올바른 역할 분배다.\r\n\r\n#### 재귀적 rAF 루프 구조\r\n\r\n```\r\nFrame 1: scroll() 실행 → scrollTo() → rAF(scroll) 예약\r\nFrame 2: scroll() 실행 → scrollTo() → rAF(scroll) 예약\r\nFrame 3: scroll() 실행 → scrollTo() → rAF(scroll) 예약\r\n  ...\r\nFrame N: scroll() 실행 → isAutoScrolling이 false → 루프 종료\r\n```\r\n\r\n`scroll` 함수가 자기 자신을 다음 프레임에 예약하는 **재귀적 패턴**이다. 멈출 때는 `isAutoScrollingRef.current`를 `false`로 바꾸면 다음 프레임에서 자연스럽게 루프가 끊긴다.\r\n\r\n---\r\n\r\n### 자동 스크롤 중지\r\n\r\n```tsx\r\nconst stopAutoScroll = useCallback(() =\u003e {\r\n  if (autoScrollFrameId.current) {\r\n    cancelAnimationFrame(autoScrollFrameId.current);\r\n    autoScrollFrameId.current = null;\r\n  }\r\n  isAutoScrollingRef.current = false;\r\n  autoScrollDirectionRef.current = null;\r\n}, []);\r\n```\r\n\r\n중지는 두 가지를 동시에 한다:\r\n1. **cancelAnimationFrame** - 다음 프레임에 예약된 콜백을 취소\r\n2. **ref 초기화** - 재귀 루프 내부에서도 체크하므로 확실하게 중지됨\r\n\r\n왜 두 가지를 모두 해야 할까? `cancelAnimationFrame`만 하면 이미 실행 중인 `scroll()` 함수가 끝나기 전에 새 rAF를 예약할 수 있다. ref도 함께 초기화해야 `scroll()` 내부의 `if (!isAutoScrollingRef.current) return;` 체크에서 확실히 멈춘다.\r\n\r\n---\r\n\r\n### 드래그 위치에 따른 스크롤 판단\r\n\r\n이제 핵심 로직이다. 드래그 중 손가락 위치를 받아서 **스크롤 존에 있는지 판단**하는 함수:\r\n\r\n```tsx\r\nconst handleAutoScrollForDrag = useCallback((\r\n  cursorY: number,                   // 손가락의 화면 Y 좌표\r\n  scrollViewLayout: ScrollViewLayout  // ScrollView의 위치/크기\r\n) =\u003e {\r\n  const scrollViewTop = scrollViewLayout.y;\r\n  const scrollViewBottom = scrollViewLayout.y + scrollViewLayout.height;\r\n\r\n  // 상단 스크롤 존에 있는가?\r\n  const isInTopScrollZone = cursorY \u003c= scrollViewTop + threshold;\r\n  // 하단 스크롤 존에 있는가?\r\n  const isInBottomScrollZone = cursorY \u003e= scrollViewBottom - threshold;\r\n\r\n  if (isInTopScrollZone \u0026\u0026 scrollOffsetRef.current \u003e 0) {\r\n    // 상단 스크롤 존 + 아직 위로 스크롤할 여유가 있으면\r\n    if (!isAutoScrollingRef.current || autoScrollDirectionRef.current !== 'up') {\r\n      startAutoScroll('up');\r\n    }\r\n  } else if (isInBottomScrollZone) {\r\n    // 하단 스크롤 존이면\r\n    if (!isAutoScrollingRef.current || autoScrollDirectionRef.current !== 'down') {\r\n      startAutoScroll('down');\r\n    }\r\n  } else {\r\n    // 스크롤 존 밖이면 → 중지\r\n    if (isAutoScrollingRef.current) {\r\n      stopAutoScroll();\r\n    }\r\n  }\r\n}, [threshold, startAutoScroll, stopAutoScroll]);\r\n```\r\n\r\n시각적으로 표현하면:\r\n\r\n```\r\n                  scrollViewTop (= scrollViewLayout.y)\r\n                        │\r\n┌───────────────────────▼───────────────────────────┐\r\n│ ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ │\r\n│ ▒  상단 스크롤 존 (scrollViewTop + threshold)   ▒ │\r\n│ ▒  cursorY ≤ 여기면 → startAutoScroll('up')     ▒ │\r\n│ ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ │\r\n│                                                   │\r\n│              일반 영역                             │\r\n│              → stopAutoScroll()                   │\r\n│                                                   │\r\n│ ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ │\r\n│ ▒  하단 스크롤 존 (scrollViewBottom - threshold) ▒ │\r\n│ ▒  cursorY ≥ 여기면 → startAutoScroll('down')   ▒ │\r\n│ ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ │\r\n└───────────────────────▲───────────────────────────┘\r\n                        │\r\n                  scrollViewBottom\r\n```\r\n\r\n#### 중복 실행 방지\r\n\r\n```tsx\r\nif (!isAutoScrollingRef.current || autoScrollDirectionRef.current !== 'up') {\r\n  startAutoScroll('up');\r\n}\r\n```\r\n\r\n이 조건이 없으면 `handleAutoScrollForDrag`가 호출될 때마다 (매 프레임마다!) `startAutoScroll`이 호출되어 rAF 루프가 무한히 생성된다. **이미 같은 방향으로 스크롤 중이면 무시**하는 것이 핵심이다.\r\n\r\n---\r\n\r\n## 드래그 시스템과의 통합\r\n\r\n`useAutoScroll` 훅은 단독으로 동작하지 않는다. `TravelKanban/index.tsx`에서 드래그 이벤트와 연결된다.\r\n\r\n```tsx\r\n// TravelKanban/index.tsx\r\n\r\nconst handleEnhancedDragMove = useCallback((\r\n  x: number,\r\n  y: number,\r\n  gestureState: GestureState,\r\n  evt: GestureResponderEvent,\r\n  initialPosition: { x: number; y: number }\r\n) =\u003e {\r\n  // 1. 자동 스크롤 처리\r\n  if (scrollViewLayoutRef.current.height) {\r\n    handleAutoScrollForDrag(y, scrollViewLayoutRef.current);\r\n  }\r\n\r\n  // 2. 드래그 이동 처리 (Floating Card 위치 업데이트)\r\n  handleDragMove(x, y, gestureState, evt, initialPosition);\r\n}, [handleAutoScrollForDrag, handleDragMove]);\r\n```\r\n\r\n`handleEnhancedDragMove`가 **자동 스크롤**과 **Floating Card 이동**을 하나로 묶는 역할을 한다. `PanResponder`의 `onPanResponderMove`에서 매 프레임마다 호출되므로, 손가락이 움직일 때마다 스크롤 존 진입 여부를 자연스럽게 체크할 수 있다.\r\n\r\n### 전체 흐름\r\n\r\n```\r\n┌────────────────────────────────────────────────────────────────────┐\r\n│                    자동 스크롤 전체 흐름                              │\r\n├────────────────────────────────────────────────────────────────────┤\r\n│                                                                    │\r\n│   User: 카드를 드래그하면서 화면 하단으로 이동                        │\r\n│                                                                    │\r\n│   ① PanResponder.onMove                                           │\r\n│   │  └→ pageY = 750 (화면 하단 근처)                               │\r\n│   │                                                                │\r\n│   ② handleEnhancedDragMove(x, 750, ...)                           │\r\n│   │  ├→ handleAutoScrollForDrag(750, scrollViewLayout)             │\r\n│   │  │   └→ 750 \u003e= scrollViewBottom - 40?                         │\r\n│   │  │       └→ YES → startAutoScroll('down')                     │\r\n│   │  │                                                            │\r\n│   │  └→ handleDragMove(x, 750, ...)                               │\r\n│   │      └→ floatingPan.setValue({ x: dx, y: dy })                │\r\n│   │                                                                │\r\n│   ③ rAF 루프 시작                                                  │\r\n│   │  Frame 1: scrollTo({ y: offset + 15 }) → rAF(scroll)         │\r\n│   │  Frame 2: scrollTo({ y: offset + 30 }) → rAF(scroll)         │\r\n│   │  Frame 3: scrollTo({ y: offset + 45 }) → rAF(scroll)         │\r\n│   │  ...                                                           │\r\n│   │                                                                │\r\n│   ④ User: 손가락을 다시 화면 중앙으로 이동                            │\r\n│   │  └→ handleAutoScrollForDrag(400, scrollViewLayout)             │\r\n│   │      └→ 스크롤 존 밖 → stopAutoScroll()                       │\r\n│   │                                                                │\r\n│   ⑤ rAF 루프 종료                                                  │\r\n│      └→ cancelAnimationFrame + ref 초기화                          │\r\n│                                                                    │\r\n└────────────────────────────────────────────────────────────────────┘\r\n```\r\n\r\n### 드래그 종료 시 자동 스크롤 정리\r\n\r\n한 가지 더 중요한 포인트가 있다. 드래그가 끝나면 자동 스크롤도 반드시 중지해야 한다.\r\n\r\n```tsx\r\n// useDragDrop.ts - handleDragEnd 내부\r\nconst handleDragEnd = useCallback((y, dayData, setDayData) =\u003e {\r\n  stopAutoScroll();  // ← 드래그 종료 시 가장 먼저!\r\n  // ... 드롭 처리 ...\r\n}, [/* deps */]);\r\n```\r\n\r\n이걸 빠뜨리면? 손가락을 떼도 스크롤이 계속 돌아간다...! rAF 루프는 PanResponder와 독립적으로 동작하기 때문에, 명시적으로 멈춰줘야 한다.\r\n\r\n---\r\n\r\n## 구현하면서 만났던 함정들\r\n\r\n### 1. scrollEventThrottle 누락\r\n\r\n```tsx\r\n// ❌ scrollEventThrottle 없이\r\n\u003cScrollView onScroll={handleScroll}\u003e\r\n\r\n// ✅ scrollEventThrottle 설정\r\n\u003cScrollView onScroll={handleScroll} scrollEventThrottle={16}\u003e\r\n```\r\n\r\n`scrollEventThrottle`을 설정하지 않으면 iOS에서 스크롤 이벤트가 매우 드물게 발생한다. 자동 스크롤로 `scrollTo`를 호출해도 `onScroll` 이벤트가 충분히 빠르게 오지 않아서 `scrollOffsetRef`가 업데이트되지 않고, 다음 스크롤 계산이 틀어진다.\r\n\r\n### 2. animated: true로 인한 떨림\r\n\r\n처음에는 자연스럽게 보이라고 `animated: true`로 했었다.\r\n\r\n```tsx\r\n// ❌ rAF 루프 안에서 animated: true\r\nscrollViewRef.current.scrollTo({ y: newOffset, animated: true });\r\n```\r\n\r\n하지만 ScrollView의 내장 애니메이션과 rAF 루프가 경쟁하면서 스크롤이 앞뒤로 왔다 갔다 하는 진동 현상이 발생했다. 각자의 역할을 명확히 분리해야 한다:\r\n- **rAF 루프** → 매 프레임 새 위치 계산\r\n- **scrollTo** → 계산된 위치로 즉시 이동 (animated: false)\r\n\r\n### 3. 상태 관리를 useState로 했다가 성능 문제\r\n\r\n처음에는 `isAutoScrolling`을 `useState`로 관리했다.\r\n\r\n```tsx\r\n// ❌ 매 프레임마다 리렌더링 발생\r\nconst [isAutoScrolling, setIsAutoScrolling] = useState(false);\r\n```\r\n\r\nrAF 루프 안에서 state를 변경하면 매 프레임마다 리렌더링이 발생한다. 60fps에서 리렌더링이 겹치면 프레임 드롭이 발생하고, 드래그 중인 Floating Card의 움직임까지 버벅거리게 된다.\r\n\r\n```tsx\r\n// ✅ ref로 관리 → 리렌더링 없이 값만 업데이트\r\nconst isAutoScrollingRef = useRef(false);\r\n```\r\n\r\n자동 스크롤의 상태는 **화면에 직접 표시되는 값이 아니다.** 그래서 `useRef`로 관리하는 것이 정답이다.\r\n\r\n### 4. 방향 전환 시 이전 루프가 남아있는 문제\r\n\r\n```tsx\r\n// ❌ 방향 전환 시 이전 루프를 정리하지 않으면\r\nstartAutoScroll('down');\r\n// ... 손가락이 위로 이동 ...\r\nstartAutoScroll('up');\r\n// → 두 개의 rAF 루프가 동시에 실행!\r\n// → 아래로 15px, 위로 15px → 제자리에서 떨림\r\n```\r\n\r\n`startAutoScroll` 시작 시 `stopAutoScroll()`을 먼저 호출하는 이유가 바로 이것이다.\r\n\r\n```tsx\r\nconst startAutoScroll = useCallback((direction: 'up' | 'down') =\u003e {\r\n  // 이미 같은 방향이면 무시\r\n  if (isAutoScrollingRef.current \u0026\u0026 autoScrollDirectionRef.current === direction) {\r\n    return;\r\n  }\r\n\r\n  stopAutoScroll();  // ← 기존 루프 확실히 정리\r\n  // ... 새 루프 시작 ...\r\n}, [scrollSpeed, stopAutoScroll]);\r\n```\r\n\r\n## 마치며\r\n\r\n자동 스크롤은 구현 자체는 단순해 보이지만, 실제로 부드럽게 동작하게 만들려면 세심한 주의가 필요하다.\r\n\r\n핵심 포인트를 정리하면:\r\n\r\n- **스크롤 존**: 화면 경계에 가상의 영역을 만들어 스크롤 트리거로 사용\r\n- **requestAnimationFrame**: 화면 주사율에 맞춘 부드러운 스크롤 구현\r\n- **ref 기반 상태 관리**: 매 프레임 업데이트에도 리렌더링 없이 60fps 유지\r\n- **animated: false**: rAF 루프와 ScrollView 내장 애니메이션의 충돌 방지\r\n\r\n이번 편까지 해서 드래그 앤 드롭의 핵심 기능들을 모두 다뤘다:\r\n1. [1편] PanResponder와 절대 좌표 시스템\r\n2. [2편] 레이아웃 측정과 드롭 타겟 계산\r\n3. [3편] Portal 패턴의 Floating Card\r\n4. [4편] requestAnimationFrame 기반 자동 스크롤\r\n\r\n라이브러리 없이 직접 구현하면서 정말 많은 것을 배울 수 있었다. 특히 React Native에서 성능을 신경 쓰면서 인터랙션을 구현하는 방법에 대해 많이 깨달았던 것 같다.\r\n\r\n글을 읽어주셔서 감사합니다!\r\n","readingMinutes":18},"category":"React Native","prevData":{"title":"React Native 칸반보드 드래그 앤 드롭 구현기 (3)","slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 구현기_3","summary":"Floating Card를 Portal 패턴으로 구현하여 드래그 앤 드롭의 시각적 완성도를 높이는 방법을 다룹니다."},"nextData":{"title":"React Native 칸반보드 드래그 앤 드롭 성능 최적화 (1) - 문제 인식과 측정","slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 성능 최적화 (1) - 문제 인식과 측정","summary":"칸반보드 드래그 앤 드롭에서 드래그 중에 불필요한 리렌더링 및 버벅임이 발생하는 문제를 수치로 측정하고 원인을 분석합니다."}},"__N_SSG":true},"page":"/[...detail]","query":{"detail":["posts","React Native","React Native 칸반보드 드래그 앤 드롭 구현기_4"]},"buildId":"sHwiCpr0I6yryhs4L_oOJ","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
