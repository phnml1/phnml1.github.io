<!DOCTYPE html><html lang="en"><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width"/><meta name="next-head-count" content="2"/><link rel="preload" href="/_next/static/media/d2c1ffb734f61872-s.p.woff2" as="font" type="font/woff2" crossorigin="anonymous" data-next-font="size-adjust"/><link rel="preload" href="/_next/static/media/e807dee2426166ad-s.p.woff2" as="font" type="font/woff2" crossorigin="anonymous" data-next-font="size-adjust"/><link rel="preload" href="/_next/static/media/21e61e33ca2324ab-s.p.woff2" as="font" type="font/woff2" crossorigin="anonymous" data-next-font="size-adjust"/><link rel="preload" href="/_next/static/media/a5f02fb6311fcdbc-s.p.woff2" as="font" type="font/woff2" crossorigin="anonymous" data-next-font="size-adjust"/><link rel="preload" href="/_next/static/media/61eb19e8a04bc1be-s.p.woff2" as="font" type="font/woff2" crossorigin="anonymous" data-next-font="size-adjust"/><link rel="preload" href="/_next/static/media/e1fc1184cf147048-s.p.woff2" as="font" type="font/woff2" crossorigin="anonymous" data-next-font="size-adjust"/><link rel="preload" href="/_next/static/css/559b4a37e32c3193.css" as="style" crossorigin=""/><link rel="stylesheet" href="/_next/static/css/559b4a37e32c3193.css" crossorigin="" data-n-g=""/><noscript data-n-css=""></noscript><script defer="" crossorigin="" nomodule="" src="/_next/static/chunks/polyfills-c67a75d1b6f99dc8.js"></script><script src="/_next/static/chunks/webpack-59c5c889f52620d6.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/framework-66d32731bdd20e83.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/main-aa55ffd08992d156.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/_app-a7c04a899fcaead6.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/108-ababe0d3bb81df72.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/950-f4b27b4a754e55d9.js" defer="" crossorigin=""></script><script src="/_next/static/chunks/pages/%5B...detail%5D-462eb16d74bf0376.js" defer="" crossorigin=""></script><script src="/_next/static/ZZIvuqctppkj_caIDL9HZ/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/ZZIvuqctppkj_caIDL9HZ/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"><script>!function(){try{var d=document.documentElement,c=d.classList;c.remove('light','dark');var e=localStorage.getItem('theme');if('system'===e||(!e&&true)){var t='(prefers-color-scheme: dark)',m=window.matchMedia(t);if(m.media!==t||m.matches){d.style.colorScheme = 'dark';c.add('dark')}else{d.style.colorScheme = 'light';c.add('light')}}else if(e){c.add(e|| '')}if(e==='light'||e==='dark')d.style.colorScheme=e}catch(e){}}()</script></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"post":{"slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 성능 최적화 (2) - PanResponder 안정화와 Native 애니메이션","title":"React Native 칸반보드 드래그 앤 드롭 성능 최적화 (2) - PanResponder 안정화와 Native 애니메이션","date":"2026-03-08T22:00:00.000Z","image":"index.png","summary":"1편에서 측정한 문제들 중 즉각적인 효과가 있는 것부터 개선합니다. PanResponder를 useMemo로 안정화하고, 애니메이션을 Native 스레드로 전환합니다. 그리고 실제 측정 결과를 봅니다.","tags":["react native","드래그 앤 드롭","성능 최적화","PanResponder","useMemo","useRef","useNativeDriver","칸반보드"],"content":"\r\n\r\n# React Native 칸반보드 드래그 앤 드롭 성능 최적화 (2) - PanResponder 안정화와 Native 애니메이션\r\n\r\n\u003e 이 시리즈는 React Native에서 직접 구현한 칸반보드 드래그 앤 드롭의 성능을 측정하고 개선하는 과정을 다룹니다.\r\n\u003e\r\n\u003e [1편: 문제 인식과 측정](/blog/react-native-kanban-drag-drop-performance-1)에서 드래그 1회에 **총 12번의 커밋, 최대 44.93ms, 최대 232개 컴포넌트 리렌더링**이 발생한다는 것을 확인했습니다.\r\n\r\n---\r\n\r\n## 개선 우선순위 복습\r\n\r\n1편에서 세운 계획입니다.\r\n\r\n### 1순위: 즉시 효과가 있는 것\r\n1. `useNativeDriver: true` 전환 — 애니메이션을 Native 스레드로\r\n2. `PanResponder` useMemo 적용 — 불필요한 객체 생성 방지\r\n\r\n### 2순위: 구조적 개선\r\n3. Zustand store로 props drilling 해결 — 중간 컴포넌트 리렌더링 방지\r\n4. `React.memo` 적용 — 불필요한 리렌더링 차단\r\n\r\n이번 글에서는 **1순위** 개선을 적용하고 결과를 측정합니다.\r\n\r\n---\r\n\r\n## 문제 1: PanResponder가 매 렌더링마다 재생성\r\n\r\n### 먼저, PanResponder가 뭔가요?\r\n\r\n`PanResponder`는 손가락의 터치 이벤트(시작, 이동, 끝)를 감지하는 React Native의 API입니다. 드래그 앤 드롭은 `PanResponder`를 통해 \"지금 어디를 누르고 있는지\", \"얼마나 움직였는지\"를 계속 추적합니다.\r\n\r\n### 개선 전 코드\r\n\r\n```tsx\r\n// DraggablePlanCard.tsx - 개선 전\r\nconst DraggablePlanCard = ({ item, index, dayId, onDragStart, onDragMove, onDragEnd }) =\u003e {\r\n\r\n  const panResponder = PanResponder.create({  // 🔴 렌더링마다 새 객체 생성\r\n    onStartShouldSetPanResponder: () =\u003e isPanEnabled,\r\n    onPanResponderGrant: (evt) =\u003e {\r\n      onDragStart(item, dayId, index, ...);\r\n    },\r\n    onPanResponderMove: (evt, gestureState) =\u003e {\r\n      onDragMove(...);\r\n    },\r\n    onPanResponderRelease: (evt) =\u003e {\r\n      onDragEnd(evt.nativeEvent.pageY);\r\n    },\r\n  });\r\n\r\n  return \u003cAnimated.View {...panResponder.panHandlers} /\u003e;\r\n};\r\n```\r\n\r\n`PanResponder.create()`가 컴포넌트 **함수 본문 안**에 그냥 놓여 있습니다. React 컴포넌트는 상태가 바뀔 때마다 함수 전체를 다시 실행하기 때문에, 이 코드는 **리렌더링이 일어날 때마다 PanResponder를 새로 만들고 버립니다.** 드래그 중에 리렌더링이 발생하면 드래그 핸들러도 함께 새로 교체되는 셈입니다.\r\n\r\n### 그냥 useMemo로 감싸면 안 되나?\r\n\r\n`useMemo`로 감싸면 PanResponder를 한 번만 만들 수 있습니다. 그런데 새로운 문제가 생깁니다.\r\n\r\n**클로저 문제**입니다. `onPanResponderGrant` 안에서 `item`, `dayId`, `onDragStart` 같은 값들을 사용합니다. 이 값들은 부모에서 props로 내려오는데, `useMemo`로 감싸는 순간 **\"최초에 PanResponder를 만들 때의 값\"이 그대로 고정**됩니다.\r\n\r\n부모에서 `item`이 바뀌어도 PanResponder 내부는 여전히 처음 `item`을 바라보고 있는 것입니다.\r\n\r\n```\r\nuseMemo 의존성 배열에 [item, dayId, onDragStart] 추가\r\n  → props가 바뀔 때마다 PanResponder 재생성  🔴 (처음과 같은 문제)\r\n\r\nuseMemo 의존성 배열을 [] (빈 배열)로\r\n  → PanResponder는 한 번만 생성되지만 내부 값이 고정됨  🔴 (오래된 값 참조)\r\n```\r\n\r\n결국 **재생성 비용을 없애려면 값이 고정되고, 값을 최신으로 유지하려면 재생성 비용이 발생하는 딜레마**입니다.\r\n\r\n### 해결책: callbacksRef 패턴\r\n\r\n이 딜레마를 끊는 방법이 `useRef`입니다.\r\n\r\n`useRef`는 렌더링과 무관하게 **항상 동일한 객체**를 반환합니다. 그리고 그 안의 `.current` 값은 언제든지 바꿀 수 있습니다. 이 특성을 활용합니다.\r\n\r\n```tsx\r\n// DraggablePlanCard.tsx - 개선 후\r\nconst DraggablePlanCard = memo(({ item, index, dayId, onDragStart, onDragMove, onDragEnd }) =\u003e {\r\n\r\n  // ✅ ref는 렌더링마다 같은 객체. .current 값만 교체\r\n  const callbacksRef = useRef({ onDragStart, onDragMove, onDragEnd });\r\n  const propsRef = useRef({ item, dayId, index });\r\n  const isPanEnabledRef = useRef(isPanEnabled);\r\n\r\n  // 렌더링마다 최신 값으로 덮어씀 (.current 교체, ref 객체 자체는 그대로)\r\n  callbacksRef.current = { onDragStart, onDragMove, onDragEnd };\r\n  propsRef.current = { item, dayId, index };\r\n  isPanEnabledRef.current = isPanEnabled;\r\n\r\n  // ✅ useMemo로 PanResponder 한 번만 생성\r\n  const panResponder = useMemo(() =\u003e PanResponder.create({\r\n    onStartShouldSetPanResponder: () =\u003e isPanEnabledRef.current,  // ✅ ref 통해 최신 값\r\n    onMoveShouldSetPanResponder: () =\u003e isPanEnabledRef.current,\r\n\r\n    onPanResponderGrant: (evt) =\u003e {\r\n      const { item, dayId, index } = propsRef.current;           // ✅ 항상 최신 값\r\n      callbacksRef.current.onDragStart(item, dayId, index, ...);\r\n    },\r\n    onPanResponderMove: (evt, gestureState) =\u003e {\r\n      callbacksRef.current.onDragMove(...);                       // ✅ 항상 최신 콜백\r\n    },\r\n    onPanResponderRelease: (evt) =\u003e {\r\n      callbacksRef.current.onDragEnd(evt.nativeEvent.pageY);\r\n    },\r\n    onPanResponderTerminate: () =\u003e { ... },\r\n  }), [cardOpacity]);  // 사실상 마운트 시 1회만 생성\r\n\r\n  ...\r\n});\r\n```\r\n\r\n### 왜 이 패턴이 동작하는가\r\n\r\n핵심은 **ref 객체와 .current 값을 분리해서 생각**하는 것입니다.\r\n\r\n```\r\n렌더링 발생 (props 변경)\r\n    │\r\n    ├─ callbacksRef        →  동일한 객체  (useMemo가 참조하는 것)\r\n    │    └─ .current       →  최신 콜백으로 교체  ✅\r\n    │\r\n    ├─ propsRef            →  동일한 객체\r\n    │    └─ .current       →  최신 item, dayId, index로 교체  ✅\r\n    │\r\n    └─ panResponder        →  재생성 없음  (useMemo가 바라보는 ref 객체는 안 바뀜)\r\n\r\n터치 이벤트 발생\r\n    │\r\n    └─ propsRef.current.item              →  최신 item  ✅\r\n       callbacksRef.current.onDragStart   →  최신 콜백  ✅\r\n```\r\n\r\nPanResponder 내부의 핸들러는 **ref 객체**를 클로저로 캡처합니다. ref 객체 자체는 바뀌지 않으므로 `useMemo`는 재생성하지 않고, `.current`는 렌더링마다 최신 값으로 갱신되므로 터치 이벤트 시 항상 올바른 값을 읽습니다.\r\n\r\nref는 렌더링 사이클과 무관하게 항상 최신 값을 담고 있습니다. PanResponder는 한 번 생성된 후, 핸들러 내부에서 ref를 통해 최신 값을 읽어오기 때문에 의존성 배열 문제가 사라집니다.\r\n\r\n---\r\n\r\n## 문제 2: useNativeDriver: false로 인한 JS 스레드 애니메이션\r\n\r\n### 개선 전 코드\r\n\r\n```tsx\r\n// 개선 전 — 여러 곳에 useNativeDriver: false\r\nAnimated.timing(floatingOpacity, {\r\n  toValue: 0.9,\r\n  duration: 150,\r\n  useNativeDriver: false,  // 🔴 JS 스레드에서 실행\r\n}).start();\r\n```\r\n\r\n`useNativeDriver: false`일 때 애니메이션 계산은 **JavaScript 스레드**에서 실행됩니다.\r\n\r\n```\r\n드래그 중 JS 스레드\r\n┌──────────────────────────────────────────────────┐\r\n│  드래그 위치 계산                                  │\r\n│  드롭 타겟 감지                                   │\r\n│  상태 업데이트 → 리렌더링                          │\r\n│  애니메이션 프레임 계산  ← 이것도 JS 스레드에서!   │  ← 병목\r\n└──────────────────────────────────────────────────┘\r\n```\r\n\r\n드래그 중에 JS 스레드가 바쁘면 애니메이션도 버벅입니다.\r\n\r\n### 왜 false를 쓰고 있었나\r\n\r\n`useNativeDriver: true`는 `transform`, `opacity`처럼 레이아웃에 영향을 주지 않는 속성만 지원합니다. `width`, `height`, `backgroundColor` 같은 속성은 지원하지 않아서, 이런 속성을 쓸 때는 어쩔 수 없이 `false`를 씁니다.\r\n\r\n기존 코드를 추적해보니, 실제로는 `opacity`와 `transform`만 사용하고 있었습니다. **`false`를 쓸 이유가 없었던 것입니다.**\r\n\r\n### 개선 후 코드\r\n\r\n```tsx\r\n// DraggablePlanCard.tsx — 드래그 시작 시 카드 투명하게\r\nAnimated.timing(cardOpacity, {\r\n  toValue: 0.3,\r\n  duration: 150,\r\n  useNativeDriver: true,  // ✅ opacity → Native 스레드\r\n}).start();\r\n\r\n// FloatingPortal.tsx — 따라다니는 플로팅 카드\r\n\u003cAnimated.View\r\n  style={{\r\n    opacity: floatingOpacity,           // ✅\r\n    transform: [\r\n      { translateX: floatingPan.x },   // ✅\r\n      { translateY: floatingPan.y },   // ✅\r\n    ],\r\n  }}\r\n/\u003e\r\n```\r\n\r\n`opacity`와 `transform`은 `useNativeDriver: true`가 지원되므로 모두 Native 스레드로 전환했습니다.\r\n\r\n---\r\n\r\n## 두 가지 개선의 관계\r\n\r\n사실 이 두 문제는 서로 얽혀 있습니다.\r\n\r\n```\r\nuseMemo로 PanResponder 안정화\r\n        │\r\n        ├─ 클로저 문제 발생\r\n        │       └─ callbacksRef / isPanEnabledRef 패턴으로 해결\r\n        │\r\n        └─ PanResponder 재생성 없음\r\n                └─ useNativeDriver를 true로 바꿔도\r\n                   \"매 렌더마다 driver 옵션이 바뀐다\"는 경고 사라짐  ✅\r\n```\r\n\r\n두 가지를 같이 적용해야 온전히 동작합니다.\r\n\r\n---\r\n\r\n## 실제 측정 결과\r\n\r\n### 테스트 환경 (1편과 동일)\r\n- Day 컬럼: **4개** (Day1 ~ Day4)\r\n- 카드: **총 8개**\r\n- 테스트: 카드 1개를 드래그 + 자동 스크롤 1회\r\n\r\n### React DevTools Profiler 결과\r\n\r\n**개선 전 (`성능개선전.json`)**\r\n\r\n| 커밋 | Duration | 리렌더 컴포넌트 수 | Updater |\r\n|------|----------|-----------------|---------|\r\n| 1 | 1.36ms | 2 | View (Animated) |\r\n| 2 | 5.29ms | 23 | DraggablePlanCard |\r\n| 3 | **40.90ms** | **232** | DraggablePlanCard, TravelPlanKanban, FloatingPortalProvider |\r\n| 4~8 | 0.65~1.48ms | 2 | View (애니메이션 프레임) |\r\n| 9 | **44.93ms** | **211** | TravelPlanKanban |\r\n| 10 | 39.77ms | 209 | DraggablePlanCard × 4, TravelPlanKanban |\r\n| 11 | 38.89ms | 209 | DraggablePlanCard × 2, TravelPlanKanban |\r\n| 12 | 35.16ms | 212 | FloatingPortalProvider |\r\n| **합계** | **총 12 커밋** | **최대 232개** | |\r\n\r\n**개선 후 (`성능개선후(2).json`)**\r\n\r\n| 커밋 | Duration | 리렌더 컴포넌트 수 | 변화 |\r\n|------|----------|-----------------|------|\r\n| 1 | 1.61ms | 2 | — |\r\n| 2 | 5.42ms | 23 | — |\r\n| 3 | 46.10ms | 232 | — |\r\n| 4~5 | 0.65~1.24ms | 2~4 | — |\r\n| 6 | 45.06ms | 211 | — |\r\n| 7 | 31.28ms | 209 | — |\r\n| 8 | 36.74ms | 212 | — |\r\n| **합계** | **총 8 커밋** | **최대 232개** | **커밋 수 12 → 8** |\r\n\r\n### 분석\r\n\r\n| 항목 | 개선 전 | 개선 후 |\r\n|------|--------|---------|\r\n| 총 커밋 수 | **12회** | **8회** |\r\n| 최대 duration | 44.93ms | 46.10ms |\r\n| 평균 duration | 17.63ms | 21.01ms |\r\n| 최대 리렌더 컴포넌트 수 | 232개 | 232개 |\r\n\r\n**커밋 수는 4개 줄었지만, duration과 리렌더 컴포넌트 수는 거의 그대로입니다.**\r\n\r\n---\r\n\r\n## 왜 duration이 줄지 않았나?\r\n\r\n줄어든 4개의 커밋은 개선 전 **4~8번 커밋** (0.65~1.48ms짜리들)입니다.\r\n\r\n```\r\n개선 전\r\n커밋 4 | 0.65ms | View (애니메이션 프레임)  ─┐\r\n커밋 5 | 1.03ms | View (애니메이션 프레임)   │  useNativeDriver: false일 때\r\n커밋 6 | 0.97ms | View (애니메이션 프레임)   │  JS 스레드에서 실행 → DevTools에 기록됨\r\n커밋 7 | 1.07ms | View (애니메이션 프레임)  ─┘\r\n\r\n개선 후 → 이 커밋들이 사라짐\r\n→ useNativeDriver: true로 전환 → Native 스레드에서 실행\r\n→ JS DevTools 프로파일러에 기록되지 않음  ✅\r\n```\r\n\r\n`useNativeDriver: true`로 바꾼 효과가 바로 여기 나타납니다. 애니메이션 커밋들이 프로파일러에서 보이지 않는 것은, **Native 스레드로 넘어가서 JS 스레드와 무관하게 실행되기 때문**입니다.\r\n\r\n반면 큰 커밋들 (30~46ms, 200개 이상 리렌더)은 여전히 남아있습니다. 이건 **props drilling과 React.memo 부재**로 인한 전체 트리 리렌더링이 원인이고, 이번 개선으로는 해결되지 않습니다.\r\n\r\n---\r\n\r\n## 정리\r\n\r\n이번에 적용한 개선들의 실제 효과를 정리하면:\r\n\r\n| 개선 항목 | 실제 효과 | 한계 |\r\n|-----------|----------|------|\r\n| `useNativeDriver: true` | 애니메이션 커밋 4개 → Native 스레드로 이동, JS 스레드 부하 감소 | 큰 리렌더링 커밋은 그대로 |\r\n| `useMemo` PanResponder | 렌더마다 PanResponder 재생성 없음, `isPanEnabled` 버그 해결 | 리렌더링 횟수 자체는 변화 없음 |\r\n| `callbacksRef` 패턴 | 클로저 문제 없이 항상 최신 값 참조 | — |\r\n\r\n드래그 중 JS 스레드는 가벼워졌고, 애니메이션은 더 부드러워졌습니다. 하지만 **큰 리렌더링 커밋 (30~46ms, 200개 이상)은 여전히 남아** 있습니다.\r\n\r\n---\r\n\r\n## 배운 것\r\n\r\n### 1. useMemo와 클로저는 같이 생각해야 한다\r\n\r\n`useMemo`로 값비싼 객체를 한 번만 만드는 것은 좋지만, 내부에서 외부 변수를 참조한다면 클로저 문제가 생깁니다. `callbacksRef` 패턴은 이 둘을 동시에 해결합니다.\r\n\r\n```tsx\r\n// 핵심 패턴 요약\r\nconst latestRef = useRef(value);\r\nlatestRef.current = value;  // 렌더마다 동기화\r\n\r\nconst memoized = useMemo(() =\u003e {\r\n  // latestRef.current으로 항상 최신 값 참조\r\n}, []);\r\n```\r\n\r\n### 2. 프로파일러에서 \"사라진 커밋\"의 의미\r\n\r\n`useNativeDriver: true` 후 애니메이션 커밋이 프로파일러에서 보이지 않는 것은 버그가 아니라 **성공**입니다. Native 스레드에서 실행되므로 JS 프로파일러에 기록되지 않습니다.\r\n\r\n### 3. 즉각적인 개선과 구조적 개선을 구분할 것\r\n\r\n이번 개선들은 코드 몇 줄로 적용 가능하지만, 큰 리렌더링 문제는 구조를 바꿔야 합니다. 효과의 크기도 다릅니다 — **측정 결과가 그것을 증명**합니다.\r\n\r\n---\r\n\r\n## 다음 글 예고\r\n\r\n이번 개선으로 애니메이션 품질은 개선됐지만, **30~46ms짜리 전체 트리 리렌더링**은 여전히 남아있습니다.\r\n\r\n다음 글에서는 `draggingItem` 상태를 **Zustand store로 분리**하고, `React.memo`와 세밀한 selector로 리렌더링을 최소화합니다. 실제로 이 개선을 적용한 후 평균 커밋 duration이 **17.63ms → 6.63ms**로 떨어지는 것을 확인했습니다.\r\n\r\n---\r\n\r\n## 참고 자료\r\n\r\n- [React Native Animated - useNativeDriver](https://reactnative.dev/docs/animated#using-the-native-driver)\r\n- [PanResponder API](https://reactnative.dev/docs/panresponder)\r\n- [useRef로 최신 값 참조하기](https://react.dev/learn/referencing-values-with-refs)\r\n","readingMinutes":16},"category":"React Native","prevData":{"title":"React Native 칸반보드 드래그 앤 드롭 성능 최적화 (1) - 문제 인식과 측정","slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 성능 최적화 (1) - 문제 인식과 측정","summary":"칸반보드 드래그 앤 드롭에서 드래그 중에 불필요한 리렌더링 및 버벅임이 발생하는 문제를 수치로 측정하고 원인을 분석합니다."},"nextData":{"title":"React Native 칸반보드 드래그 앤 드롭 성능 최적화 (3) - Zustand Store와 React.memo로 리렌더링 최소화","slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 성능 최적화 (3) - Zustand Store와 React.memo로 리렌더링 최소화","summary":"2편의 개선에도 불구하고 남아있는 30-46ms짜리 큰 리렌더링의 원인은 props drilling이었습니다. Zustand store로 draggingItem 상태를 분리하고, React.memo와 세밀한 selector로 전체 트리 리렌더링을 차단합니다."}},"__N_SSG":true},"page":"/[...detail]","query":{"detail":["posts","React Native","React Native 칸반보드 드래그 앤 드롭 성능 최적화 (2) - PanResponder 안정화와 Native 애니메이션"]},"buildId":"ZZIvuqctppkj_caIDL9HZ","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
