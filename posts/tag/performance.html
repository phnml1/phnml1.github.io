igin=""></script><script src="/_next/static/ZZIvuqctppkj_caIDL9HZ/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/ZZIvuqctppkj_caIDL9HZ/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"><script>!function(){try{var d=document.documentElement,c=d.classList;c.remove('light','dark');var e=localStorage.getItem('theme');if('system'===e||(!e&&true)){var t='(prefers-color-scheme: dark)',m=window.matchMedia(t);if(m.media!==t||m.matches){d.style.colorScheme = 'dark';c.add('dark')}else{d.style.colorScheme = 'light';c.add('light')}}else if(e){c.add(e|| '')}if(e==='light'||e==='dark')d.style.colorScheme=e}catch(e){}}()</script></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"tags":["nextjs","react","performance","server-components","promise-all","optimization","react native","л“ңлһҳк·ё м•Ө л“ңлЎӯ","м„ұлҠҘ мөңм Ғнҷ”","Zustand","React.memo","selector","м№ёл°ҳліҙл“ң","props drilling","PanResponder","useMemo","useRef","useNativeDriver","лҰ¬л ҢлҚ”л§Ғ","мһҗлҸҷ мҠӨнҒ¬лЎӨ","requestAnimationFrame","Portal","Context API","Animated","hooks","нҠёлҹ¬лё”мҠҲнҢ…","google map","expo-location","мЎём—…мһ‘н’Ҳ","JavaScript","deepdive","useState","hook","next.js","SSR","Suspense","л ҢлҚ”л§Ғ","н…ҢмҠӨнҠё","dev tools","SSG","Algorithm","н”„лЎңк·ёлһҳлЁёмҠӨ","PCCP","lv2","мқҙл¶„нғҗмғү","нҒҙлЎңм Җ","мғқлӘ…мЈјкё°","Virtual DOM","л°ұмӨҖ","gold","dfs","lv3","bfs"],"currentTag":"performance","posts":[{"slug":"posts/React/Next.js м„ңлІ„ м»ҙнҸ¬л„ҢнҠём—җм„ң Promise.all()лЎң лҢҖмӢңліҙл“ң мқ‘лӢө мӢңк°„ 2л°° лӢЁм¶•н•ҳкё°","title":"Next.js м„ңлІ„ м»ҙнҸ¬л„ҢнҠём—җм„ң Promise.all()лЎң лҢҖмӢңліҙл“ң мқ‘лӢө мӢңк°„ 2л°° лӢЁм¶•н•ҳкё°","date":"2026-04-04T12:00:24.000Z","image":"index.png","summary":"Next.js м„ңлІ„ м»ҙнҸ¬л„ҢнҠём—җм„ң Promise.allмқ„ нҷңмҡ©н•ҙ лҚ°мқҙн„° нҺҳм№ӯмқ„ лі‘л ¬нҷ”н•ҳкі , лҢҖмӢңліҙл“ң мқ‘лӢө мӢңк°„мқ„ м•Ҫ 2л°° к°ңм„ н•ң кіјм •кіј кө¬мЎ°лҘј м •лҰ¬н–ҲмҠөлӢҲлӢӨ.","tags":["nextjs","react","performance","server-components","promise-all","optimization"],"content":"\r\n# Next.js м„ңлІ„ м»ҙнҸ¬л„ҢнҠём—җм„ң Promise.all()лЎң лҢҖмӢңліҙл“ң мқ‘лӢө мӢңк°„ 2л°° лӢЁм¶•н•ҳкё°\r\n\r\n## м„ңлЎ  - CodeMate н”„лЎңм қнҠё мҶҢк°ң\r\n\r\nAI кё°л°ҳ мҪ”л“ң лҰ¬л·° \u0026 нҳ‘м—… н”Ңлһ«нҸјмқ„ л§Ңл“ӨлҚҳ лҸ„мӨ‘, лҢҖмӢңліҙл“ң нҺҳмқҙм§Җм—җм„ң **м„ңлІ„ мӮ¬мқҙл“ң лҚ°мқҙн„° нҺҳм№ӯмқ„ мөңм Ғнҷ”н•ң кіјм •**мқ„ м •лҰ¬н•ҙліҙкІ лӢӨ.\r\n\r\n---\r\n\r\n## лҢҖмӢңліҙл“ңм—җлҠ” м–ҙл–Ө лҚ°мқҙн„°к°Җ н•„мҡ”н•ңк°Җ\r\n\r\nлЎңк·ёмқё нӣ„ к°ҖмһҘ лЁјм Җ ліҙмқҙлҠ” лҢҖмӢңліҙл“ң нҺҳмқҙм§Җм—җлҠ” лӢӨмқҢ 4к°Җм§Җ лҚ°мқҙн„° мҳҒм—ӯмқҙ мһҲлӢӨ.\r\n\r\n| мҳҒм—ӯ | лҚ°мқҙн„° | DB мҝјлҰ¬ |\r\n|------|--------|---------|\r\n| нҶөкі„ м№ҙл“ң | нҸүк·  мҪ”л“ң н’Ҳм§Ҳ, мҳӨн”Ҳ PR мҲҳ, мЈјк°„ лҰ¬л·° мҲҳ | 6к°ң (aggregate, count) |\r\n| н’Ҳм§Ҳ м¶”мқҙ м°ЁнҠё | мөңк·ј 30мқј мқјлі„ нҸүк·  м җмҲҳ | 1к°ң (findMany) |\r\n| мқҙмҠҲ л¶„нҸ¬ м°ЁнҠё | мӢ¬к°ҒлҸ„лі„ мқҙмҠҲ л№„мңЁ | 2к°ң (groupBy + findMany) |\r\n| мөңк·ј PR н…Ңмқҙлё” | мөңмӢ  PR 5к°ң | 1к°ң (findMany) |\r\n\r\nн•©м№ҳл©ҙ **мҙқ 10к°ңмқҳ Prisma мҝјлҰ¬**к°Җ лҢҖмӢңліҙл“ң н•ң нҺҳмқҙм§ҖлҘј кө¬м„ұн•ңлӢӨ. мқҙкұё м–ҙл–»кІҢ мӢӨн–үн•ҳлҠҗлғҗм—җ л”°лқј мқ‘лӢө мӢңк°„мқҙ нҒ¬кІҢ лӢ¬лқјм§„лӢӨ.\r\n\r\n---\r\n\r\n## л¬ём ң: мҲңм°Ё мӢӨн–үмқҳ лі‘лӘ©\r\n\r\nмІҳмқҢ лӢЁмҲңн•ҳкІҢ кө¬нҳ„н–Ҳмқ„ л•ҢлҠ” мқҙлҹ° мҪ”л“ңк°Җ лҗҳм–ҙмһҲм—ҲлӢӨ.\r\n\r\n```ts\r\n// мҲңм°Ё мӢӨн–ү - к°Ғ н•ЁмҲҳк°Җ лҒқлӮҳм•ј лӢӨмқҢмқҙ мӢңмһ‘\r\nconst stats = await fetchDashboardStats(userId)\r\nconst qualityTrend = await fetchDashboardQualityTrend(userId)\r\nconst issueSeverity = await fetchDashboardIssueSeverity(userId)\r\nconst recentPRs = await fetchDashboardRecentPRs(userId)\r\n```\r\n\r\n4к°ң н•ЁмҲҳк°Җ м§Ғл ¬лЎң мӢӨн–үлҗҳлҜҖлЎң **мҙқ мқ‘лӢө мӢңк°„ = к°Ғ н•ЁмҲҳ мӢңк°„мқҳ н•©**мқҙлӢӨ.\r\n\r\n```\r\nfetchDashboardStats      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ 300ms\r\nfetchDashboardQualityTrend     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ 150ms\r\nfetchDashboardIssueSeverity      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ 120ms\r\nfetchDashboardRecentPRs            в–Ҳв–Ҳв–Ҳв–Ҳ  80ms\r\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\r\nмҙқ мқ‘лӢө мӢңк°„                          вүҲ 650ms\r\n```\r\n\r\nк°Ғ н•ЁмҲҳ к°„м—җ **лҚ°мқҙн„° мқҳмЎҙм„ұмқҙ м „нҳҖ м—ҶлӢӨ**. 4лІҲм§ё н•ЁмҲҳк°Җ 1лІҲм§ё н•ЁмҲҳмқҳ кІ°кіјлҘј н•„мҡ”лЎң н•ҳм§Җ м•ҠлҠ”лӢӨ. к·ёл ҮлӢӨл©ҙ көімқҙ кё°лӢӨлҰҙ мқҙмң к°Җ м—ҶлӢӨ.\r\n\r\n---\r\n\r\n## н•ҙкІ°: Promise.all()лЎң 2лӢЁкі„ лі‘л ¬нҷ”\r\n\r\n### 1лӢЁкі„ - page.tsxм—җм„ң 4к°ң fetch н•ЁмҲҳ лі‘л ¬ мӢӨн–ү\r\n\r\nNext.js App Routerмқҳ м„ңлІ„ м»ҙнҸ¬л„ҢнҠём—җм„ңлҠ” `async/await`лҘј л°”лЎң мӮ¬мҡ©н•  мҲҳ мһҲлӢӨ. лҸ…лҰҪм Ғмқё 4к°ңмқҳ fetch н•ЁмҲҳлҘј `Promise.all()`лЎң к°җмӢёл©ҙ **лҸҷмӢңм—җ мӢӨн–ү**лҗңлӢӨ.\r\n\r\n```ts\r\n// app/(protected)/dashboard/page.tsx - м„ңлІ„ м»ҙнҸ¬л„ҢнҠё\r\nexport default async function Page() {\r\n  const session = await auth()\r\n  if (!session?.user?.id) return null\r\n\r\n  const [stats, qualityTrend, issueSeverity, recentPRs] = await Promise.all([\r\n    fetchDashboardStats(session.user.id),       // в‘  нҶөкі„ м№ҙл“ң\r\n    fetchDashboardQualityTrend(session.user.id), // в‘Ў н’Ҳм§Ҳ м¶”мқҙ м°ЁнҠё\r\n    fetchDashboardIssueSeverity(session.user.id), // в‘ў мқҙмҠҲ л¶„нҸ¬ м°ЁнҠё\r\n    fetchDashboardRecentPRs(session.user.id),    // в‘Ј мөңк·ј PR н…Ңмқҙлё”\r\n  ])\r\n\r\n  return (\r\n    \u003cdiv className=\"max-w-350 mx-auto space-y-4 sm:space-y-6\"\u003e\r\n      \u003cStatCards\u003e\r\n        \u003cCodeQualityCard score={stats.avgQualityScore} trend={stats.qualityScoreTrend} /\u003e\r\n        \u003cOpenPRCard openPRs={stats.openPRs} pendingReviewPRs={stats.pendingReviewPRs} /\u003e\r\n        \u003cWeeklyReviewCard weeklyReviews={stats.weeklyReviews} diff={stats.weeklyReviewsDiff} /\u003e\r\n      \u003c/StatCards\u003e\r\n      \u003cChartsSection qualityTrend={qualityTrend} issueSeverity={issueSeverity} /\u003e\r\n      \u003cRecentPRSection prs={recentPRs} /\u003e\r\n    \u003c/div\u003e\r\n  )\r\n}\r\n```\r\n\r\nмқҙ мӢңм җм—җм„ң нғҖмһ„лқјмқёмқҖ мқҙл ҮкІҢ л°”лҖҗлӢӨ.\r\n\r\n```\r\nfetchDashboardStats      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ 300ms\r\nfetchDashboardQualityTrend в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ 150ms\r\nfetchDashboardIssueSeverity  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳ 120ms\r\nfetchDashboardRecentPRs      в–Ҳв–Ҳв–Ҳв–Ҳ  80ms\r\nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\r\nмҙқ мқ‘лӢө мӢңк°„ = к°ҖмһҘ лҠҗлҰ° н•ЁмҲҳ вүҲ 300ms\r\n```\r\n\r\n### 2лӢЁкі„ - fetchDashboardStats лӮҙл¶Җм—җм„ңлҸ„ лі‘л ¬нҷ”\r\n\r\nк°ҖмһҘ л¬ҙкұ°мҡҙ `fetchDashboardStats()` н•ЁмҲҳ лӮҙл¶ҖлҘј ліҙл©ҙ, нҶөкі„ м№ҙл“ң н•ҳлӮҳлҘј л§Ңл“Өкё° мң„н•ҙ **6к°ңмқҳ лҸ…лҰҪм Ғмқё Prisma мҝјлҰ¬**к°Җ н•„мҡ”н•ҳлӢӨ.\r\n\r\n```ts\r\n// lib/dashboard.ts\r\nexport async function fetchDashboardStats(userId: string): Promise\u003cDashboardStats\u003e {\r\n  const [\r\n    currentQuality,   // мөңк·ј 30мқј нҸүк·  н’Ҳм§Ҳ м җмҲҳ\r\n    prevQuality,      // мқҙм „ 30мқј нҸүк·  н’Ҳм§Ҳ м җмҲҳ (нҠёл Ңл“ң л№„көҗмҡ©)\r\n    openPRs,          // м—ҙлҰ° PR мҲҳ\r\n    pendingReviewPRs, // лҰ¬л·° лҢҖкё° PR мҲҳ\r\n    weeklyReviews,    // мқҙлІҲ мЈј лҰ¬л·° мҲҳ\r\n    prevWeekReviews,  // м§ҖлӮң мЈј лҰ¬л·° мҲҳ (мҰқк°җ л№„көҗмҡ©)\r\n  ] = await Promise.all([\r\n    prisma.review.aggregate({\r\n      where: { pullRequest: { repo: { userId } }, status: \"COMPLETED\", reviewedAt: { gte: thirtyDaysAgo } },\r\n      _avg: { qualityScore: true },\r\n    }),\r\n    prisma.review.aggregate({\r\n      where: { pullRequest: { repo: { userId } }, status: \"COMPLETED\", reviewedAt: { gte: sixtyDaysAgo, lt: thirtyDaysAgo } },\r\n      _avg: { qualityScore: true },\r\n    }),\r\n    prisma.pullRequest.count({\r\n      where: { repo: { userId }, status: \"OPEN\" },\r\n    }),\r\n    prisma.pullRequest.count({\r\n      where: { repo: { userId }, status: \"OPEN\", reviews: { none: { status: \"COMPLETED\" } } },\r\n    }),\r\n    prisma.review.count({\r\n      where: { pullRequest: { repo: { userId } }, status: \"COMPLETED\", reviewedAt: { gte: thisWeekStart } },\r\n    }),\r\n    prisma.review.count({\r\n      where: { pullRequest: { repo: { userId } }, status: \"COMPLETED\", reviewedAt: { gte: lastWeekStart, lt: thisWeekStart } },\r\n    }),\r\n  ])\r\n\r\n  // кІ°кіј к°Җкіө...\r\n}\r\n```\r\n\r\nмқҙл ҮкІҢ **мҷёл¶Җ 4к°ң Г— лӮҙл¶Җ мөңлҢҖ 6к°ң = мҙқ 10к°ңмқҳ DB мҝјлҰ¬**к°Җ 2лӢЁкі„лЎң лі‘л ¬ мӢӨн–үлҗңлӢӨ.\r\n\r\n```\r\n[1лӢЁкі„ Promise.all]\r\nв”ңв”Җв”Җ fetchDashboardStats в”Җв”Җв”Җв”Җ [2лӢЁкі„ Promise.all]\r\nв”Ӯ     в”ңв”Җв”Җ currentQuality    в–Ҳв–Ҳв–Ҳв–Ҳ\r\nв”Ӯ     в”ңв”Җв”Җ prevQuality       в–Ҳв–Ҳв–Ҳв–Ҳ\r\nв”Ӯ     в”ңв”Җв”Җ openPRs           в–Ҳв–Ҳ\r\nв”Ӯ     в”ңв”Җв”Җ pendingReviewPRs  в–Ҳв–Ҳв–Ҳ\r\nв”Ӯ     в”ңв”Җв”Җ weeklyReviews     в–Ҳв–Ҳ\r\nв”Ӯ     в””в”Җв”Җ prevWeekReviews   в–Ҳв–Ҳ\r\nв”ңв”Җв”Җ fetchDashboardQualityTrend   в–Ҳв–Ҳв–Ҳв–Ҳ\r\nв”ңв”Җв”Җ fetchDashboardIssueSeverity  в–Ҳв–Ҳв–Ҳв–Ҳ\r\nв””в”Җв”Җ fetchDashboardRecentPRs      в–Ҳв–Ҳ\r\n```\r\n\r\n10к°ңмқҳ мҝјлҰ¬к°Җ лӘЁл‘җ **лҸҷмӢңм—җ** DB м»Өл„Ҙм…ҳ н’Җм—җм„ң мӢӨн–үлҗңлӢӨ. мҙқ мқ‘лӢө мӢңк°„мқҖ к°ҖмһҘ лҠҗлҰ° лӢЁмқј мҝјлҰ¬ н•ҳлӮҳмқҳ мӢңк°„м—җ мҲҳл ҙн•ңлӢӨ.\r\n\r\n---\r\n\r\n## м„ңлІ„ м»ҙнҸ¬л„ҢнҠё м•„нӮӨн…ҚмІҳмқҳ мқҙм җ\r\n\r\nлҢҖмӢңліҙл“ңмқҳ м»ҙнҸ¬л„ҢнҠё нҠёлҰ¬лҘј ліҙл©ҙ лӢӨмқҢкіј к°ҷлӢӨ.\r\n\r\n```\r\n[м„ңлІ„] page.tsx (лҚ°мқҙн„° нҺҳм№ӯ + Promise.all)\r\nв”ңв”Җв”Җ [м„ңлІ„] StatCards (л Ҳмқҙм•„мӣғ)\r\nв”Ӯ     в”ңв”Җв”Җ [м„ңлІ„] CodeQualityCard\r\nв”Ӯ     в”ңв”Җв”Җ [м„ңлІ„] OpenPRCard\r\nв”Ӯ     в””в”Җв”Җ [м„ңлІ„] WeeklyReviewCard\r\nв”ңв”Җв”Җ [м„ңлІ„] ChartsSection (л Ҳмқҙм•„мӣғ)\r\nв”Ӯ     в”ңв”Җв”Җ [м„ңлІ„] CodeQualityChartCard\r\nв”Ӯ     в”Ӯ     в””в”Җв”Җ [нҒҙлқјмқҙм–ёнҠё] CodeQualityChart (Recharts)\r\nв”Ӯ     в””в”Җв”Җ [м„ңлІ„] IssueDistributionCard\r\nв”Ӯ           в””в”Җв”Җ [нҒҙлқјмқҙм–ёнҠё] IssueDistributionChart (Recharts)\r\nв””в”Җв”Җ [м„ңлІ„] RecentPRSection\r\n      в””в”Җв”Җ [м„ңлІ„] RecentPRTable\r\n```\r\n\r\n`\"use client\"` м„ м–ёмқҙ мһҲлҠ” м»ҙнҸ¬л„ҢнҠёлҠ” **RechartsлҘј л ҢлҚ”л§Ғн•ҳлҠ” 2к°ңлҝҗ**мқҙлӢӨ. лӮҳлЁём§ҖлҠ” м „л¶Җ м„ңлІ„ м»ҙнҸ¬л„ҢнҠёлӢӨ.\r\n\r\nмқҙ кө¬мЎ°мқҳ н•өмӢ¬ мқҙм җмқҖ лӢӨмқҢкіј к°ҷлӢӨ.\r\n\r\n### 1. нҒҙлқјмқҙм–ёнҠём—җ API нҳём¶ң мҪ”л“ңк°Җ м—ҶлӢӨ\r\n\r\nлҚ°мқҙн„° нҺҳм№ӯмқҖ м „л¶Җ м„ңлІ„м—җм„ң лҒқлӮңлӢӨ. нҒҙлқјмқҙм–ёнҠём—җлҠ” мҷ„м„ұлҗң лҚ°мқҙн„°к°Җ propsлЎң лӮҙл Өк°„лӢӨ. `useEffect`лЎң APIлҘј нҳём¶ңн•ҳкі , лЎңл”© мғҒнғңлҘј кҙҖлҰ¬н•ҳкі , м—җлҹ¬лҘј мІҳлҰ¬н•ҳлҠ” мҪ”л“ңк°Җ н•„мҡ” м—ҶлӢӨ.\r\n\r\n```\r\n[кё°мЎҙ нҒҙлқјмқҙм–ёнҠё мӮ¬мқҙл“ң л°©мӢқ]\r\nлёҢлқјмҡ°м Җ вҶ’ HTML мҲҳмӢ  вҶ’ JS лЎңл“ң вҶ’ useEffect вҶ’ API нҳём¶ң вҶ’ лЎңл”©... вҶ’ лҚ°мқҙн„° мҲҳмӢ  вҶ’ л ҢлҚ”л§Ғ\r\n\r\n[м„ңлІ„ м»ҙнҸ¬л„ҢнҠё л°©мӢқ]\r\nм„ңлІ„м—җм„ң DB мҝјлҰ¬ + HTML л ҢлҚ”л§Ғ мҷ„лЈҢ вҶ’ лёҢлқјмҡ°м ҖлҠ” мҷ„м„ұлҗң HTML мҲҳмӢ \r\n```\r\n\r\n### 2. JS лІҲл“Ө мөңмҶҢнҷ”\r\n\r\nнҶөкі„ м№ҙл“ң, PR н…Ңмқҙлё” к°ҷмқҖ м •м Ғ UIлҠ” м„ңлІ„м—җм„ң HTMLлЎң л ҢлҚ”л§Ғлҗҳм–ҙ м „мҶЎлҗңлӢӨ. нҒҙлқјмқҙм–ёнҠёлЎң ліҙлӮҙлҠ” JavaScriptлҠ” Recharts м°ЁнҠё м»ҙнҸ¬л„ҢнҠё 2к°ңлҝҗмқҙлӢӨ.\r\n\r\n### 3. лҚ°мқҙн„° нҺҳм№ӯ н•ЁмҲҳм—җм„ң PrismaлҘј м§Ғм ‘ нҳём¶ң\r\n\r\nм„ңлІ„ м»ҙнҸ¬л„ҢнҠёмқҙкё° л•Ңл¬ём—җ лі„лҸ„мқҳ API лқјмҡ°нҠёлҘј л§Ңл“Өм§Җ м•Ҡкі  **PrismaлЎң DBм—җ м§Ғм ‘ мҝјлҰ¬**н•  мҲҳ мһҲлӢӨ. л„ӨнҠёмӣҢнҒ¬ нҷүмқҙ н•ҳлӮҳ мӨ„м–ҙл“ лӢӨ.\r\n\r\n```\r\n[API лқјмҡ°нҠё кІҪмң ]\r\nм„ңлІ„ м»ҙнҸ¬л„ҢнҠё вҶ’ fetch(\"/api/dashboard\") вҶ’ API лқјмҡ°нҠё вҶ’ Prisma вҶ’ DB\r\n\r\n[м§Ғм ‘ нҳём¶ң]\r\nм„ңлІ„ м»ҙнҸ¬л„ҢнҠё вҶ’ Prisma вҶ’ DB\r\n```\r\n\r\n---\r\n\r\n## лҚ°мқҙн„° нқҗлҰ„ м •лҰ¬\r\n\r\nм„ңлІ„м—җм„ң нҺҳм№ӯн•ң лҚ°мқҙн„°к°Җ нҒҙлқјмқҙм–ёнҠёк№Ңм§Җ м „лӢ¬лҗҳлҠ” м „мІҙ нқҗлҰ„мқҙлӢӨ.\r\n\r\n```\r\n[м„ңлІ„ - lib/dashboard.ts]\r\nPrismaлЎң DB м§Ғм ‘ мҝјлҰ¬ (Promise.allлЎң лі‘л ¬ мӢӨн–ү)\r\n    в”Ӯ\r\n    в–ј\r\n[м„ңлІ„ - page.tsx]\r\n4к°ң кІ°кіјлҘј кө¬мЎ° л¶„н•ҙ н• лӢ№\r\n    в”Ӯ\r\n    в”ңв”Җв”Җ stats.avgQualityScore, stats.qualityScoreTrend\r\n    в”Ӯ     вҶ’ \u003cCodeQualityCard score={...} trend={...} /\u003e\r\n    в”Ӯ\r\n    в”ңв”Җв”Җ stats.openPRs, stats.pendingReviewPRs\r\n    в”Ӯ     вҶ’ \u003cOpenPRCard openPRs={...} pendingReviewPRs={...} /\u003e\r\n    в”Ӯ\r\n    в”ңв”Җв”Җ qualityTrend[]\r\n    в”Ӯ     вҶ’ \u003cCodeQualityChartCard\u003e вҶ’ \u003cCodeQualityChart data={...} /\u003e\r\n    в”Ӯ\r\n    в”ңв”Җв”Җ issueSeverity[]\r\n    в”Ӯ     вҶ’ \u003cIssueDistributionCard\u003e вҶ’ \u003cIssueDistributionChart data={...} /\u003e\r\n    в”Ӯ\r\n    в””в”Җв”Җ recentPRs[]\r\n          вҶ’ \u003cRecentPRSection\u003e вҶ’ \u003cRecentPRTable prs={...} /\u003e\r\n```\r\n\r\nк°Ғ м»ҙнҸ¬л„ҢнҠёлҠ” мһҗмӢ мқҙ н•„мҡ”н•ң лҚ°мқҙн„°л§Ң propsлЎң л°ӣлҠ”лӢӨ. м „мІҙ `DashboardStats` к°қмІҙлҘј нҶөм§ёлЎң лӮҙлҰ¬м§Җ м•Ҡкі , page.tsxм—җм„ң кө¬мЎ° л¶„н•ҙн•ҳм—¬ **к°Ғ м»ҙнҸ¬л„ҢнҠёк°Җ н•„мҡ”н•ң мөңмҶҢн•ңмқҳ propsл§Ң м „лӢ¬**н•ңлӢӨ.\r\n\r\n---\r\n\r\n## м„ұлҠҘ мёЎм •\r\n\r\n### мёЎм • л°©лІ•\r\n\r\nмҲңм°Ё мӢӨн–үкіј лі‘л ¬ мӢӨн–үмқҳ м°ЁмқҙлҘј нҷ•мқён•ҳкё° мң„н•ҙ `console.time()`мңјлЎң `page.tsx`мқҳ лҚ°мқҙн„° нҺҳм№ӯ кө¬к°„мқ„ мёЎм •н–ҲлӢӨ.\r\n\r\n```ts\r\n// мҲңм°Ё мӢӨн–ү (л№„көҗ лҢҖмғҒ)\r\nconsole.time(\"dashboard-fetch\")\r\nconst stats = await fetchDashboardStats(userId)\r\nconst qualityTrend = await fetchDashboardQualityTrend(userId)\r\nconst issueSeverity = await fetchDashboardIssueSeverity(userId)\r\nconst recentPRs = await fetchDashboardRecentPRs(userId)\r\nconsole.timeEnd(\"dashboard-fetch\")\r\n\r\n// лі‘л ¬ мӢӨн–ү (м Ғмҡ© лІ„м „)\r\nconsole.time(\"dashboard-fetch\")\r\nconst [stats, qualityTrend, issueSeverity, recentPRs] = await Promise.all([...])\r\nconsole.timeEnd(\"dashboard-fetch\")\r\n```\r\n\r\n### кІ°кіј (cold start кё°мӨҖ)\r\n\r\n| мӢӨн–ү л°©мӢқ | мқ‘лӢө мӢңк°„ | л№„кі  |\r\n|-----------|----------|------|\r\n| мҲңм°Ё мӢӨн–ү | ~871ms | 4к°ң н•ЁмҲҳ м§Ғл ¬ мӢӨн–ү |\r\n| **Promise.all лі‘л ¬ мӢӨн–ү** | **~429ms** | к°ҖмһҘ лҠҗлҰ° н•ЁмҲҳ мӢңк°„м—җ мҲҳл ҙ |\r\n\r\n**м•Ҫ 2л°°(51%) лӢЁм¶•**. нҠ№нһҲ `fetchDashboardStats` лӮҙл¶Җмқҳ 6к°ң мҝјлҰ¬лҸ„ лі‘л ¬нҷ”лҗҳм–ҙ мһҲмңјлҜҖлЎң, мқҙ н•ЁмҲҳ лӢЁлҸ…мңјлЎңлҸ„ лӮҙл¶Җ мҲңм°Ё мӢӨн–ү лҢҖл№„ мғҒлӢ№н•ң к°ңм„ мқҙ мһҲлӢӨ.\r\n\r\n## м •лҰ¬\r\n\r\nм„ңлІ„ м»ҙнҸ¬л„ҢнҠём—җм„ң лҸ…лҰҪм Ғмқё лҚ°мқҙн„° мҶҢмҠӨлҘј лӢӨлЈ° л•Ң н•өмӢ¬мқҖ к°„лӢЁн•ҳлӢӨ.\r\n\r\n\u003e **мқҳмЎҙ кҙҖкі„к°Җ м—ҶлҠ” мҝјлҰ¬лҠ” `Promise.all()`лЎң лі‘л ¬ мӢӨн–үн•ҳлқј.**\r\n\r\nмқҙ н”„лЎңм қнҠём—җм„ң м Ғмҡ©н•ң мөңм Ғнҷ”лҘј мҡ”м•Ҫн•ҳл©ҙ лӢӨмқҢкіј к°ҷлӢӨ.\r\n\r\n| мөңм Ғнҷ” кё°лІ• | м Ғмҡ© мң„м№ҳ | нҡЁкіј |\r\n|------------|----------|------|\r\n| Promise.all() 2лӢЁкі„ лі‘л ¬нҷ” | `page.tsx` + `lib/dashboard.ts` | cold start 871ms вҶ’ 429ms (м•Ҫ 2л°° лӢЁм¶•) |\r\n| м„ңлІ„ м»ҙнҸ¬л„ҢнҠё м „мҡ© л ҢлҚ”л§Ғ | лҢҖмӢңліҙл“ң м»ҙнҸ¬л„ҢнҠё нҠёлҰ¬ м „мІҙ | нҒҙлқјмқҙм–ёнҠё JS лІҲл“Ө мөңмҶҢнҷ”, API лқјмҡ°нҠё л¶Ҳн•„мҡ” |\r\n| Prisma м§Ғм ‘ нҳём¶ң | `lib/dashboard.ts` | API лқјмҡ°нҠё кІҪмң  лҢҖл№„ л„ӨнҠёмӣҢнҒ¬ нҷү 1лӢЁкі„ м ңкұ° |\r\n| м„ лі„м Ғ select | `fetchDashboardRecentPRs` | н•„мҡ”н•ң н•„л“ңл§Ң мЎ°нҡҢн•ҳм—¬ м „мҶЎлҹү мөңмҶҢнҷ” |\r\n| TanStack Query staleTime | нҒҙлқјмқҙм–ёнҠё мӮ¬мқҙл“ң кё°лҠҘ (PR, лҢ“кёҖ, м•ҢлҰј л“ұ) | 60мҙҲ мқҙлӮҙ мһ¬мЎ°нҡҢ мӢң API нҳём¶ң мғқлһө |\r\n\r\nм„ңлІ„ м»ҙнҸ¬л„ҢнҠёмқҳ мһҘм җмқ„ м ңлҢҖлЎң мӮҙлҰ¬л Өл©ҙ, **лҚ°мқҙн„° нҺҳм№ӯмқҖ м„ңлІ„м—җм„ң лҒқлӮҙкі **, нҒҙлқјмқҙм–ёнҠём—җлҠ” **мҷ„м„ұлҗң кІ°кіјл§Ң м „лӢ¬**н•ҳлҠ” кІғмқҙ н•өмӢ¬мқҙлӢӨ. к·ёлҰ¬кі  м„ңлІ„м—җм„ң м—¬лҹ¬ лҚ°мқҙн„°лҘј к°Җм ёмҷҖм•ј н•  л•Ң, мҲңм°Ём ҒмңјлЎң `await` н•ҳм§Җ л§җкі  `Promise.all()`лЎң л¬¶м–ҙмЈјлҠ” кІғл§ҢмңјлЎңлҸ„ мІҙк°җ м„ұлҠҘмқҙ нҒ¬кІҢ лӢ¬лқјм§„лӢӨ.\r\n"}]},"__N_SSG":true},"page":"/posts/tag/[tag]","query":{"tag":"performance"},"buildId":"ZZIvuqctppkj_caIDL9HZ","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
