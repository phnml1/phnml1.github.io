•мқ„ лӢӨлӨҳлӢӨ.\r\n\r\nмқҙлІҲ нҺём—җм„ңлҠ” л“ңлһҳк·ё м•Ө л“ңлЎӯмқҳ **мӮ¬мҡ©м„ұ**мқ„ нҒ¬кІҢ мўҢмҡ°н•ҳлҠ” кё°лҠҘмқ„ лӢӨлЈ¬лӢӨ:\r\n\r\n- **мһҗлҸҷ мҠӨнҒ¬лЎӨ** - нҷ”л©ҙ кІҪкі„м—җм„ң мһҗлҸҷмңјлЎң мҠӨнҒ¬лЎӨлҗҳкІҢ н•ҳкё°\r\n\r\n---\r\n\r\n## мҷң мһҗлҸҷ мҠӨнҒ¬лЎӨмқҙ н•„мҡ”н•ңк°Җ?\r\n\r\nм№ёл°ҳліҙл“ңм—җ Dayк°Җ л§Һм•„м§Җл©ҙ м„ёлЎң мҠӨнҒ¬лЎӨмқҙ мғқкёҙлӢӨ. мқҙл•Ң л¬ём ңк°Җ н•ҳлӮҳ мғқкё°лҠ”лҚ°:\r\n\r\n\u003e м№ҙл“ңлҘј л“ңлһҳк·ён•ҙм„ң Day 3м—җм„ң Day 7лЎң мҳ®кё°кі  мӢ¶мқҖлҚ°... нҷ”л©ҙм—җ Day 7мқҙ м•Ҳ ліҙмқёлӢӨ?\r\n\r\nмҶҗк°ҖлқҪмқ„ л–јл©ҙ л“ңлһҳк·ёк°Җ лҒқлӮҳлІ„лҰ¬лӢҲ, л“ңлһҳк·ёлҘј мң м§Җн•ҳл©ҙм„ң мҠӨнҒ¬лЎӨн•  л°©лІ•мқҙ м—ҶлӢӨ.\r\n\r\n```\r\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\r\nв”Ӯ  Day 1                       в”Ӯ\r\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”җ                    в”Ӯ\r\nв”Ӯ  в”ӮCard Aв”Ӯ вҶҗ мқҙкұё л“ңлһҳк·ё мӨ‘    в”Ӯ\r\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                    в”Ӯ\r\nв”Ӯ  Day 2                       в”Ӯ\r\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”җ                    в”Ӯ\r\nв”Ӯ  в”ӮCard Bв”Ӯ                    в”Ӯ\r\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                    в”Ӯ\r\nв”Ӯ  Day 3                       в”Ӯ\r\nв”Ӯ  в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”җ                    в”Ӯ  вҶҗ нҷ”л©ҙ н•ҳлӢЁ кІҪкі„\r\nв”ңв”Җв”Җв”ӮCard Cв”Ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\r\nв”Ӯ  в””в”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                    в”Ӯ\r\nв”Ӯ  Day 4  (нҷ”л©ҙ л°–)             в”Ӯ  вҶҗ м—¬кё°лЎң мҳ®кё°кі  мӢ¶мқҖлҚ°\r\nв”Ӯ  Day 5  (нҷ”л©ҙ л°–)             в”Ӯ    мҠӨнҒ¬лЎӨмқҙ м•Ҳ лҗңлӢӨ!\r\nв”Ӯ  ...                         в”Ӯ\r\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\r\n```\r\n\r\n**н•ҙкІ°мұ…:** л“ңлһҳк·ё мӨ‘ мҶҗк°ҖлқҪмқҙ нҷ”л©ҙ кІҪкі„ к·јмІҳм—җ мҳӨл©ҙ мһҗлҸҷмңјлЎң мҠӨнҒ¬лЎӨн•ҙмЈјл©ҙ лҗңлӢӨ!\r\n\r\n---\r\n\r\n## мһҗлҸҷ мҠӨнҒ¬лЎӨмқҳ н•өмӢ¬ к°ңл…җ: мҠӨнҒ¬лЎӨ мЎҙ\r\n\r\nнҷ”л©ҙмқҳ мң„м•„лһҳм—җ **мҠӨнҒ¬лЎӨ мЎҙ(Scroll Zone)**мқҙлқјлҠ” к°ҖмғҒмқҳ мҳҒм—ӯмқ„ л§Ңл“ лӢӨ. л“ңлһҳк·ё мӨ‘ мҶҗк°ҖлқҪмқҙ мқҙ мҳҒм—ӯм—җ л“Өм–ҙмҳӨл©ҙ мһҗлҸҷ мҠӨнҒ¬лЎӨмқ„ мӢңмһ‘н•ҳкі , лІ—м–ҙлӮҳл©ҙ л©Ҳм¶ҳлӢӨ.\r\n\r\n```\r\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\r\nв”Ӯ в–’в–’в–’в–’в–’в–’ мғҒлӢЁ мҠӨнҒ¬лЎӨ мЎҙ в–’в–’в–’в–’в–’в–’ в”Ӯ вҶҗ threshold (40px)\r\nв”Ӯ  вҶ‘ м—¬кё°лЎң мҳӨл©ҙ мң„лЎң мҠӨнҒ¬лЎӨ    в”Ӯ\r\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\r\nв”Ӯ                              в”Ӯ\r\nв”Ӯ                              в”Ӯ\r\nв”Ӯ     мқјл°ҳ мҳҒм—ӯ                 в”Ӯ вҶҗ мҠӨнҒ¬лЎӨ м•Ҳ н•Ё\r\nв”Ӯ     (л“ңлһҳк·ёл§Ң мІҳлҰ¬)            в”Ӯ\r\nв”Ӯ                              в”Ӯ\r\nв”Ӯ                              в”Ӯ\r\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\r\nв”Ӯ  вҶ“ м—¬кё°лЎң мҳӨл©ҙ м•„лһҳлЎң мҠӨнҒ¬лЎӨ   в”Ӯ\r\nв”Ӯ в–’в–’в–’в–’в–’в–’ н•ҳлӢЁ мҠӨнҒ¬лЎӨ мЎҙ в–’в–’в–’в–’в–’в–’ в”Ӯ вҶҗ threshold (40px)\r\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\r\n```\r\n\r\nмқҙ к°ңл…җмқ„ мҪ”л“ңлЎң кө¬нҳ„н•ң кІғмқҙ `useAutoScroll` нӣ…мқҙлӢӨ.\r\n\r\n---\r\n\r\n## useAutoScroll нӣ… кө¬нҳ„\r\n\r\n### м„Өм •к°’кіј мғҒнғң\r\n\r\n```tsx\r\ninterface UseAutoScrollOptions {\r\n  scrollSpeed?: number;  // н•ң н”„л Ҳмһ„лӢ№ мҠӨнҒ¬лЎӨн•  н”Ҫм…Җ мҲҳ\r\n  threshold?: number;    // мҠӨнҒ¬лЎӨ мЎҙмқҳ нҒ¬кё° (px)\r\n}\r\n\r\nexport const useAutoScroll = (options: UseAutoScrollOptions = {}) =\u003e {\r\n  const { scrollSpeed = 15, threshold = 40 } = options;\r\n\r\n  const scrollViewRef = useRef\u003cScrollView\u003e(null);\r\n  const scrollOffsetRef = useRef(0);              // нҳ„мһ¬ мҠӨнҒ¬лЎӨ мң„м№ҳ\r\n  const isAutoScrollingRef = useRef(false);        // мһҗлҸҷ мҠӨнҒ¬лЎӨ мӨ‘мқём§Җ\r\n  const autoScrollDirectionRef = useRef\u003c'up' | 'down' | null\u003e(null);\r\n  const autoScrollFrameId = useRef\u003cnumber | null\u003e(null);  // rAF ID (м •лҰ¬мҡ©)\r\n\r\n  // ...\r\n};\r\n```\r\n\r\nл‘җ к°Җм§Җ м„Өм •к°’мқҙ мһҲлӢӨ:\r\n- **scrollSpeed (кё°ліёк°’: 15)** - н”„л Ҳмһ„лӢ№ мҠӨнҒ¬лЎӨн•  н”Ҫм…Җ мҲҳ. к°’мқҙ нҒҙмҲҳлЎқ л№ лҘҙкІҢ мҠӨнҒ¬лЎӨлҗңлӢӨ.\r\n- **threshold (кё°ліёк°’: 40)** - мҠӨнҒ¬лЎӨ мЎҙмқҳ нҒ¬кё°(px). нҷ”л©ҙ мң„/м•„лһҳм—җм„ң мқҙ лІ”мң„ м•Ҳм—җ мҶҗк°ҖлқҪмқҙ л“Өм–ҙмҳӨл©ҙ мҠӨнҒ¬лЎӨмқҙ мӢңмһ‘лҗңлӢӨ.\r\n\r\nлӘЁл“  мғҒнғңлҘј `useRef`лЎң кҙҖлҰ¬н•ҳлҠ” мқҙмң к°Җ мһҲлӢӨ. `useState`лҘј м“°л©ҙ л§Ө н”„л Ҳмһ„л§ҲлӢӨ лҰ¬л ҢлҚ”л§Ғмқҙ л°ңмғқн•ҳлҠ”лҚ°, мһҗлҸҷ мҠӨнҒ¬лЎӨмқҖ requestAnimationFrameмңјлЎң **л§Ө н”„л Ҳмһ„**(м•Ҫ 16ms к°„кІ©)л§ҲлӢӨ мӢӨн–үлҗҳкё° л•Ңл¬ём—җ лҰ¬л ҢлҚ”л§Ғмқҙ л°ңмғқн•ҳл©ҙ м„ұлҠҘмқҙ кёүкІ©нһҲ л–Ём–ҙм§„лӢӨ.\r\n\r\n### мҠӨнҒ¬лЎӨ мҳӨн”„м…Ӣ м¶”м Ғ\r\n\r\nмһҗлҸҷ мҠӨнҒ¬лЎӨмқ„ кө¬нҳ„н•ҳл Өл©ҙ лЁјм Җ **нҳ„мһ¬ мҠӨнҒ¬лЎӨ мң„м№ҳ**лҘј н•ӯмғҒ м•Ңкі  мһҲм–ҙм•ј н•ңлӢӨ.\r\n\r\n```tsx\r\nconst handleScroll = useCallback((event: ScrollEvent) =\u003e {\r\n  scrollOffsetRef.current = event.nativeEvent.contentOffset.y;\r\n}, []);\r\n```\r\n\r\nScrollViewмқҳ `onScroll` мқҙлІӨнҠём—җ м—°кІ°н•ҙм„ң, мҠӨнҒ¬лЎӨмқҙ л°ңмғқн•  л•Ңл§ҲлӢӨ нҳ„мһ¬ мҳӨн”„м…Ӣмқ„ refм—җ м ҖмһҘн•ңлӢӨ. мқҙ к°’мқҖ мһҗлҸҷ мҠӨнҒ¬лЎӨ мӢң \"м–ҙл””м„ңл¶Җн„° мҠӨнҒ¬лЎӨн• м§Җ\"мқҳ кё°мӨҖм җмқҙ лҗңлӢӨ.\r\n\r\n```tsx\r\n// TravelKanban/index.tsx\r\n\u003cScrollView\r\n  ref={scrollViewRef}\r\n  onScroll={handleScroll}\r\n  scrollEventThrottle={16}  // 16ms к°„кІ©мңјлЎң мқҙлІӨнҠё л°ңмғқ (60fps)\r\n\u003e\r\n```\r\n\r\n`scrollEventThrottle={16}`мқ„ м„Өм •н•ҙм•ј мҠӨнҒ¬лЎӨ мқҙлІӨнҠёк°Җ м¶©л¶„нһҲ мһҗмЈј л°ңмғқн•ңлӢӨ. мқҙкұё л№ лңЁлҰ¬л©ҙ мҠӨнҒ¬лЎӨ мң„м№ҳк°Җ л¶Җм •нҷ•н•ҙм ём„ң мһҗлҸҷ мҠӨнҒ¬лЎӨмқҙ лҡқлҡқ лҒҠкё°кІҢ лҗңлӢӨ.\r\n\r\n---\r\n\r\n### мһҗлҸҷ мҠӨнҒ¬лЎӨ мӢңмһ‘: requestAnimationFrame лЈЁн”„\r\n\r\nмһҗлҸҷ мҠӨнҒ¬лЎӨмқҳ н•өмӢ¬мқҖ **requestAnimationFrame(rAF) лЈЁн”„**лӢӨ.\r\n\r\n```tsx\r\nconst startAutoScroll = useCallback((direction: 'up' | 'down') =\u003e {\r\n  // мқҙлҜё к°ҷмқҖ л°©н–ҘмңјлЎң мҠӨнҒ¬лЎӨ мӨ‘мқҙл©ҙ л¬ҙмӢң\r\n  if (isAutoScrollingRef.current \u0026\u0026 autoScrollDirectionRef.current === direction) {\r\n    return;\r\n  }\r\n\r\n  // кё°мЎҙ мҠӨнҒ¬лЎӨ мӨ‘м§Җ нӣ„ мғҲлЎң мӢңмһ‘\r\n  stopAutoScroll();\r\n  isAutoScrollingRef.current = true;\r\n  autoScrollDirectionRef.current = direction;\r\n\r\n  const scroll = () =\u003e {\r\n    // мҠӨнҒ¬лЎӨмқҙ мӨ‘м§Җлҗҳм—Ҳмңјл©ҙ лЈЁн”„ нғҲм¶ң\r\n    if (!isAutoScrollingRef.current) return;\r\n\r\n    const currentOffset = scrollOffsetRef.current;\r\n    const newOffset = direction === 'up'\r\n      ? Math.max(0, currentOffset - scrollSpeed)   // мң„лЎң: мҳӨн”„м…Ӣ к°җмҶҢ\r\n      : currentOffset + scrollSpeed;                // м•„лһҳлЎң: мҳӨн”„м…Ӣ мҰқк°Җ\r\n\r\n    // л§Ё мң„м—җ лҸ„лӢ¬н•ҳл©ҙ мҠӨнҒ¬лЎӨ мӨ‘м§Җ\r\n    if (direction === 'up' \u0026\u0026 newOffset \u003c= 0) {\r\n      stopAutoScroll();\r\n      return;\r\n    }\r\n\r\n    // мӢӨм ң мҠӨнҒ¬лЎӨ мӢӨн–ү\r\n    if (scrollViewRef.current) {\r\n      scrollViewRef.current.scrollTo({\r\n        y: newOffset,\r\n        animated: false  // вҡ пёҸ мӨ‘мҡ”: falseм—¬м•ј мҰүмӢң мқҙлҸҷ\r\n      });\r\n    }\r\n\r\n    // лӢӨмқҢ н”„л Ҳмһ„м—җм„ң лӢӨмӢң мӢӨн–ү\r\n    autoScrollFrameId.current = requestAnimationFrame(scroll);\r\n  };\r\n\r\n  // лЈЁн”„ мӢңмһ‘\r\n  autoScrollFrameId.current = requestAnimationFrame(scroll);\r\n}, [scrollSpeed, stopAutoScroll]);\r\n```\r\n\r\n#### мҷң requestAnimationFrameмқёк°Җ?\r\n\r\nмһҗлҸҷ мҠӨнҒ¬лЎӨмқ„ кө¬нҳ„н•ҳлҠ” л°©лІ•мқҖ м—¬лҹ¬ к°Җм§Җк°Җ мһҲлӢӨ:\r\n\r\n| л°©лІ• | мһҘм җ | лӢЁм җ |\r\n|:------|:------|:------|\r\n| `setInterval` | кө¬нҳ„ к°„лӢЁ | н”„л Ҳмһ„кіј л¬ҙкҙҖн•ҳкІҢ мӢӨн–ү, лҒҠк№Җ л°ңмғқ |\r\n| `Animated.timing` | Native Driver мӮ¬мҡ© к°ҖлҠҘ | мҠӨнҒ¬лЎӨ мң„м№ҳлҘј м§Ғм ‘ м ңм–ҙн•ҳкё° м–ҙл ӨмӣҖ |\r\n| `requestAnimationFrame` | нҷ”л©ҙ мЈјмӮ¬мңЁм—җ л§һм¶° мӢӨн–ү, л¶Җл“ңлҹ¬мӣҖ | м§Ғм ‘ лЈЁн”„лҘј кҙҖлҰ¬н•ҙм•ј н•Ё |\r\n\r\n**requestAnimationFrame(rAF)**мқҖ лёҢлқјмҡ°м Җ/лҹ°нғҖмһ„мқҙ лӢӨмқҢ нҷ”л©ҙмқ„ к·ёлҰ¬кё° м§Ғм „м—җ мҪңл°ұмқ„ мӢӨн–үн•ңлӢӨ. мҰү, нҷ”л©ҙ мЈјмӮ¬мңЁ(ліҙнҶө 60fps)м—җ м •нҷ•нһҲ л§һм¶°м„ң мҠӨнҒ¬лЎӨмқҙ мӢӨн–үлҗҳлҜҖлЎң к°ҖмһҘ л¶Җл“ңлҹ¬мҡҙ кІ°кіјлҘј м–»мқ„ мҲҳ мһҲлӢӨ.\r\n\r\n#### animated: falseк°Җ мӨ‘мҡ”н•ң мқҙмң \r\n\r\n```tsx\r\nscrollViewRef.current.scrollTo({\r\n  y: newOffset,\r\n  animated: false  // мқҙкұ°!\r\n});\r\n```\r\n\r\n`animated: true`лЎң н•ҳл©ҙ ScrollViewк°Җ мһҗмІҙм ҒмңјлЎң мҠӨнҒ¬лЎӨ м• лӢҲл©”мқҙм…ҳмқ„ мӢӨн–үн•ҳлҠ”лҚ°, мқҙкІҢ rAF лЈЁн”„мҷҖ кІ№м№ҳл©ҙ **м„ңлЎң к°„м„ӯ**н•ҳл©ҙм„ң мҠӨнҒ¬лЎӨмқҙ лҚңлҚң л–ЁлҰ¬кІҢ лҗңлӢӨ. `animated: false`лЎң мҰүмӢң мқҙлҸҷмӢңнӮӨкі , rAF лЈЁн”„к°Җ л¶Җл“ңлҹ¬мӣҖмқ„ лӢҙлӢ№н•ҳлҠ” кІҢ мҳ¬л°”лҘё м—ӯн•  л¶„л°°лӢӨ.\r\n\r\n#### мһ¬к·Җм Ғ rAF лЈЁн”„ кө¬мЎ°\r\n\r\n```\r\nFrame 1: scroll() мӢӨн–ү вҶ’ scrollTo() вҶ’ rAF(scroll) мҳҲм•Ҫ\r\nFrame 2: scroll() мӢӨн–ү вҶ’ scrollTo() вҶ’ rAF(scroll) мҳҲм•Ҫ\r\nFrame 3: scroll() мӢӨн–ү вҶ’ scrollTo() вҶ’ rAF(scroll) мҳҲм•Ҫ\r\n  ...\r\nFrame N: scroll() мӢӨн–ү вҶ’ isAutoScrollingмқҙ false вҶ’ лЈЁн”„ мў…лЈҢ\r\n```\r\n\r\n`scroll` н•ЁмҲҳк°Җ мһҗкё° мһҗмӢ мқ„ лӢӨмқҢ н”„л Ҳмһ„м—җ мҳҲм•Ҫн•ҳлҠ” **мһ¬к·Җм Ғ нҢЁн„ҙ**мқҙлӢӨ. л©Ҳм¶ң л•ҢлҠ” `isAutoScrollingRef.current`лҘј `false`лЎң л°”кҫёл©ҙ лӢӨмқҢ н”„л Ҳмһ„м—җм„ң мһҗм—°мҠӨлҹҪкІҢ лЈЁн”„к°Җ лҒҠкёҙлӢӨ.\r\n\r\n---\r\n\r\n### мһҗлҸҷ мҠӨнҒ¬лЎӨ мӨ‘м§Җ\r\n\r\n```tsx\r\nconst stopAutoScroll = useCallback(() =\u003e {\r\n  if (autoScrollFrameId.current) {\r\n    cancelAnimationFrame(autoScrollFrameId.current);\r\n    autoScrollFrameId.current = null;\r\n  }\r\n  isAutoScrollingRef.current = false;\r\n  autoScrollDirectionRef.current = null;\r\n}, []);\r\n```\r\n\r\nмӨ‘м§ҖлҠ” л‘җ к°Җм§ҖлҘј лҸҷмӢңм—җ н•ңлӢӨ:\r\n1. **cancelAnimationFrame** - лӢӨмқҢ н”„л Ҳмһ„м—җ мҳҲм•Ҫлҗң мҪңл°ұмқ„ м·ЁмҶҢ\r\n2. **ref мҙҲкё°нҷ”** - мһ¬к·Җ лЈЁн”„ лӮҙл¶Җм—җм„ңлҸ„ мІҙнҒ¬н•ҳлҜҖлЎң нҷ•мӢӨн•ҳкІҢ мӨ‘м§ҖлҗЁ\r\n\r\nмҷң л‘җ к°Җм§ҖлҘј лӘЁл‘җ н•ҙм•ј н• к№Ң? `cancelAnimationFrame`л§Ң н•ҳл©ҙ мқҙлҜё мӢӨн–ү мӨ‘мқё `scroll()` н•ЁмҲҳк°Җ лҒқлӮҳкё° м „м—җ мғҲ rAFлҘј мҳҲм•Ҫн•  мҲҳ мһҲлӢӨ. refлҸ„ н•Ёк»ҳ мҙҲкё°нҷ”н•ҙм•ј `scroll()` лӮҙл¶Җмқҳ `if (!isAutoScrollingRef.current) return;` мІҙнҒ¬м—җм„ң нҷ•мӢӨнһҲ л©Ҳм¶ҳлӢӨ.\r\n\r\n---\r\n\r\n### л“ңлһҳк·ё мң„м№ҳм—җ л”°лҘё мҠӨнҒ¬лЎӨ нҢҗлӢЁ\r\n\r\nмқҙм ң н•өмӢ¬ лЎңм§ҒмқҙлӢӨ. л“ңлһҳк·ё мӨ‘ мҶҗк°ҖлқҪ мң„м№ҳлҘј л°ӣм•„м„ң **мҠӨнҒ¬лЎӨ мЎҙм—җ мһҲлҠ”м§Җ нҢҗлӢЁ**н•ҳлҠ” н•ЁмҲҳ:\r\n\r\n```tsx\r\nconst handleAutoScrollForDrag = useCallback((\r\n  cursorY: number,                   // мҶҗк°ҖлқҪмқҳ нҷ”л©ҙ Y мўҢн‘ң\r\n  scrollViewLayout: ScrollViewLayout  // ScrollViewмқҳ мң„м№ҳ/нҒ¬кё°\r\n) =\u003e {\r\n  const scrollViewTop = scrollViewLayout.y;\r\n  const scrollViewBottom = scrollViewLayout.y + scrollViewLayout.height;\r\n\r\n  // мғҒлӢЁ мҠӨнҒ¬лЎӨ мЎҙм—җ мһҲлҠ”к°Җ?\r\n  const isInTopScrollZone = cursorY \u003c= scrollViewTop + threshold;\r\n  // н•ҳлӢЁ мҠӨнҒ¬лЎӨ мЎҙм—җ мһҲлҠ”к°Җ?\r\n  const isInBottomScrollZone = cursorY \u003e= scrollViewBottom - threshold;\r\n\r\n  if (isInTopScrollZone \u0026\u0026 scrollOffsetRef.current \u003e 0) {\r\n    // мғҒлӢЁ мҠӨнҒ¬лЎӨ мЎҙ + м•„м§Ғ мң„лЎң мҠӨнҒ¬лЎӨн•  м—¬мң к°Җ мһҲмңјл©ҙ\r\n    if (!isAutoScrollingRef.current || autoScrollDirectionRef.current !== 'up') {\r\n      startAutoScroll('up');\r\n    }\r\n  } else if (isInBottomScrollZone) {\r\n    // н•ҳлӢЁ мҠӨнҒ¬лЎӨ мЎҙмқҙл©ҙ\r\n    if (!isAutoScrollingRef.current || autoScrollDirectionRef.current !== 'down') {\r\n      startAutoScroll('down');\r\n    }\r\n  } else {\r\n    // мҠӨнҒ¬лЎӨ мЎҙ л°–мқҙл©ҙ вҶ’ мӨ‘м§Җ\r\n    if (isAutoScrollingRef.current) {\r\n      stopAutoScroll();\r\n    }\r\n  }\r\n}, [threshold, startAutoScroll, stopAutoScroll]);\r\n```\r\n\r\nмӢңк°Ғм ҒмңјлЎң н‘ңнҳ„н•ҳл©ҙ:\r\n\r\n```\r\n                  scrollViewTop (= scrollViewLayout.y)\r\n                        в”Ӯ\r\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–јв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\r\nв”Ӯ в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’ в”Ӯ\r\nв”Ӯ в–’  мғҒлӢЁ мҠӨнҒ¬лЎӨ мЎҙ (scrollViewTop + threshold)   в–’ в”Ӯ\r\nв”Ӯ в–’  cursorY вүӨ м—¬кё°л©ҙ вҶ’ startAutoScroll('up')     в–’ в”Ӯ\r\nв”Ӯ в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’ в”Ӯ\r\nв”Ӯ                                                   в”Ӯ\r\nв”Ӯ              мқјл°ҳ мҳҒм—ӯ                             в”Ӯ\r\nв”Ӯ              вҶ’ stopAutoScroll()                   в”Ӯ\r\nв”Ӯ                                                   в”Ӯ\r\nв”Ӯ в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’ в”Ӯ\r\nв”Ӯ в–’  н•ҳлӢЁ мҠӨнҒ¬лЎӨ мЎҙ (scrollViewBottom - threshold) в–’ в”Ӯ\r\nв”Ӯ в–’  cursorY вүҘ м—¬кё°л©ҙ вҶ’ startAutoScroll('down')   в–’ в”Ӯ\r\nв”Ӯ в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’в–’ в”Ӯ\r\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв–Ів”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\r\n                        в”Ӯ\r\n                  scrollViewBottom\r\n```\r\n\r\n#### мӨ‘ліө мӢӨн–ү л°©м§Җ\r\n\r\n```tsx\r\nif (!isAutoScrollingRef.current || autoScrollDirectionRef.current !== 'up') {\r\n  startAutoScroll('up');\r\n}\r\n```\r\n\r\nмқҙ мЎ°кұҙмқҙ м—Ҷмңјл©ҙ `handleAutoScrollForDrag`к°Җ нҳём¶ңлҗ  л•Ңл§ҲлӢӨ (л§Ө н”„л Ҳмһ„л§ҲлӢӨ!) `startAutoScroll`мқҙ нҳём¶ңлҗҳм–ҙ rAF лЈЁн”„к°Җ л¬ҙн•ңнһҲ мғқм„ұлҗңлӢӨ. **мқҙлҜё к°ҷмқҖ л°©н–ҘмңјлЎң мҠӨнҒ¬лЎӨ мӨ‘мқҙл©ҙ л¬ҙмӢң**н•ҳлҠ” кІғмқҙ н•өмӢ¬мқҙлӢӨ.\r\n\r\n---\r\n\r\n## л“ңлһҳк·ё мӢңмҠӨн…ңкіјмқҳ нҶөн•©\r\n\r\n`useAutoScroll` нӣ…мқҖ лӢЁлҸ…мңјлЎң лҸҷмһ‘н•ҳм§Җ м•ҠлҠ”лӢӨ. `TravelKanban/index.tsx`м—җм„ң л“ңлһҳк·ё мқҙлІӨнҠёмҷҖ м—°кІ°лҗңлӢӨ.\r\n\r\n```tsx\r\n// TravelKanban/index.tsx\r\n\r\nconst handleEnhancedDragMove = useCallback((\r\n  x: number,\r\n  y: number,\r\n  gestureState: GestureState,\r\n  evt: GestureResponderEvent,\r\n  initialPosition: { x: number; y: number }\r\n) =\u003e {\r\n  // 1. мһҗлҸҷ мҠӨнҒ¬лЎӨ мІҳлҰ¬\r\n  if (scrollViewLayoutRef.current.height) {\r\n    handleAutoScrollForDrag(y, scrollViewLayoutRef.current);\r\n  }\r\n\r\n  // 2. л“ңлһҳк·ё мқҙлҸҷ мІҳлҰ¬ (Floating Card мң„м№ҳ м—…лҚ°мқҙнҠё)\r\n  handleDragMove(x, y, gestureState, evt, initialPosition);\r\n}, [handleAutoScrollForDrag, handleDragMove]);\r\n```\r\n\r\n`handleEnhancedDragMove`к°Җ **мһҗлҸҷ мҠӨнҒ¬лЎӨ**кіј **Floating Card мқҙлҸҷ**мқ„ н•ҳлӮҳлЎң л¬¶лҠ” м—ӯн• мқ„ н•ңлӢӨ. `PanResponder`мқҳ `onPanResponderMove`м—җм„ң л§Ө н”„л Ҳмһ„л§ҲлӢӨ нҳём¶ңлҗҳлҜҖлЎң, мҶҗк°ҖлқҪмқҙ мӣҖм§Ғмқј л•Ңл§ҲлӢӨ мҠӨнҒ¬лЎӨ мЎҙ м§„мһ… м—¬л¶ҖлҘј мһҗм—°мҠӨлҹҪкІҢ мІҙнҒ¬н•  мҲҳ мһҲлӢӨ.\r\n\r\n### м „мІҙ нқҗлҰ„\r\n\r\n```\r\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\r\nв”Ӯ                    мһҗлҸҷ мҠӨнҒ¬лЎӨ м „мІҙ нқҗлҰ„                              в”Ӯ\r\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\r\nв”Ӯ                                                                    в”Ӯ\r\nв”Ӯ   User: м№ҙл“ңлҘј л“ңлһҳк·ён•ҳл©ҙм„ң нҷ”л©ҙ н•ҳлӢЁмңјлЎң мқҙлҸҷ                        в”Ӯ\r\nв”Ӯ                                                                    в”Ӯ\r\nв”Ӯ   в‘  PanResponder.onMove                                           в”Ӯ\r\nв”Ӯ   в”Ӯ  в””вҶ’ pageY = 750 (нҷ”л©ҙ н•ҳлӢЁ к·јмІҳ)                               в”Ӯ\r\nв”Ӯ   в”Ӯ                                                                в”Ӯ\r\nв”Ӯ   в‘Ў handleEnhancedDragMove(x, 750, ...)                           в”Ӯ\r\nв”Ӯ   в”Ӯ  в”ңвҶ’ handleAutoScrollForDrag(750, scrollViewLayout)             в”Ӯ\r\nв”Ӯ   в”Ӯ  в”Ӯ   в””вҶ’ 750 \u003e= scrollViewBottom - 40?                         в”Ӯ\r\nв”Ӯ   в”Ӯ  в”Ӯ       в””вҶ’ YES вҶ’ startAutoScroll('down')                     в”Ӯ\r\nв”Ӯ   в”Ӯ  в”Ӯ                                                            в”Ӯ\r\nв”Ӯ   в”Ӯ  в””вҶ’ handleDragMove(x, 750, ...)                               в”Ӯ\r\nв”Ӯ   в”Ӯ      в””вҶ’ floatingPan.setValue({ x: dx, y: dy })                в”Ӯ\r\nв”Ӯ   в”Ӯ                                                                в”Ӯ\r\nв”Ӯ   в‘ў rAF лЈЁн”„ мӢңмһ‘                                                  в”Ӯ\r\nв”Ӯ   в”Ӯ  Frame 1: scrollTo({ y: offset + 15 }) вҶ’ rAF(scroll)         в”Ӯ\r\nв”Ӯ   в”Ӯ  Frame 2: scrollTo({ y: offset + 30 }) вҶ’ rAF(scroll)         в”Ӯ\r\nв”Ӯ   в”Ӯ  Frame 3: scrollTo({ y: offset + 45 }) вҶ’ rAF(scroll)         в”Ӯ\r\nв”Ӯ   в”Ӯ  ...                                                           в”Ӯ\r\nв”Ӯ   в”Ӯ                                                                в”Ӯ\r\nв”Ӯ   в‘Ј User: мҶҗк°ҖлқҪмқ„ лӢӨмӢң нҷ”л©ҙ мӨ‘м•ҷмңјлЎң мқҙлҸҷ                            в”Ӯ\r\nв”Ӯ   в”Ӯ  в””вҶ’ handleAutoScrollForDrag(400, scrollViewLayout)             в”Ӯ\r\nв”Ӯ   в”Ӯ      в””вҶ’ мҠӨнҒ¬лЎӨ мЎҙ л°– вҶ’ stopAutoScroll()                       в”Ӯ\r\nв”Ӯ   в”Ӯ                                                                в”Ӯ\r\nв”Ӯ   в‘Ө rAF лЈЁн”„ мў…лЈҢ                                                  в”Ӯ\r\nв”Ӯ      в””вҶ’ cancelAnimationFrame + ref мҙҲкё°нҷ”                          в”Ӯ\r\nв”Ӯ                                                                    в”Ӯ\r\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\r\n```\r\n\r\n### л“ңлһҳк·ё мў…лЈҢ мӢң мһҗлҸҷ мҠӨнҒ¬лЎӨ м •лҰ¬\r\n\r\nн•ң к°Җм§Җ лҚ” мӨ‘мҡ”н•ң нҸ¬мқёнҠёк°Җ мһҲлӢӨ. л“ңлһҳк·ёк°Җ лҒқлӮҳл©ҙ мһҗлҸҷ мҠӨнҒ¬лЎӨлҸ„ л°ҳл“ңмӢң мӨ‘м§Җн•ҙм•ј н•ңлӢӨ.\r\n\r\n```tsx\r\n// useDragDrop.ts - handleDragEnd лӮҙл¶Җ\r\nconst handleDragEnd = useCallback((y, dayData, setDayData) =\u003e {\r\n  stopAutoScroll();  // вҶҗ л“ңлһҳк·ё мў…лЈҢ мӢң к°ҖмһҘ лЁјм Җ!\r\n  // ... л“ңлЎӯ мІҳлҰ¬ ...\r\n}, [/* deps */]);\r\n```\r\n\r\nмқҙкұё л№ лңЁлҰ¬л©ҙ? мҶҗк°ҖлқҪмқ„ л–јлҸ„ мҠӨнҒ¬лЎӨмқҙ кі„мҶҚ лҸҢм•„к°„лӢӨ...! rAF лЈЁн”„лҠ” PanResponderмҷҖ лҸ…лҰҪм ҒмңјлЎң лҸҷмһ‘н•ҳкё° л•Ңл¬ём—җ, лӘ…мӢңм ҒмңјлЎң л©Ҳм¶°мӨҳм•ј н•ңлӢӨ.\r\n\r\n---\r\n\r\n## кө¬нҳ„н•ҳл©ҙм„ң л§ҢлӮ¬лҚҳ н•Ём •л“Ө\r\n\r\n### 1. scrollEventThrottle лҲ„лқҪ\r\n\r\n```tsx\r\n// вқҢ scrollEventThrottle м—Ҷмқҙ\r\n\u003cScrollView onScroll={handleScroll}\u003e\r\n\r\n// вң… scrollEventThrottle м„Өм •\r\n\u003cScrollView onScroll={handleScroll} scrollEventThrottle={16}\u003e\r\n```\r\n\r\n`scrollEventThrottle`мқ„ м„Өм •н•ҳм§Җ м•Ҡмңјл©ҙ iOSм—җм„ң мҠӨнҒ¬лЎӨ мқҙлІӨнҠёк°Җ л§Өмҡ° л“ңл¬јкІҢ л°ңмғқн•ңлӢӨ. мһҗлҸҷ мҠӨнҒ¬лЎӨлЎң `scrollTo`лҘј нҳём¶ңн•ҙлҸ„ `onScroll` мқҙлІӨнҠёк°Җ м¶©л¶„нһҲ л№ лҘҙкІҢ мҳӨм§Җ м•Ҡм•„м„ң `scrollOffsetRef`к°Җ м—…лҚ°мқҙнҠёлҗҳм§Җ м•Ҡкі , лӢӨмқҢ мҠӨнҒ¬лЎӨ кі„мӮ°мқҙ нӢҖм–ҙм§„лӢӨ.\r\n\r\n### 2. animated: trueлЎң мқён•ң л–ЁлҰј\r\n\r\nмІҳмқҢм—җлҠ” мһҗм—°мҠӨлҹҪкІҢ ліҙмқҙлқјкі  `animated: true`лЎң н–Ҳм—ҲлӢӨ.\r\n\r\n```tsx\r\n// вқҢ rAF лЈЁн”„ м•Ҳм—җм„ң animated: true\r\nscrollViewRef.current.scrollTo({ y: newOffset, animated: true });\r\n```\r\n\r\nн•ҳм§Җл§Ң ScrollViewмқҳ лӮҙмһҘ м• лӢҲл©”мқҙм…ҳкіј rAF лЈЁн”„к°Җ кІҪмҹҒн•ҳл©ҙм„ң мҠӨнҒ¬лЎӨмқҙ м•һл’ӨлЎң мҷ”лӢӨ к°”лӢӨ н•ҳлҠ” м§„лҸҷ нҳ„мғҒмқҙ л°ңмғқн–ҲлӢӨ. к°Ғмһҗмқҳ м—ӯн• мқ„ лӘ…нҷ•нһҲ л¶„лҰ¬н•ҙм•ј н•ңлӢӨ:\r\n- **rAF лЈЁн”„** вҶ’ л§Ө н”„л Ҳмһ„ мғҲ мң„м№ҳ кі„мӮ°\r\n- **scrollTo** вҶ’ кі„мӮ°лҗң мң„м№ҳлЎң мҰүмӢң мқҙлҸҷ (animated: false)\r\n\r\n### 3. мғҒнғң кҙҖлҰ¬лҘј useStateлЎң н–ҲлӢӨк°Җ м„ұлҠҘ л¬ём ң\r\n\r\nмІҳмқҢм—җлҠ” `isAutoScrolling`мқ„ `useState`лЎң кҙҖлҰ¬н–ҲлӢӨ.\r\n\r\n```tsx\r\n// вқҢ л§Ө н”„л Ҳмһ„л§ҲлӢӨ лҰ¬л ҢлҚ”л§Ғ л°ңмғқ\r\nconst [isAutoScrolling, setIsAutoScrolling] = useState(false);\r\n```\r\n\r\nrAF лЈЁн”„ м•Ҳм—җм„ң stateлҘј ліҖкІҪн•ҳл©ҙ л§Ө н”„л Ҳмһ„л§ҲлӢӨ лҰ¬л ҢлҚ”л§Ғмқҙ л°ңмғқн•ңлӢӨ. 60fpsм—җм„ң лҰ¬л ҢлҚ”л§Ғмқҙ кІ№м№ҳл©ҙ н”„л Ҳмһ„ л“ңлЎӯмқҙ л°ңмғқн•ҳкі , л“ңлһҳк·ё мӨ‘мқё Floating Cardмқҳ мӣҖм§Ғмһ„к№Ңм§Җ лІ„лІ…кұ°лҰ¬кІҢ лҗңлӢӨ.\r\n\r\n```tsx\r\n// вң… refлЎң кҙҖлҰ¬ вҶ’ лҰ¬л ҢлҚ”л§Ғ м—Ҷмқҙ к°’л§Ң м—…лҚ°мқҙнҠё\r\nconst isAutoScrollingRef = useRef(false);\r\n```\r\n\r\nмһҗлҸҷ мҠӨнҒ¬лЎӨмқҳ мғҒнғңлҠ” **нҷ”л©ҙм—җ м§Ғм ‘ н‘ңмӢңлҗҳлҠ” к°’мқҙ м•„лӢҲлӢӨ.** к·ёлһҳм„ң `useRef`лЎң кҙҖлҰ¬н•ҳлҠ” кІғмқҙ м •лӢөмқҙлӢӨ.\r\n\r\n### 4. л°©н–Ҙ м „нҷҳ мӢң мқҙм „ лЈЁн”„к°Җ лӮЁм•„мһҲлҠ” л¬ём ң\r\n\r\n```tsx\r\n// вқҢ л°©н–Ҙ м „нҷҳ мӢң мқҙм „ лЈЁн”„лҘј м •лҰ¬н•ҳм§Җ м•Ҡмңјл©ҙ\r\nstartAutoScroll('down');\r\n// ... мҶҗк°ҖлқҪмқҙ мң„лЎң мқҙлҸҷ ...\r\nstartAutoScroll('up');\r\n// вҶ’ л‘җ к°ңмқҳ rAF лЈЁн”„к°Җ лҸҷмӢңм—җ мӢӨн–ү!\r\n// вҶ’ м•„лһҳлЎң 15px, мң„лЎң 15px вҶ’ м ңмһҗлҰ¬м—җм„ң л–ЁлҰј\r\n```\r\n\r\n`startAutoScroll` мӢңмһ‘ мӢң `stopAutoScroll()`мқ„ лЁјм Җ нҳём¶ңн•ҳлҠ” мқҙмң к°Җ л°”лЎң мқҙкІғмқҙлӢӨ.\r\n\r\n```tsx\r\nconst startAutoScroll = useCallback((direction: 'up' | 'down') =\u003e {\r\n  // мқҙлҜё к°ҷмқҖ л°©н–Ҙмқҙл©ҙ л¬ҙмӢң\r\n  if (isAutoScrollingRef.current \u0026\u0026 autoScrollDirectionRef.current === direction) {\r\n    return;\r\n  }\r\n\r\n  stopAutoScroll();  // вҶҗ кё°мЎҙ лЈЁн”„ нҷ•мӢӨнһҲ м •лҰ¬\r\n  // ... мғҲ лЈЁн”„ мӢңмһ‘ ...\r\n}, [scrollSpeed, stopAutoScroll]);\r\n```\r\n\r\n## л§Ҳм№ҳл©°\r\n\r\nмһҗлҸҷ мҠӨнҒ¬лЎӨмқҖ кө¬нҳ„ мһҗмІҙлҠ” лӢЁмҲңн•ҙ ліҙмқҙм§Җл§Ң, мӢӨм ңлЎң л¶Җл“ңлҹҪкІҢ лҸҷмһ‘н•ҳкІҢ л§Ңл“Өл Өл©ҙ м„ёмӢ¬н•ң мЈјмқҳк°Җ н•„мҡ”н•ҳлӢӨ.\r\n\r\nн•өмӢ¬ нҸ¬мқёнҠёлҘј м •лҰ¬н•ҳл©ҙ:\r\n\r\n- **мҠӨнҒ¬лЎӨ мЎҙ**: нҷ”л©ҙ кІҪкі„м—җ к°ҖмғҒмқҳ мҳҒм—ӯмқ„ л§Ңл“Өм–ҙ мҠӨнҒ¬лЎӨ нҠёлҰ¬кұ°лЎң мӮ¬мҡ©\r\n- **requestAnimationFrame**: нҷ”л©ҙ мЈјмӮ¬мңЁм—җ л§һм¶ҳ л¶Җл“ңлҹ¬мҡҙ мҠӨнҒ¬лЎӨ кө¬нҳ„\r\n- **ref кё°л°ҳ мғҒнғң кҙҖлҰ¬**: л§Ө н”„л Ҳмһ„ м—…лҚ°мқҙнҠём—җлҸ„ лҰ¬л ҢлҚ”л§Ғ м—Ҷмқҙ 60fps мң м§Җ\r\n- **animated: false**: rAF лЈЁн”„мҷҖ ScrollView лӮҙмһҘ м• лӢҲл©”мқҙм…ҳмқҳ м¶©лҸҢ л°©м§Җ\r\n\r\nмқҙлІҲ нҺёк№Ңм§Җ н•ҙм„ң л“ңлһҳк·ё м•Ө л“ңлЎӯмқҳ н•өмӢ¬ кё°лҠҘл“Өмқ„ лӘЁл‘җ лӢӨлӨҳлӢӨ:\r\n1. [1нҺё] PanResponderмҷҖ м ҲлҢҖ мўҢн‘ң мӢңмҠӨн…ң\r\n2. [2нҺё] л Ҳмқҙм•„мӣғ мёЎм •кіј л“ңлЎӯ нғҖкІҹ кі„мӮ°\r\n3. [3нҺё] Portal нҢЁн„ҙмқҳ Floating Card\r\n4. [4нҺё] requestAnimationFrame кё°л°ҳ мһҗлҸҷ мҠӨнҒ¬лЎӨ\r\n\r\nлқјмқҙлёҢлҹ¬лҰ¬ м—Ҷмқҙ м§Ғм ‘ кө¬нҳ„н•ҳл©ҙм„ң м •л§җ л§ҺмқҖ кІғмқ„ л°°мҡё мҲҳ мһҲм—ҲлӢӨ. нҠ№нһҲ React Nativeм—җм„ң м„ұлҠҘмқ„ мӢ кІҪ м“°л©ҙм„ң мқён„°лһҷм…ҳмқ„ кө¬нҳ„н•ҳлҠ” л°©лІ•м—җ лҢҖн•ҙ л§Һмқҙ к№ЁлӢ¬м•ҳлҚҳ кІғ к°ҷлӢӨ.\r\n\r\nкёҖмқ„ мқҪм–ҙмЈјм…”м„ң к°җмӮ¬н•©лӢҲлӢӨ!\r\n"},{"slug":"posts/React Native/React Native м№ёл°ҳліҙл“ң л“ңлһҳк·ё м•Ө л“ңлЎӯ кө¬нҳ„кё°_3","title":"React Native м№ёл°ҳліҙл“ң л“ңлһҳк·ё м•Ө л“ңлЎӯ кө¬нҳ„кё° (3)","date":"2026-01-24T22:00:00.000Z","image":"index.png","summary":"Floating CardлҘј Portal нҢЁн„ҙмңјлЎң кө¬нҳ„н•ҳм—¬ л“ңлһҳк·ё м•Ө л“ңлЎӯмқҳ мӢңк°Ғм Ғ мҷ„м„ұлҸ„лҘј лҶ’мқҙлҠ” л°©лІ•мқ„ лӢӨлЈ№лӢҲлӢӨ.","tags":["react native","л“ңлһҳк·ё м•Ө л“ңлЎӯ","Portal","Context API","Animated"],"content":"\n# React Native м№ёл°ҳліҙл“ң л“ңлһҳк·ё м•Ө л“ңлЎӯ кө¬нҳ„кё°(3)\n\n## м„ңлЎ \n\n2нҺём—җм„ңлҠ” л Ҳмқҙм•„мӣғ мёЎм •кіј л“ңлЎӯ нғҖкІҹ кі„мӮ°, кё°ліём Ғмқё л“ңлһҳк·ё мғҒнғң кҙҖлҰ¬лҘј кө¬нҳ„н–ҲлӢӨ.\n\nмқҙлІҲ нҺём—җм„ңлҠ” л“ңлһҳк·ё м•Ө л“ңлЎӯмқҳ **мӢңк°Ғм Ғ мҷ„м„ұлҸ„**лҘј лҶ’мқҙлҠ” н•өмӢ¬ кё°лҠҘмқ„ лӢӨлЈ¬лӢӨ:\n\n- **Floating Card** - Portal нҢЁн„ҙмңјлЎң л“ңлһҳк·ё мӨ‘мқё м№ҙл“ңлҘј мөңмғҒмң„м—җ л ҢлҚ”л§Ғ\n\n---\n\n## Floating Card: Portal нҢЁн„ҙ\n\n### мҷң Portalмқҙ н•„мҡ”н•ңк°Җ?\n\nл“ңлһҳк·ё м•Ө л“ңлЎӯм—җм„ң к°ҖмһҘ к№ҢлӢӨлЎңмҡҙ л¶Җл¶„ мӨ‘ н•ҳлӮҳлҠ” **л“ңлһҳк·ё мӨ‘мқё м№ҙл“ңлҘј м–ҙл””м—җ л ҢлҚ”л§Ғн•  кІғмқёк°Җ**лӢӨ.\n\nмІҳмқҢм—җлҠ” лӢЁмҲңн•ҳкІҢ мғқк°Ғн–ҲлӢӨ:\n\u003e \"к·ёлғҘ мӣҗлһҳ м№ҙл“ңлҘј л“ңлһҳк·ён•ҳл©ҙ лҗҳм§Җ м•ҠлӮҳ?\"\n\nн•ҳм§Җл§Ң мӢӨм ңлЎң н•ҙліҙлӢҲ м—¬лҹ¬ л¬ём ңк°Җ л°ңмғқн–ҲлӢӨ:\n\n```\nл¬ём ң 1: z-index мқҙмҠҲ\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  Day 1          Day 2      в”Ӯ\nв”Ӯ в”Ңв”Җв”Җв”Җв”Җв”Җв”җ       в”Ңв”Җв”Җв”Җв”Җв”Җв”җ      в”Ӯ\nв”Ӯ в”ӮCard в”Ӯ  вҶ’вҶ’вҶ’  в”ӮCard в”Ӯ      в”Ӯ  вҶҗ л“ңлһҳк·ё мӨ‘мқё м№ҙл“ңк°Җ\nв”Ӯ в”Ӯ A   в”Ӯ       в”Ӯ B   в”Ӯ      в”Ӯ    Day 2 м№ҙл“ң м•„лһҳлЎң к°Җл Өм§җ!\nв”Ӯ в””в”Җв”Җв”Җв”Җв”Җв”ҳ       в””в”Җв”Җв”Җв”Җв”Җв”ҳ      в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n\nл¬ём ң 2: л¶ҖлӘЁ м»ҙнҸ¬л„ҢнҠё overflow\n- ScrollView лӮҙл¶Җмқҳ м№ҙл“ңлҠ” мҠӨнҒ¬лЎӨ мҳҒм—ӯм—җ к°Үнһҳ\n- л“ңлһҳк·ён•ҙм„ң мҳҒм—ӯ л°–мңјлЎң лӮҳк°Җл©ҙ мһҳл ӨлІ„лҰј\n\nл¬ём ң 3: л Ҳмқҙм•„мӣғ мҳҒн–Ҙ\n- мӣҗлһҳ мң„м№ҳм—җм„ң м№ҙл“ңк°Җ мӮ¬лқјм§Җл©ҙ лӢӨлҘё м№ҙл“ңл“Өмқҙ мң„лЎң мҳ¬лқјмҳҙ\n- мӢңк°Ғм ҒмңјлЎң л§Өмҡ° м–ҙмғүн•Ё\n```\n\n**н•ҙкІ°мұ…: Portal нҢЁн„ҙ**\n\nPortalмқҖ Reactм—җм„ң **м»ҙнҸ¬л„ҢнҠёлҘј DOM нҠёлҰ¬мқҳ лӢӨлҘё мң„м№ҳм—җ л ҢлҚ”л§Ғ**н•ҳлҠ” нҢЁн„ҙмқҙлӢӨ.\nReact Nativeм—җм„ңлҠ” м§Ғм ‘ кө¬нҳ„н•ҙм•ј н•ҳм§Җл§Ң, мӣҗлҰ¬лҠ” к°ҷлӢӨ:\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  App Root                               в”Ӯ\nв”Ӯ  в”ңв”Җв”Җ TravelPlanKanban                   в”Ӯ\nв”Ӯ  в”Ӯ   в”ңв”Җв”Җ Day 1                          в”Ӯ\nв”Ӯ  в”Ӯ   в”Ӯ   в””в”Җв”Җ Card A (opacity: 0.3)      в”Ӯ  вҶҗ мӣҗліёмқҖ нқҗлҰ¬кІҢ\nв”Ӯ  в”Ӯ   в””в”Җв”Җ Day 2                          в”Ӯ\nв”Ӯ  в”Ӯ       в””в”Җв”Җ Card B                     в”Ӯ\nв”Ӯ  в”Ӯ                                      в”Ӯ\nв”Ӯ  в””в”Җв”Җ FloatingLayer (z-index: 9999)      в”Ӯ\nв”Ӯ      в””в”Җв”Җ Floating Card A                в”Ӯ  вҶҗ ліөм ңліёмқҙ мөңмғҒмң„м—җ!\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n---\n\n### FloatingPortal кө¬нҳ„н•ҳкё°\n\n#### 1лӢЁкі„: Context мғқм„ұ\n\nлЁјм Җ, м–ҙл””м„ңл“  Floating CardлҘј мғқм„ұ/м ңкұ°н•  мҲҳ мһҲлҸ„лЎқ ContextлҘј л§Ңл“ лӢӨ.\n\n```tsx\n// FloatingPortal.tsx\n\nimport React, { useCallback, useRef, useState } from 'react';\nimport { Animated, View } from 'react-native';\n\n// ========================================\n// нғҖмһ… м •мқҳ\n// ========================================\ntype Plan = {\n  type: string;\n  image?: string;\n  place?: string;\n  address?: string;\n};\n\ntype Layout = {\n  x: number;\n  y: number;\n  width: number;\n  height: number;\n};\n\ntype Position = {\n  x: number;\n  y: number;\n};\n\n// ========================================\n// Context мғқм„ұ\n// ========================================\n// ContextлҘј нҶөн•ҙ н•ҳмң„ м»ҙнҸ¬л„ҢнҠёл“Өмқҙ Floating CardлҘј м ңм–ҙн•  мҲҳ мһҲкІҢ н•Ё\nexport const FloatingPortalContext = React.createContext\u003c{\n  // Floating CardлҘј мғқм„ұн•ҳлҠ” н•ЁмҲҳ\n  createFloatingCard: (\n    item: Plan,\n    dayId: string,\n    index: number,\n    layout: Layout,\n    initialPosition: Position,\n    gestureState: { dx: number; dy: number }\n  ) =\u003e void;\n  // Floating CardлҘј м ңкұ°н•ҳлҠ” н•ЁмҲҳ\n  removeFloatingElement: () =\u003e void;\n  // л“ңлһҳк·ё мқҙлҸҷлҹүмқ„ л°ҳмҳҒн•  Animated к°’\n  floatingPan: Animated.ValueXY;\n  // нҺҳмқҙл“ңмқё/м•„мӣғмқ„ мң„н•ң нҲ¬лӘ…лҸ„ Animated к°’\n  floatingOpacity: Animated.Value;\n} | null\u003e(null);\n```\n\n#### 2лӢЁкі„: Provider кө¬нҳ„\n\nмқҙм ң мӢӨм ңлЎң Floating CardлҘј л ҢлҚ”л§Ғн•ҳлҠ” ProviderлҘј л§Ңл“ лӢӨ.\n\n```tsx\n// FloatingPortal.tsx (кі„мҶҚ)\n\nexport const FloatingPortalProvider = ({ children }: { children: React.ReactNode }) =\u003e {\n  // ========================================\n  // мғҒнғң кҙҖлҰ¬\n  // ========================================\n\n  // нҳ„мһ¬ н‘ңмӢң мӨ‘мқё Floating Card (м—Ҷмңјл©ҙ null)\n  const [floatingElement, setFloatingElement] = useState\u003cReact.ReactElement | null\u003e(null);\n\n  // л“ңлһҳк·ё мқҙлҸҷлҹүмқ„ м¶”м Ғн•ҳлҠ” Animated к°’\n  // useRefлЎң к°җмӢём„ң лҰ¬л ҢлҚ”л§Ғн•ҙлҸ„ лҸҷмқјн•ң мқёмҠӨн„ҙмҠӨ мң м§Җ\n  const floatingPan = useRef(new Animated.ValueXY()).current;\n\n  // нҲ¬лӘ…лҸ„лҘј м¶”м Ғн•ҳлҠ” Animated к°’ (нҺҳмқҙл“ңмқё/м•„мӣғ нҡЁкіјмҡ©)\n  const floatingOpacity = useRef(new Animated.Value(0)).current;\n\n  // ========================================\n  // Floating Card мғқм„ұ н•ЁмҲҳ\n  // ========================================\n  const createFloatingCard = useCallback((\n    item: Plan,           // л“ңлһҳк·ё мӨ‘мқё м•„мқҙн…ң лҚ°мқҙн„°\n    dayId: string,        // мӣҗлһҳ мҶҚн•ң Day ID\n    index: number,        // мӣҗлһҳ мқёлҚұмҠӨ (н‘ңмӢңмҡ©)\n    layout: Layout,       // м№ҙл“ңмқҳ нҒ¬кё° м •ліҙ\n    initialPosition: Position,  // н„°м№ҳ мӢңмһ‘ мң„м№ҳ (нҷ”л©ҙ м ҲлҢҖ мўҢн‘ң)\n    gestureState: { dx: number; dy: number }  // мҙҲкё° мқҙлҸҷлҹү (ліҙнҶө 0, 0)\n  ) =\u003e {\n    // ----------------------------------------\n    // н•өмӢ¬ нҸ¬мқёнҠё: мң„м№ҳ кі„мӮ°\n    // ----------------------------------------\n    // initialPositionмқҖ мҶҗк°ҖлқҪмқҳ нҷ”л©ҙ м ҲлҢҖ мўҢн‘ң (pageX, pageY)\n    // м№ҙл“ңмқҳ мӨ‘мӢ¬мқҙ мҶҗк°ҖлқҪ мң„м№ҳм—җ мҳӨлҸ„лЎқ л°°м№ҳ\n    //\n    // мҳҲмӢң:\n    // - мҶҗк°ҖлқҪ мң„м№ҳ: (200, 300)\n    // - м№ҙл“ң нҒ¬кё°: width=180, height=100\n    // - м№ҙл“ң left: 200 - 180/2 = 110\n    // - м№ҙл“ң top: 300 - 100/2 = 250\n\n    const floatingCard = (\n      \u003cAnimated.View\n        style={[\n          {\n            // м ҲлҢҖ мң„м№ҳлЎң л ҢлҚ”л§Ғ (л¶ҖлӘЁмҷҖ л¬ҙкҙҖн•ҳкІҢ нҷ”л©ҙ кё°мӨҖ)\n            position: \"absolute\",\n            // м№ҙл“ң мӨ‘мӢ¬мқҙ мҶҗк°ҖлқҪ мң„м№ҳм—җ мҳӨлҸ„лЎқ\n            left: initialPosition.x - layout.width / 2,\n            top: initialPosition.y - layout.height / 2,\n            // мӣҗліё м№ҙл“ңмҷҖ лҸҷмқјн•ң нҒ¬кё°\n            width: layout.width,\n            height: layout.height,\n            // мөңмғҒмң„м—җ л ҢлҚ”л§Ғ\n            zIndex: 9999,\n          },\n          {\n            // Animated к°’л“Өмқ„ мҠӨнғҖмқјм—җ л°”мқёл”©\n            opacity: floatingOpacity,\n            transform: [\n              // л“ңлһҳк·ё мқҙлҸҷлҹүл§ҢнҒј мқҙлҸҷ\n              // gestureState.dx/dyк°Җ ліҖн•  л•Ңл§ҲлӢӨ мһҗлҸҷмңјлЎң м—…лҚ°мқҙнҠёлҗЁ\n              { translateX: floatingPan.x },\n              { translateY: floatingPan.y },\n            ],\n          },\n        ]}\n      \u003e\n        {/* м№ҙл“ң UI - мӣҗліёкіј лҸҷмқјн•ҳкІҢ */}\n        \u003cView style={styles.rowContainer}\u003e\n          {/* ... м№ҙл“ң лӮҙмҡ© л ҢлҚ”л§Ғ ... */}\n        \u003c/View\u003e\n      \u003c/Animated.View\u003e\n    );\n\n    // stateм—җ м ҖмһҘн•ҳл©ҙ л ҢлҚ”л§ҒлҗЁ\n    setFloatingElement(floatingCard);\n  }, [floatingOpacity, floatingPan]);\n\n  // ========================================\n  // Floating Card м ңкұ° н•ЁмҲҳ\n  // ========================================\n  const removeFloatingElement = useCallback(() =\u003e {\n    setFloatingElement(null);\n  }, []);\n\n  // ========================================\n  // л ҢлҚ”л§Ғ\n  // ========================================\n  return (\n    \u003cFloatingPortalContext.Provider\n      value={{\n        createFloatingCard,\n        removeFloatingElement,\n        floatingPan,\n        floatingOpacity\n      }}\n    \u003e\n      {/* мӣҗлһҳ м•ұ м»Ён…җмё  */}\n      \u003cView style={{ flex: 1 }}\u003e\n        {children}\n\n        {/* Floating Layer - н•ӯмғҒ мөңмғҒмң„м—җ л ҢлҚ”л§Ғ */}\n        {floatingElement \u0026\u0026 (\n          \u003cView\n            style={{\n              position: \"absolute\",\n              top: 0,\n              left: 0,\n              right: 0,\n              bottom: 0,\n              // вҡ пёҸ мӨ‘мҡ”: н„°м№ҳ мқҙлІӨнҠёлҘј нҶөкіјмӢңнӮҙ\n              // мқҙкІҢ м—Ҷмңјл©ҙ Floating Cardк°Җ н„°м№ҳлҘј к°ҖлЎңмұ„м„ң\n              // м•„лһҳ м»ҙнҸ¬л„ҢнҠёл“Өмқҙ н„°м№ҳлҘј л°ӣм§Җ лӘ»н•Ё\n              pointerEvents: \"none\",\n              // Androidм—җм„ң мөңмғҒмң„ л ҢлҚ”л§Ғ ліҙмһҘ\n              elevation: 9999,\n            }}\n          \u003e\n            {floatingElement}\n          \u003c/View\u003e\n        )}\n      \u003c/View\u003e\n    \u003c/FloatingPortalContext.Provider\u003e\n  );\n};\n```\n\n---\n\n## useDragDrop нӣ…: л“ңлһҳк·ё мғқлӘ…мЈјкё° кҙҖлҰ¬\n\nмқҙм ң `useDragDrop` нӣ…м—җм„ң Floating CardлҘј м ңм–ҙн•ңлӢӨ.\nмқҙ нӣ…мқҖ л“ңлһҳк·ё м•Ө л“ңлЎӯмқҳ **м „мІҙ мғқлӘ…мЈјкё°лҘј кҙҖлҰ¬**н•ҳлҠ” н•өмӢ¬ нӣ…мқҙлӢӨ.\n\n```tsx\n// useDragDrop.ts\n\nexport const useDragDrop = ({\n  scrollOffsetRef,           // нҳ„мһ¬ мҠӨнҒ¬лЎӨ мң„м№ҳ (мўҢн‘ң ліҙм •мҡ©)\n  measureScrollViewPosition, // ScrollView мң„м№ҳ мһ¬мёЎм • н•ЁмҲҳ\n  remeasureDayLayouts,       // Day л Ҳмқҙм•„мӣғ мһ¬мёЎм • н•ЁмҲҳ\n  getDropTarget,             // л“ңлЎӯ нғҖкІҹ кі„мӮ° н•ЁмҲҳ\n  stopAutoScroll,            // мһҗлҸҷ мҠӨнҒ¬лЎӨ мӨ‘м§Җ н•ЁмҲҳ\n  FloatingPortalContext      // Floating Card м ңм–ҙмҡ© Context\n}) =\u003e {\n  // нҳ„мһ¬ л“ңлһҳк·ё мӨ‘мқё м•„мқҙн…ң м •ліҙ\n  const [draggingItem, setDraggingItem] = useState\u003cDraggingItem | null\u003e(null);\n\n  // Floating Card лҚ°мқҙн„° (refлЎң кҙҖлҰ¬н•ҳм—¬ лҰ¬л ҢлҚ”л§Ғ л°©м§Җ)\n  const floatingCardDataRef = useRef\u003cFloatingCardData | null\u003e(null);\n\n  // Contextм—җм„ң Floating Card м ңм–ҙ н•ЁмҲҳл“Өмқ„ к°Җм ёмҳҙ\n  const floatingPortal = useContext(FloatingPortalContext);\n\n  // ... н•ёл“Өлҹ¬ н•ЁмҲҳл“Ө ...\n\n  return {\n    draggingItem,      // мҷёл¶Җм—җм„ң л“ңлһҳк·ё мғҒнғң нҷ•мқёмҡ©\n    handleDragStart,   // PanResponder.onGrantм—җм„ң нҳём¶ң\n    handleDragMove,    // PanResponder.onMoveм—җм„ң нҳём¶ң\n    handleDragEnd,     // PanResponder.onReleaseм—җм„ң нҳём¶ң\n  };\n};\n```\n\nмқҙм ң к°Ғ н•ёл“Өлҹ¬к°Җ м–ҙл–»кІҢ Floating CardлҘј м ңм–ҙн•ҳлҠ”м§Җ мӮҙнҺҙліҙмһҗ.\n\n---\n\n### handleDragStart: л“ңлһҳк·ё мӢңмһ‘ мІҳлҰ¬\n\nмӮ¬мҡ©мһҗк°Җ м№ҙл“ңлҘј н„°м№ҳн•ҳл©ҙ нҳём¶ңлҗҳлҠ” н•ЁмҲҳлӢӨ.\nл“ңлһҳк·ёмқҳ **мҙҲкё° м„Өм •**мқ„ лӢҙлӢ№н•ңлӢӨ.\n\n```tsx\nconst handleDragStart = useCallback(async (\n  item: Plan,           // л“ңлһҳк·ён•  м•„мқҙн…ң лҚ°мқҙн„°\n  dayId: string,        // м•„мқҙн…ңмқҙ мҶҚн•ң Day ID\n  index: number,        // Day лӮҙм—җм„ңмқҳ мқёлҚұмҠӨ\n  cardLayout: Layout,   // м№ҙл“ңмқҳ нҒ¬кё° м •ліҙ (width, height)\n  initialPosition: Position  // н„°м№ҳ мӢңмһ‘ мң„м№ҳ (pageX, pageY)\n) =\u003e {\n  // ========================================\n  // Step 1: л“ңлһҳк·ё мғҒнғң м ҖмһҘ\n  // ========================================\n  // м–ҙл–Ө м•„мқҙн…ңмқ„ м–ҙл””м„ң л“ңлһҳк·ё мӢңмһ‘н–ҲлҠ”м§Җ кё°лЎқ\n  // лӮҳмӨ‘м—җ л“ңлЎӯн•  л•Ң \"м–ҙл””м„ң мҷ”лҠ”м§Җ\" м•Ңм•„м•ј лҚ°мқҙн„°лҘј мҳ®кёё мҲҳ мһҲмқҢ\n  setDraggingItem({\n    item,\n    sourceDay: dayId,\n    sourceIndex: index\n  });\n\n  // ========================================\n  // Step 2: л Ҳмқҙм•„мӣғ мһ¬мёЎм •\n  // ========================================\n  // мҷң н•„мҡ”н• к№Ң?\n  // - мҠӨнҒ¬лЎӨ мң„м№ҳк°Җ ліҖн–Ҳмқ„ мҲҳ мһҲмқҢ\n  // - лӢӨлҘё м№ҙл“ңк°Җ м¶”к°Җ/мӮӯм ңлҗҳм–ҙ Day мң„м№ҳк°Җ л°”лҖҢм—Ҳмқ„ мҲҳ мһҲмқҢ\n  // - м •нҷ•н•ң л“ңлЎӯ нғҖкІҹ кі„мӮ°мқ„ мң„н•ҙ мөңмӢ  л Ҳмқҙм•„мӣғ м •ліҙк°Җ н•„мҡ”\n  measureScrollViewPosition();\n  await remeasureDayLayouts();\n\n  // ========================================\n  // Step 3: Floating Card мғқм„ұ\n  // ========================================\n  // мң нҡЁм„ұ кІҖмӮ¬: м№ҙл“ң нҒ¬кё°к°Җ м—Ҷмңјл©ҙ л ҢлҚ”л§Ғ л¶Ҳк°Җ\n  if (!cardLayout.width || !cardLayout.height || !floatingPortal) return;\n\n  // refм—җ лҚ°мқҙн„° м ҖмһҘ (лҰ¬л ҢлҚ”л§Ғ м—Ҷмқҙ м ‘к·ј к°ҖлҠҘ)\n  floatingCardDataRef.current = {\n    item,\n    dayId,\n    index,\n    layout: cardLayout,\n    initialPosition,\n    gestureState: { dx: 0, dy: 0 }\n  };\n\n  // Portalмқ„ нҶөн•ҙ Floating Card мғқм„ұ\n  // мқҙ мҲңк°„ нҷ”л©ҙ мөңмғҒмң„м—җ м№ҙл“ң ліөм ңліёмқҙ лӮҳнғҖлӮЁ\n  floatingPortal.createFloatingCard(\n    item,\n    dayId,\n    index,\n    cardLayout,\n    initialPosition,\n    { dx: 0, dy: 0 }  // мҙҲкё° мқҙлҸҷлҹүмқҖ 0\n  );\n\n  // ========================================\n  // Step 4: нҺҳмқҙл“ңмқё м• лӢҲл©”мқҙм…ҳ\n  // ========================================\n  // к°‘мһҗкё° лӮҳнғҖлӮҳл©ҙ м–ҙмғүн•ҳлӢҲк№Ң м„ңм„ңнһҲ лӮҳнғҖлӮҳкІҢ\n  // 0.9лЎң м„Өм •н•ҙм„ң мӣҗліёкіј мӮҙм§қ кө¬л¶„лҗҳкІҢ н•Ё\n  Animated.timing(floatingPortal.floatingOpacity, {\n    toValue: 0.9,\n    duration: 150,\n    useNativeDriver: true,  // вң… Native мҠӨл Ҳл“ңм—җм„ң мӢӨн–ү (60fps ліҙмһҘ)\n  }).start();\n}, [scrollOffsetRef, measureScrollViewPosition, remeasureDayLayouts, floatingPortal]);\n```\n\n**н•өмӢ¬ нҸ¬мқёнҠё:**\n- `async` н•ЁмҲҳмқё мқҙмң : `remeasureDayLayouts()`к°Җ л№„лҸҷкё°мқҙкё° л•Ңл¬ё\n- refлҘј мӮ¬мҡ©н•ҳлҠ” мқҙмң : мһҰмқҖ м—…лҚ°мқҙнҠём—җлҸ„ лҰ¬л ҢлҚ”л§Ғ л°©м§Җ\n- нҺҳмқҙл“ңмқё нҡЁкіјлЎң мһҗм—°мҠӨлҹ¬мҡҙ м „нҷҳ м ңкіө\n\n---\n\n### мӣҗліё м№ҙл“ң мІҳлҰ¬\n\nFloating Cardк°Җ лӮҳнғҖлӮ  л•Ң мӣҗліё м№ҙл“ңлҸ„ мІҳлҰ¬н•ҙмӨҳм•ј н•ңлӢӨ.\nк·ёлғҘ л‘җл©ҙ м№ҙл“ңк°Җ 2к°ңлЎң ліҙмқҙлӢҲк№Ң!\n\n```tsx\n// DraggablePlanCard.tsx\n\nconst DraggablePlanCard = ({ /* ... */ isDragging }) =\u003e {\n  // л“ңлһҳк·ё мӢңмһ‘/мў…лЈҢм—җ л”°лҘё нҲ¬лӘ…лҸ„ м• лӢҲл©”мқҙм…ҳ\n  const cardOpacity = useRef(new Animated.Value(1)).current;\n\n  // PanResponder лӮҙл¶Җм—җм„ң...\n  const panResponder = useMemo(() =\u003e PanResponder.create({\n    onPanResponderGrant: (evt, gestureState) =\u003e {\n      // л“ңлһҳк·ё мӢңмһ‘: мӣҗліё м№ҙл“ңлҘј нқҗлҰ¬кІҢ\n      Animated.timing(cardOpacity, {\n        toValue: 0.3,      // 30% л¶ҲнҲ¬лӘ…лҸ„лЎң\n        duration: 150,\n        useNativeDriver: true,\n      }).start();\n\n      // ... onDragStart нҳём¶ң ...\n    },\n\n    onPanResponderRelease: (evt) =\u003e {\n      // л“ңлһҳк·ё мў…лЈҢ: мӣҗліё м№ҙл“ң ліөмӣҗ\n      Animated.timing(cardOpacity, {\n        toValue: 1,        // 100% л¶ҲнҲ¬лӘ…лҸ„лЎң\n        duration: 200,\n        useNativeDriver: true,\n      }).start();\n\n      // ... onDragEnd нҳём¶ң ...\n    },\n  }), [/* deps */]);\n\n  return (\n    \u003cAnimated.View\n      style={{\n        opacity: cardOpacity,  // Animated к°’ л°”мқёл”©\n        // л“ңлһҳк·ё мӨ‘мқј л•Ң z-index лӮ®м¶Ө (Floating Card м•„лһҳлЎң)\n        zIndex: isDragging ? 0 : 1,\n      }}\n    \u003e\n      {/* м№ҙл“ң лӮҙмҡ© */}\n    \u003c/Animated.View\u003e\n  );\n};\n```\n\n---\n\n### Floating Card мң„м№ҳ кі„мӮ° мӣҗлҰ¬\n\nFloating Cardк°Җ нҷ”л©ҙм—җм„ң м–ҙл–»кІҢ мң„м№ҳлҘј мһЎкі  мқҙлҸҷн•ҳлҠ”м§Җ мӮҙнҺҙліҙмһҗ.\nмң„м№ҳ кі„мӮ°мқҖ **мҙҲкё° мң„м№ҳ м„Өм •**кіј **л“ңлһҳк·ё мӨ‘ мң„м№ҳ м—…лҚ°мқҙнҠё** л‘җ лӢЁкі„лЎң лӮҳлүңлӢӨ.\n\n#### 1. мҙҲкё° мң„м№ҳ м„Өм • (handleDragStart вҶ’ createFloatingCard)\n\nл“ңлһҳк·ёк°Җ мӢңмһ‘лҗҳл©ҙ Floating CardлҘј **мҶҗк°ҖлқҪ мң„м№ҳ мӨ‘мӢ¬**м—җ л°°м№ҳн•ңлӢӨ.\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ              handleDragStart: мҙҲкё° мң„м№ҳ кі„мӮ°                         в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   мһ…л Ҙк°’:                                                            в”Ӯ\nв”Ӯ   вҖў initialPosition (pageX, pageY) = (200, 300)  вҶҗ мҶҗк°ҖлқҪ м ҲлҢҖ мўҢн‘ң  в”Ӯ\nв”Ӯ   вҖў cardLayout: width = 180, height = 100        вҶҗ м№ҙл“ң нҒ¬кё°        в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   кі„мӮ°:                                                              в”Ӯ\nв”Ӯ   в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ                     в”Ӯ\nв”Ӯ   left = pageX - width/2  = 200 - 90  = 110                         в”Ӯ\nв”Ӯ   top  = pageY - height/2 = 300 - 50  = 250                         в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   мӢңк°Ғм Ғ н‘ңнҳ„:                                                       в”Ӯ\nв”Ӯ   в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ                     в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ              (110, 250)                                             в”Ӯ\nв”Ӯ                   вҶ“                                                 в”Ӯ\nв”Ӯ              в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                                в”Ӯ\nв”Ӯ              в”Ӯ                     в”Ӯ                                в”Ӯ\nв”Ӯ              в”Ӯ   Floating Card     в”Ӯ                                в”Ӯ\nв”Ӯ              в”Ӯ         в—Ҹв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ӯв”Җв”Җ мҶҗк°ҖлқҪ мң„м№ҳ (200, 300)        в”Ӯ\nв”Ӯ              в”Ӯ                     в”Ӯ                                в”Ӯ\nв”Ӯ              в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                                в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   вҶ’ м№ҙл“ңмқҳ **мӨ‘мӢ¬**мқҙ мҶҗк°ҖлқҪ мң„м№ҳм—җ мҳӨлҸ„лЎқ л°°м№ҳ                        в”Ӯ\nв”Ӯ   вҶ’ мқҙ к°’мқҖ CSSмқҳ left/topмңјлЎң м„Өм •лҗЁ (м •м Ғ к°’, н•ң лІҲл§Ң кі„мӮ°)          в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n**мҪ”л“ңм—җм„ңмқҳ м Ғмҡ©:**\n\n```tsx\n// createFloatingCard лӮҙл¶Җ\n\u003cAnimated.View\n  style={{\n    position: \"absolute\",\n    left: initialPosition.x - layout.width / 2,   // 110\n    top: initialPosition.y - layout.height / 2,   // 250\n    width: layout.width,\n    height: layout.height,\n  }}\n\u003e\n```\n\n#### 2. л“ңлһҳк·ё мӨ‘ мң„м№ҳ м—…лҚ°мқҙнҠё (handleDragMove)\n\nмҶҗк°ҖлқҪмқҙ мӣҖм§Ғмқҙл©ҙ **мқҙлҸҷлҹү(dx, dy)**мқ„ `transform`мңјлЎң м Ғмҡ©н•ңлӢӨ.\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ              handleDragMove: мқҙлҸҷлҹү кі„мӮ°                             в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   мһ…л Ҙк°’:                                                            в”Ӯ\nв”Ӯ   вҖў gestureState.dx = 50  (л“ңлһҳк·ё мӢңмһ‘м җ лҢҖл№„ Xм¶• мқҙлҸҷлҹү)            в”Ӯ\nв”Ӯ   вҖў gestureState.dy = 30  (л“ңлһҳк·ё мӢңмһ‘м җ лҢҖл№„ Yм¶• мқҙлҸҷлҹү)            в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   м Ғмҡ© л°©лІ•:                                                         в”Ӯ\nв”Ӯ   в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ                     в”Ӯ\nв”Ӯ   floatingPan.setValue({ x: 50, y: 30 })                            в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   вҶ’ Animated к°’мқҙ ліҖкІҪлҗҳл©ҙ transformмқҙ мһҗлҸҷ м—…лҚ°мқҙнҠё                  в”Ӯ\nв”Ӯ   вҶ’ лҰ¬л ҢлҚ”л§Ғ м—Ҷмқҙ л„ӨмқҙнӢ°лёҢ мҠӨл Ҳл“ңм—җм„ң м§Ғм ‘ мІҳлҰ¬ (60fps ліҙмһҘ)           в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   мӢңк°Ғм Ғ н‘ңнҳ„:                                                       в”Ӯ\nв”Ӯ   в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ                     в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   мҙҲкё° мң„м№ҳ (110, 250)                                               в”Ӯ\nв”Ӯ        в”Ӯ                                                            в”Ӯ\nв”Ӯ        в”Ӯ    dx=50, dy=30                                            в”Ӯ\nв”Ӯ        в”Ӯ  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҖвҶ’                                            в”Ӯ\nв”Ӯ        в–ј                 вҶ“                                          в”Ӯ\nв”Ӯ   в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ       в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ                                     в”Ӯ\nв”Ӯ   в”Ӯ мӢңмһ‘м җ  в”Ӯ  в”Җв”Җв”ҖвҶ’ в”Ӯ нҳ„мһ¬м җ  в”Ӯ                                     в”Ӯ\nв”Ӯ   в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ       в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ                                     в”Ӯ\nв”Ӯ   (110, 250)        (160, 280)                                      в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв”Ӯ   мөңмў… нҷ”л©ҙ мң„м№ҳ:                                                    в”Ӯ\nв”Ӯ   x = left + translateX = 110 + 50 = 160                            в”Ӯ\nв”Ӯ   y = top  + translateY = 250 + 30 = 280                            в”Ӯ\nв”Ӯ                                                                     в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\n```\n\n**мҪ”л“ңм—җм„ңмқҳ м Ғмҡ©:**\n\n```tsx\n// handleDragMove лӮҙл¶Җ\nfloatingPortal.floatingPan.setValue({\n  x: gestureState.dx,  // 50\n  y: gestureState.dy   // 30\n});\n\n// createFloatingCardм—җм„ң лҜёлҰ¬ л°”мқёл”©лҗң transform\nstyle={{\n  transform: [\n    { translateX: floatingPan.x },  // 50\n    { translateY: floatingPan.y }   // 30\n  ]\n}}\n```\n\n#### мҷң мҙҲкё° мң„м№ҳ(left/top)мҷҖ мқҙлҸҷлҹү(transform)мқ„ л¶„лҰ¬н• к№Ң?\n\n| кө¬л¶„ | мҙҲкё° мң„м№ҳ (left/top) | мқҙлҸҷлҹү (transform) |\n|:------|:---------------------|:-------------------|\n| м„Өм • мӢңм җ | л“ңлһҳк·ё мӢңмһ‘ мӢң н•ң лІҲл§Ң | л§Ө н”„л Ҳмһ„л§ҲлӢӨ м—…лҚ°мқҙнҠё |\n| к°’ нғҖмһ… | м •м Ғ мҲ«мһҗ | Animated к°’ |\n| м—…лҚ°мқҙнҠё л°©мӢқ | м»ҙнҸ¬л„ҢнҠё мһ¬мғқм„ұ н•„мҡ” | setValue()лЎң мҰүмӢң л°ҳмҳҒ |\n| м„ұлҠҘ | лҰ¬л ҢлҚ”л§Ғ л°ңмғқ | лҰ¬л ҢлҚ”л§Ғ м—ҶмқҢ (Native Driver) |\n\n\nмқҙл ҮкІҢ л¶„лҰ¬н•ҳл©ҙ `setValue()`л§Ң нҳём¶ңн•ҙм„ң мң„м№ҳлҘј м—…лҚ°мқҙнҠён•  мҲҳ мһҲм–ҙм„ң,\n**лҰ¬л ҢлҚ”л§Ғ м—Ҷмқҙ 60fps**лҘј мң м§Җн•  мҲҳ мһҲлӢӨ.\n\n---\n\n### handleDragMove: л“ңлһҳк·ё мӨ‘ мң„м№ҳ м—…лҚ°мқҙнҠё\n\nмӮ¬мҡ©мһҗк°Җ мҶҗк°ҖлқҪмқ„ мӣҖм§Ғмқј л•Ңл§ҲлӢӨ нҳём¶ңлҗңлӢӨ.\nFloating Cardмқҳ **мң„м№ҳлҘј мӢӨмӢңк°„мңјлЎң м—…лҚ°мқҙнҠё**н•ңлӢӨ.\n\n```tsx\nconst handleDragMove = useCallback((\n  _x: number,              // нҳ„мһ¬ X мўҢн‘ң (мӮ¬мҡ©н•ҳм§Җ м•ҠмқҢ)\n  _y: number,              // нҳ„мһ¬ Y мўҢн‘ң (мӮ¬мҡ©н•ҳм§Җ м•ҠмқҢ)\n  gestureState: any,       // PanResponderк°Җ м ңкіөн•ҳлҠ” м ңмҠӨмІҳ м •ліҙ\n  _evt: any,               // мӣҗліё мқҙлІӨнҠё (мӮ¬мҡ©н•ҳм§Җ м•ҠмқҢ)\n  _initialPosition: Position  // мҙҲкё° мң„м№ҳ (мӮ¬мҡ©н•ҳм§Җ м•ҠмқҢ)\n) =\u003e {\n  // мң нҡЁм„ұ кІҖмӮ¬\n  if (!gestureState || !floatingCardDataRef.current || !floatingPortal) return;\n\n  // ========================================\n  // н•өмӢ¬: gestureState.dx/dyлЎң мқҙлҸҷлҹү м—…лҚ°мқҙнҠё\n  // ========================================\n  //\n  // gestureStateлҠ” PanResponderк°Җ мһҗлҸҷмңјлЎң кі„мӮ°н•ҙмЈјлҠ” к°’:\n  // - dx: л“ңлһҳк·ё мӢңмһ‘м җм—җм„ң нҳ„мһ¬к№Ңм§Җ Xм¶• мқҙлҸҷлҹү (н”Ҫм…Җ)\n  // - dy: л“ңлһҳк·ё мӢңмһ‘м җм—җм„ң нҳ„мһ¬к№Ңм§Җ Yм¶• мқҙлҸҷлҹү (н”Ҫм…Җ)\n  //\n  // мҳҲмӢң:\n  // - мӢңмһ‘ мң„м№ҳ: (100, 200)\n  // - нҳ„мһ¬ мң„м№ҳ: (150, 250)\n  // - dx = 50, dy = 50\n  //\n  // Animated.ValueXY.setValue()лҘј нҳём¶ңн•ҳл©ҙ\n  // Floating Cardмқҳ transformмқҙ мһҗлҸҷмңјлЎң м—…лҚ°мқҙнҠёлҗЁ\n  // вҶ’ лҰ¬л ҢлҚ”л§Ғ м—Ҷмқҙ л„ӨмқҙнӢ°лёҢм—җм„ң м§Ғм ‘ мІҳлҰ¬!\n\n  if (gestureState.dx !== undefined \u0026\u0026 gestureState.dy !== undefined) {\n    floatingPortal.floatingPan.setValue({\n      x: gestureState.dx,\n      y: gestureState.dy\n    });\n  }\n}, [floatingPortal]);\n```\n\n---\n\n### handleDragEnd: л“ңлһҳк·ё мў…лЈҢ л°Ҹ л“ңлЎӯ мІҳлҰ¬\n\nмҶҗк°ҖлқҪмқ„ л–јл©ҙ нҳём¶ңлҗңлӢӨ.\n**л“ңлЎӯ мң„м№ҳлҘј кі„мӮ°н•ҳкі  лҚ°мқҙн„°лҘј мқҙлҸҷ**мӢңнӮЁлӢӨ.\n\n```tsx\nconst handleDragEnd = useCallback((\n  y: number,              // мҶҗк°ҖлқҪмқ„ л—Җ Y мўҢн‘ң (л“ңлЎӯ мң„м№ҳ кі„мӮ°мҡ©)\n  dayData: any,           // нҳ„мһ¬ Day лҚ°мқҙн„° (м°ёмЎ°мҡ©)\n  setDayData: (updater: (prev: any) =\u003e any) =\u003e void  // лҚ°мқҙн„° м—…лҚ°мқҙнҠё н•ЁмҲҳ\n) =\u003e {\n  // ========================================\n  // Step 1: мһҗлҸҷ мҠӨнҒ¬лЎӨ мӨ‘м§Җ\n  // ========================================\n  // нҷ”л©ҙ кІҪкі„м—җм„ң мһҗлҸҷ мҠӨнҒ¬лЎӨ мӨ‘мқҙм—ҲлӢӨл©ҙ л©Ҳм¶Ө\n  stopAutoScroll();\n\n  // л“ңлһҳк·ё мӨ‘мқё м•„мқҙн…ңмқҙ м—Ҷмңјл©ҙ мў…лЈҢ\n  if (!draggingItem) return;\n\n  // ========================================\n  // Step 2: л“ңлЎӯ нғҖкІҹ кі„мӮ°\n  // ========================================\n  // нҳ„мһ¬ Y мўҢн‘ңлҘј кё°л°ҳмңјлЎң м–ҙлҠҗ Dayмқҳ лӘҮ лІҲм§ём—җ л“ңлЎӯн• м§Җ кІ°м •\n  const dropTarget = getDropTarget(y);\n\n  if (dropTarget) {\n    const { dayId: targetDay, insertIndex } = dropTarget;\n    const { item, sourceDay, sourceIndex } = draggingItem;\n\n    // ========================================\n    // Step 3-A: к°ҷмқҖ Day лӮҙм—җм„ң мҲңм„ң ліҖкІҪ\n    // ========================================\n    if (targetDay === sourceDay) {\n      // мқҳлҜё м—ҶлҠ” мқҙлҸҷ л°©м§Җ (к°ҷмқҖ мң„м№ҳ лҳҗлҠ” л°”лЎң м•„лһҳ)\n      if (insertIndex !== sourceIndex \u0026\u0026 insertIndex !== sourceIndex + 1) {\n        setDayData((prevData: any) =\u003e {\n          const newDayData = { ...prevData };\n          const plans = [...newDayData[sourceDay].plans];\n\n          // мӣҗлһҳ мң„м№ҳм—җм„ң м ңкұ°\n          const [movedItem] = plans.splice(sourceIndex, 1);\n\n          // мӮҪмһ… мқёлҚұмҠӨ ліҙм •\n          // мӣҗлһҳ мң„м№ҳліҙлӢӨ л’ӨлЎң мқҙлҸҷн•ҳл©ҙ, м ңкұ°лЎң мқён•ҙ мқёлҚұмҠӨк°Җ 1 мӨ„м–ҙл“Ұ\n          const finalInsertIndex = insertIndex \u003e sourceIndex\n            ? insertIndex - 1\n            : insertIndex;\n\n          // мғҲ мң„м№ҳм—җ мӮҪмһ…\n          plans.splice(finalInsertIndex, 0, movedItem);\n\n          newDayData[sourceDay].plans = plans;\n          return newDayData;\n        });\n      }\n    }\n    // ========================================\n    // Step 3-B: лӢӨлҘё DayлЎң мқҙлҸҷ\n    // ========================================\n    else {\n      setDayData((prevData: any) =\u003e {\n        const newDayData = { ...prevData };\n\n        // мӣҗлһҳ Dayм—җм„ң м ңкұ°\n        const [movedItem] = newDayData[sourceDay].plans.splice(sourceIndex, 1);\n\n        // мғҲ Dayм—җ л§һкІҢ м•„мқҙн…ң м •ліҙ м—…лҚ°мқҙнҠё\n        const newItem = {\n          ...movedItem,\n          day: targetDay,  // Day м •ліҙ ліҖкІҪ\n          key: `${targetDay}-${Date.now()}`  // мғҲлЎңмҡҙ кі мң  нӮӨ мғқм„ұ\n        };\n\n        // мғҲ Dayм—җ мӮҪмһ…\n        newDayData[targetDay].plans.splice(insertIndex, 0, newItem);\n\n        return newDayData;\n      });\n    }\n  }\n\n  // ========================================\n  // Step 4: Floating Card м •лҰ¬\n  // ========================================\n  if (floatingPortal) {\n    // нҺҳмқҙл“ңм•„мӣғ м• лӢҲл©”мқҙм…ҳ\n    Animated.timing(floatingPortal.floatingOpacity, {\n      toValue: 0,\n      duration: 200,\n      useNativeDriver: true,\n    }).start(() =\u003e {\n      // м• лӢҲл©”мқҙм…ҳ мҷ„лЈҢ нӣ„ мӢӨм ңлЎң м ңкұ°\n      floatingPortal.removeFloatingElement();\n      floatingCardDataRef.current = null;\n    });\n\n    // мқҙлҸҷлҹү мҙҲкё°нҷ” (лӢӨмқҢ л“ңлһҳк·ёлҘј мң„н•ҙ)\n    floatingPortal.floatingPan.setValue({ x: 0, y: 0 });\n  }\n\n  // ========================================\n  // Step 5: л“ңлһҳк·ё мғҒнғң мҙҲкё°нҷ”\n  // ========================================\n  setDraggingItem(null);\n}, [draggingItem, getDropTarget, stopAutoScroll, floatingPortal]);\n```\n\n**мӮҪмһ… мқёлҚұмҠӨ ліҙм •мқҙ н•„мҡ”н•ң мқҙмң :**\n\n```\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ  к°ҷмқҖ Day лӮҙ мқҙлҸҷ мӢң мқёлҚұмҠӨ ліҙм •                                  в”Ӯ\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ    scrollViewLayout,\r\n    containerRef,\r\n    dayRefs,\r\n    measureScrollViewPosition,\r\n    measureDay,\r\n    measureCard,\r\n    remeasureDayLayouts,\r\n    getDropTarget,\r\n  } = useLayoutMeasurement(scrollOffsetRef);\r\n\r\n  // 3. л“ңлһҳк·ё м•Ө л“ңлЎӯ\r\n  const {\r\n    draggingItem,\r\n    handleDragStart,\r\n    handleDragMove,\r\n    handleDragEnd,\r\n  } = useDragDrop({\r\n    scrollOffsetRef,\r\n    measureScrollViewPosition,\r\n    remeasureDayLayouts,\r\n    getDropTarget,\r\n    stopAutoScroll,\r\n    FloatingPortalContext,\r\n  });\r\n\r\n  // ... л ҢлҚ”л§Ғ\r\n};\r\n```\r\n\r\n---\r\n\r\n## useLayoutMeasurement: л Ҳмқҙм•„мӣғ мёЎм •мқҳ н•өмӢ¬\r\n\r\n1нҺём—җм„ң к°•мЎ°н–Ҳл“Ҝмқҙ, мқҙ кө¬нҳ„мқҳ н•өмӢ¬мқҖ **м ҲлҢҖ мўҢн‘ң**лӢӨ. лӘЁл“  мҡ”мҶҢмқҳ мң„м№ҳлҘј нҷ”л©ҙ кё°мӨҖ м ҲлҢҖ мўҢн‘ңлЎң мёЎм •н•ҙм•ј н•ңлӢӨ.\r\n\r\n### measureInWindow мӮ¬мҡ©н•ҳкё°\r\n\r\nReact Nativeм—җм„ң м ҲлҢҖ мўҢн‘ңлҘј м–»мңјл Өл©ҙ `measureInWindow`лҘј мӮ¬мҡ©н•ңлӢӨ.\r\n\r\n```tsx\r\n// мқјл°ҳм Ғмқё onLayoutмқҖ л¶ҖлӘЁ кё°мӨҖ мғҒлҢҖ мўҢн‘ң\r\n\u003cView onLayout={(e) =\u003e {\r\n  const { x, y } = e.nativeEvent.layout; // л¶ҖлӘЁ кё°мӨҖ!\r\n}} /\u003e\r\n\r\n// measureInWindowлҠ” нҷ”л©ҙ кё°мӨҖ м ҲлҢҖ мўҢн‘ң\r\nviewRef.current.measureInWindow((x, y, width, height) =\u003e {\r\n  // x, yлҠ” нҷ”л©ҙ мўҢмғҒлӢЁ кё°мӨҖ м ҲлҢҖ мўҢн‘ң\r\n});\r\n```\r\n\r\n### мёЎм •н•ҙм•ј н•  кІғл“Ө\r\n\r\nм№ёл°ҳліҙл“ңм—җм„ңлҠ” 3к°Җм§ҖлҘј мёЎм •н•ҙм•ј н•ңлӢӨ:\r\n\r\n1. **ScrollView мҳҒм—ӯ** - мһҗлҸҷ мҠӨнҒ¬лЎӨ кІҪкі„ нҢҗлӢЁмҡ©\r\n2. **к°Ғ Day м»¬лҹј** - м–ҙлҠҗ Dayм—җ л“ңлЎӯн• м§Җ нҢҗлӢЁмҡ©\r\n3. **к°Ғ м№ҙл“ң** - лӘҮ лІҲм§ё мң„м№ҳм—җ л“ңлЎӯн• м§Җ нҢҗлӢЁмҡ©\r\n\r\n```tsx\r\nexport const useLayoutMeasurement = (\r\n  scrollOffsetRef: MutableRefObject\u003cnumber\u003e\r\n) =\u003e {\r\n  const [dayLayouts, setDayLayouts] = useState\u003cDayLayouts\u003e({});\r\n  const [cardLayouts, setCardLayouts] = useState\u003cCardLayouts\u003e({});\r\n  const dayRefs = useRef\u003c{ [key: string]: View }\u003e({});\r\n\r\n  // Day м»¬лҹј л Ҳмқҙм•„мӣғ мёЎм •\r\n  const measureDay = useCallback((dayId: string, event: any) =\u003e {\r\n    const { x, y, width, height } = event.nativeEvent.layout;\r\n    setDayLayouts(prev =\u003e ({\r\n      ...prev,\r\n      [dayId]: { x, y, width, height, originalY: y }\r\n    }));\r\n  }, []);\r\n\r\n  // м№ҙл“ң л Ҳмқҙм•„мӣғ мёЎм •\r\n  const measureCard = useCallback((dayId: string, index: number, event: any) =\u003e {\r\n    const { x, y, width, height } = event.nativeEvent.layout;\r\n    setCardLayouts(prev =\u003e {\r\n      const dayCards = [...(prev[dayId] || [])];\r\n      dayCards[index] = { x, y, width, height, index };\r\n      return { ...prev, [dayId]: dayCards };\r\n    });\r\n  }, []);\r\n\r\n  // ...\r\n};\r\n```\r\n\r\n### л“ңлһҳк·ё мӢңмһ‘ мӢң мһ¬мёЎм •мқҙ н•„мҡ”н•ң мқҙмң \r\n\r\nм—¬кё°м„ң мӨ‘мҡ”н•ң нҸ¬мқёнҠёк°Җ мһҲлӢӨ. **л“ңлһҳк·ёлҘј мӢңмһ‘н•  л•Ң лӘЁл“  Dayмқҳ л Ҳмқҙм•„мӣғмқ„ лӢӨмӢң мёЎм •н•ҙм•ј н•ңлӢӨ.**\r\n\r\nмҷңлғҗн•ҳл©ҙ:\r\n- мӮ¬мҡ©мһҗк°Җ мҠӨнҒ¬лЎӨмқ„ н–Ҳмқ„ мҲҳ мһҲмқҢ\r\n- `onLayout`мңјлЎң м ҖмһҘн•ң к°’мқҖ **мҪҳн…җмё  кё°мӨҖ мғҒлҢҖ мўҢн‘ң**\r\n- л“ңлЎӯ нғҖкІҹ кі„мӮ°м—җлҠ” **нҳ„мһ¬ нҷ”л©ҙ кё°мӨҖ м ҲлҢҖ мўҢн‘ң**к°Җ н•„мҡ”\r\n\r\n```tsx\r\nconst remeasureDayLayouts = useCallback(() =\u003e {\r\n  return new Promise\u003cvoid\u003e((resolve) =\u003e {\r\n    const dayIds = Object.keys(dayRefs.current);\r\n\r\n    // л№Ҳ л°°м—ҙмқҙл©ҙ л°”лЎң resolve (мқҙкұ° л№ лңЁлҰ¬л©ҙ Promiseк°Җ мҳҒмӣҗнһҲ pendingлҗЁ)\r\n    if (dayIds.length === 0) {\r\n      resolve();\r\n      return;\r\n    }\r\n\r\n    const currentScrollOffset = scrollOffsetRef.current;\r\n    let measured = 0;\r\n\r\n    dayIds.forEach((dayId) =\u003e {\r\n      const dayRef = dayRefs.current[dayId];\r\n      if (dayRef?.measureInWindow) {\r\n        dayRef.measureInWindow((x, y, width, height) =\u003e {\r\n          // мҠӨнҒ¬лЎӨ мҳӨн”„м…Ӣмқ„ лҚ”н•ҙм„ң мҪҳн…җмё  кё°мӨҖ мўҢн‘ңлЎң ліҖнҷҳ\r\n          const contentY = y + currentScrollOffset;\r\n          setDayLayouts(prev =\u003e ({\r\n            ...prev,\r\n            [dayId]: { x, y: contentY, width, height }\r\n          }));\r\n          measured++;\r\n          if (measured \u003e= dayIds.length) resolve();\r\n        });\r\n      }\r\n    });\r\n  });\r\n}, [scrollOffsetRef]);\r\n```\r\n\r\n---\r\n\r\n## л“ңлЎӯ нғҖкІҹ кі„мӮ°: getDropTarget\r\n\r\nл Ҳмқҙм•„мӣғмқ„ мёЎм •н–ҲмңјлӢҲ, мқҙм ң \"мҶҗк°ҖлқҪмқҙ м–ҙл””м—җ мһҲлҠ”м§Җ\"лҘј л°”нғ•мңјлЎң \"м–ҙл””м—җ л“ңлЎӯн•ҙм•ј н•ҳлҠ”м§Җ\"лҘј кі„мӮ°н•  мҲҳ мһҲлӢӨ.\r\n\r\n### лЎңм§Ғ м„ӨлӘ…\r\n\r\n1. нҳ„мһ¬ н„°м№ҳ Y мўҢн‘ң + мҠӨнҒ¬лЎӨ мҳӨн”„м…Ӣ = мҪҳн…җмё  кё°мӨҖ Y мўҢн‘ң\r\n2. к°Ғ Day м»¬лҹјмқ„ мҲңнҡҢн•ҳл©° н•ҙлӢ№ Yк°Җ м–ҙлҠҗ Day лІ”мң„м—җ мһҲлҠ”м§Җ нҷ•мқё\r\n3. н•ҙлӢ№ Dayмқҳ м№ҙл“ңл“Өмқ„ мҲңнҡҢн•ҳл©° лӘҮ лІҲм§ё мң„м№ҳм—җ л„Јмқ„м§Җ кі„мӮ°\r\n\r\n```tsx\r\nconst getDropTarget = useCallback((pageY: number): {\r\n  dayId: string;\r\n  insertIndex: number\r\n} | null =\u003e {\r\n  const currentScrollOffset = scrollOffsetRef.current;\r\n  const contentY = pageY + currentScrollOffset;\r\n\r\n  for (const dayId of Object.keys(dayLayouts)) {\r\n    const dayLayout = dayLayouts[dayId];\r\n    if (!dayLayout) continue;\r\n\r\n    const dayTop = dayLayout.y;\r\n    const dayBottom = dayLayout.y + dayLayout.height;\r\n\r\n    // м—¬мң к°’ 50pxмқ„ мӨҳм„ң кІҪкі„ к·јмІҳм—җм„ңлҸ„ мқёмӢқлҗҳкІҢ\r\n    if (contentY \u003e= dayTop - 50 \u0026\u0026 contentY \u003c= dayBottom + 50) {\r\n      const cards = cardLayouts[dayId] || [];\r\n\r\n      // л№Ҳ Dayл©ҙ 0лІҲ мқёлҚұмҠӨ\r\n      if (cards.length === 0) {\r\n        return { dayId, insertIndex: 0 };\r\n      }\r\n\r\n      // к°Ғ м№ҙл“ңмқҳ мӨ‘к°„м җмқ„ кё°мӨҖмңјлЎң мӮҪмһ… мң„м№ҳ кІ°м •\r\n      for (let i = 0; i \u003c cards.length; i++) {\r\n        const card = cards[i];\r\n        const cardCenterY = dayLayout.y + card.y + card.height / 2;\r\n\r\n        if (contentY \u003c cardCenterY) {\r\n          return { dayId, insertIndex: i };\r\n        }\r\n      }\r\n\r\n      // лӘЁл“  м№ҙл“ңліҙлӢӨ м•„лһҳл©ҙ л§Ҳм§Җл§үм—җ мӮҪмһ…\r\n      return { dayId, insertIndex: cards.length };\r\n    }\r\n  }\r\n\r\n  return null;\r\n}, [dayLayouts, cardLayouts, scrollOffsetRef]);\r\n```\r\n\r\n### мҷң м№ҙл“ң мӨ‘к°„м җмқ„ кё°мӨҖмңјлЎң н• к№Ң?\r\n\r\nл“ңлһҳк·ё мӨ‘мқё м№ҙл“ңк°Җ лӢӨлҘё м№ҙл“ң мң„м—җ мһҲмқ„ л•Ң:\r\n- мӨ‘к°„м җліҙлӢӨ **мң„**м—җ мһҲмңјл©ҙ вҶ’ к·ё м№ҙл“ң **м•һ**м—җ мӮҪмһ…\r\n- мӨ‘к°„м җліҙлӢӨ **м•„лһҳ**м—җ мһҲмңјл©ҙ вҶ’ к·ё м№ҙл“ң **л’Ө**м—җ мӮҪмһ…\r\n\r\nмқҙкІҢ мӮ¬мҡ©мһҗ мһ…мһҘм—җм„ң к°ҖмһҘ м§ҒкҙҖм ҒмқҙлӢӨ.\r\n\r\n```\r\nв”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\r\nв”Ӯ   Card 0    в”Ӯ  вҶҗ contentYк°Җ м—¬кё°л©ҙ insertIndex = 0\r\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\r\nв”Ӯ   Card 1    в”Ӯ  вҶҗ contentYк°Җ Card1 мӨ‘к°„м җ мң„л©ҙ insertIndex = 1\r\nв”Ӯ в”Җ в”Җ мӨ‘к°„ в”Җ в”Җв”Ӯ\r\nв”Ӯ             в”Ӯ  вҶҗ contentYк°Җ Card1 мӨ‘к°„м җ м•„лһҳл©ҙ insertIndex = 2\r\nв”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө\r\nв”Ӯ   Card 2    в”Ӯ\r\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ\r\n```\r\n\r\n---\r\n\r\n## useDragDrop: л“ңлһҳк·ё мғҒнғң кҙҖлҰ¬\r\n\r\nмқҙм ң мӢӨм ң л“ңлһҳк·ё лЎңм§Ғмқ„ лӢҙлӢ№н•ҳлҠ” нӣ…мқ„ мӮҙнҺҙліҙмһҗ.\r\n\r\n### л“ңлһҳк·ё мӢңмһ‘\r\n\r\n```tsx\r\nconst handleDragStart = useCallback(async (\r\n  item: Plan,\r\n  dayId: string,\r\n  index: number,\r\n  cardLayout: { x: number; y: number; width: number; height: number },\r\n  initialPosition: { x: number; y: number }\r\n) =\u003e {\r\n  // 1. л“ңлһҳк·ё мӨ‘мқё м•„мқҙн…ң м •ліҙ м ҖмһҘ\r\n  setDraggingItem({ item, sourceDay: dayId, sourceIndex: index });\r\n\r\n  // 2. л Ҳмқҙм•„мӣғ мһ¬мёЎм • (мҠӨнҒ¬лЎӨ мң„м№ҳ л°ҳмҳҒ)\r\n  measureScrollViewPosition();\r\n  await remeasureDayLayouts();\r\n\r\n  // 3. Floating Card мғқм„ұ\r\n  if (!cardLayout.width || !cardLayout.height || !floatingPortal) return;\r\n\r\n  floatingPortal.createFloatingCard(\r\n    item, dayId, index, cardLayout, initialPosition, { dx: 0, dy: 0 }\r\n  );\r\n\r\n  // 4. нҺҳмқҙл“ңмқё м• лӢҲл©”мқҙм…ҳ\r\n  Animated.timing(floatingPortal.floatingOpacity, {\r\n    toValue: 0.9,\r\n    duration: 150,\r\n    useNativeDriver: false,\r\n  }).start();\r\n}, [/* deps */]);\r\n```\r\n\r\n### л“ңлһҳк·ё мў…лЈҢ \u0026 лҚ°мқҙн„° м—…лҚ°мқҙнҠё\r\n\r\nл“ңлЎӯ мӢң н•өмӢ¬ лЎңм§ҒмқҖ **к°ҷмқҖ Day лӮҙ мқҙлҸҷ**мқём§Җ **лӢӨлҘё DayлЎң мқҙлҸҷ**мқём§Җм—җ л”°лқј лӢӨлҘҙлӢӨ.\r\n\r\n```tsx\r\nconst handleDragEnd = useCallback((\r\n  y: number,\r\n  dayData: any,\r\n  setDayData: (updater: (prev: any) =\u003e any) =\u003e void\r\n) =\u003e {\r\n  // 1. л“ңлһҳк·ё мў…лЈҢ мӢң мһҗлҸҷ мҠӨнҒ¬лЎӨ мӨ‘м§Җ\r\n  stopAutoScroll();\r\n\r\n  // л“ңлһҳк·ё мӨ‘мқё м•„мқҙн…ңмқҙ м—Ҷмңјл©ҙ early return\r\n  if (!draggingItem) return;\r\n\r\n  // 2. нҳ„мһ¬ мҶҗк°ҖлқҪ мң„м№ҳ(y)лҘј кё°л°ҳмңјлЎң л“ңлЎӯн•  мң„м№ҳ кі„мӮ°\r\n  const dropTarget = getDropTarget(y);\r\n\r\n  if (dropTarget) {\r\n    const { dayId: targetDay, insertIndex } = dropTarget;\r\n    const { item, sourceDay, sourceIndex } = draggingItem;\r\n\r\n    if (targetDay === sourceDay) {\r\n      // ============================================\r\n      // Case 1: к°ҷмқҖ Day лӮҙм—җм„ң мҲңм„ң ліҖкІҪ\r\n      // ============================================\r\n\r\n      // мң„м№ҳк°Җ мӢӨм ңлЎң ліҖкІҪлҗҳлҠ” кІҪмҡ°м—җл§Ң м—…лҚ°мқҙнҠё\r\n      // - insertIndex === sourceIndex: м ңмһҗлҰ¬\r\n      // - insertIndex === sourceIndex + 1: л°”лЎң м•„лһҳм№ё (мӢӨм§Ҳм ҒмңјлЎң м ңмһҗлҰ¬)\r\n      if (insertIndex !== sourceIndex \u0026\u0026 insertIndex !== sourceIndex + 1) {\r\n        setDayData((prevData) =\u003e {\r\n          const newDayData = { ...prevData };\r\n          const plans = [...newDayData[sourceDay].plans];\r\n\r\n          // мӣҗліё мң„м№ҳм—җм„ң м•„мқҙн…ң м ңкұ°\r\n          const [movedItem] = plans.splice(sourceIndex, 1);\r\n\r\n          // вҡ пёҸ мқёлҚұмҠӨ ліҙм • (мӨ‘мҡ”!)\r\n          // м•„мқҙн…ңмқ„ м ңкұ°н•ҳл©ҙ л’ӨмӘҪ мқёлҚұмҠӨк°Җ лӘЁл‘җ 1м”© мӨ„м–ҙл“Ұ\r\n          // мҳҲ: [A,B,C,D]м—җм„ң B(1)лҘј м ңкұ° вҶ’ [A,C,D]\r\n          //     мӣҗлһҳ D л’Ө(insertIndex=4)м—җ л„Јмңјл Өл©ҙ вҶ’ мӢӨм ңлЎңлҠ” 3м—җ мӮҪмһ…\r\n          const finalIndex = insertIndex \u003e sourceIndex\r\n            ? insertIndex - 1\r\n            : insertIndex;\r\n\r\n          // кі„мӮ°лҗң мң„м№ҳм—җ м•„мқҙн…ң мӮҪмһ…\r\n          plans.splice(finalIndex, 0, movedItem);\r\n\r\n          newDayData[sourceDay].plans = plans;\r\n          return newDayData;\r\n        });\r\n      }\r\n    } else {\r\n      // ============================================\r\n      // Case 2: лӢӨлҘё DayлЎң мқҙлҸҷ\r\n      // ============================================\r\n      setDayData((prevData) =\u003e {\r\n        const newDayData = { ...prevData };\r\n\r\n        // мӣҗліё Dayм—җм„ң м•„мқҙн…ң м ңкұ°\r\n        const [movedItem] = newDayData[sourceDay].plans.splice(sourceIndex, 1);\r\n\r\n        // мғҲ Dayм—җ л§һкІҢ м•„мқҙн…ң м •ліҙ м—…лҚ°мқҙнҠё\r\n        const newItem = {\r\n          ...movedItem,\r\n          day: targetDay,\r\n          // вҡ пёҸ key мһ¬мғқм„ұ н•„мҲҳ!\r\n          // Reactк°Җ к°ҷмқҖ keyлҘј лӢӨлҘё лҰ¬мҠӨнҠём—җм„ң л°ңкІ¬н•ҳл©ҙ\r\n          // мҳҲкё°м№ҳ м•ҠмқҖ л ҢлҚ”л§Ғ л¬ём ңк°Җ л°ңмғқн•  мҲҳ мһҲмқҢ\r\n          key: `${targetDay}-${Date.now()}`\r\n        };\r\n\r\n        // нғҖкІҹ Dayмқҳ кі„мӮ°лҗң мң„м№ҳм—җ мӮҪмһ…\r\n        newDayData[targetDay].plans.splice(insertIndex, 0, newItem);\r\n\r\n        return newDayData;\r\n      });\r\n    }\r\n  }\r\n\r\n  // 3. Floating Card м •лҰ¬ (нҺҳмқҙл“ңм•„мӣғ м• лӢҲл©”мқҙм…ҳ л“ұ)\r\n  // ...\r\n}, [/* deps */]);\r\n```\r\n\r\n### мқёлҚұмҠӨ ліҙм •мқҙ н•„мҡ”н•ң мқҙмң \r\n\r\nк°ҷмқҖ Day лӮҙм—җм„ң м•„мқҙн…ңмқ„ мқҙлҸҷн•  л•Ң мЈјмқҳн•  м җмқҙ мһҲлӢӨ:\r\n\r\n```\r\nBefore: [A, B, C, D]\r\n        0  1  2  3\r\n\r\nBлҘј D л’ӨлЎң мҳ®кё°кі  мӢ¶лӢӨл©ҙ?\r\nвҶ’ insertIndex = 4 (D лӢӨмқҢ)\r\n\r\nн•ҳм§Җл§Ң BлҘј лЁјм Җ м ңкұ°н•ҳл©ҙ:\r\n[A, C, D]\r\n 0  1  2\r\n\r\nмқҙм ң insertIndex = 4лҠ” лІ”мң„лҘј лІ—м–ҙлӮңлӢӨ!\r\nвҶ’ мӢӨм ңлЎңлҠ” insertIndex - 1 = 3м—җ мӮҪмһ…н•ҙм•ј н•Ё\r\n```\r\n\r\nк·ёлһҳм„ң `insertIndex \u003e sourceIndex`мқј л•ҢлҠ” 1мқ„ л№јмӨҳм•ј н•ңлӢӨ.\r\n\r\n---\r\n\r\n## лӢӨмқҢ нҺём—җм„ң\r\n\r\nм§ҖкёҲк№Ңм§Җ л Ҳмқҙм•„мӣғ мёЎм •кіј л“ңлЎӯ нғҖкІҹ кі„мӮ°, кё°ліём Ғмқё л“ңлһҳк·ё мғҒнғң кҙҖлҰ¬лҘј кө¬нҳ„н–ҲлӢӨ.\r\n\r\nлӢӨмқҢ нҺём—җм„ңлҠ”:\r\n- **Floating Card**: Portal нҢЁн„ҙмңјлЎң л“ңлһҳк·ё мӨ‘мқё м№ҙл“ңлҘј мөңмғҒмң„м—җ л ҢлҚ”л§Ғн•ҳкё°\r\n- **мһҗлҸҷ мҠӨнҒ¬лЎӨ**: нҷ”л©ҙ кІҪкі„м—җм„ң мһҗлҸҷмңјлЎң мҠӨнҒ¬лЎӨлҗҳкІҢ н•ҳкё°\r\n- **нҠёлҹ¬лё”мҠҲнҢ…**: кө¬нҳ„н•ҳл©ҙм„ң л§ҢлӮ¬лҚҳ н•Ём •л“Ө\r\n\r\nмқ„ лӢӨлЈ° мҳҲм •мқҙлӢӨ.\r\n\r\nкё°лҢҖл¶ҖнғҒ л§Ңл°ҳмһҳл¶Җ!\r\n"},{"slug":"posts/React Native/React Native м№ёл°ҳліҙл“ң л“ңлһҳк·ё м•Ө л“ңлЎӯ кө¬нҳ„кё°_1","title":"React Native м№ёл°ҳліҙл“ң л“ңлһҳк·ё м•Ө л“ңлЎӯ кө¬нҳ„кё° (1)","date":"2025-12-28T22:16:00.000Z","image":"index.png","summary":"React Nativeм—җм„ң м№ёл°ҳліҙл“ң нҳ•нғңмқҳ Drag \u0026 Dropмқ„ кө¬нҳ„н•ҳл©° PanResponder кё°л°ҳ м ҲлҢҖ мўҢн‘ң мӢңмҠӨн…ңмқ„ м„ нғқн•ң мқҙмң мҷҖ кө¬нҳ„ кіјм •мқ„ кіөмң н•©лӢҲлӢӨ.","tags":["react native","л“ңлһҳк·ё м•Ө л“ңлЎӯ","PanResponder","м№ёл°ҳліҙл“ң","нҠёлҹ¬лё”мҠҲнҢ…"],"content":"\r\n# React Native м№ёл°ҳліҙл“ң л“ңлһҳк·ё м•Ө л“ңлЎӯ кө¬нҳ„кё°(1)\r\n\r\n## м„ңлЎ \r\nм•Ҳл…•н•ҳмӢӯлӢҲк№Ң. мҳӨлһңл§Ңм—җ лӢӨмӢң кёҖмқ„ м“°кІҢ лҗҳм—ҲлӢӨ.\r\nм—¬лҹ¬ н”„лЎңм қнҠёмҷҖ м·Ём—…мӨҖл№„лЎң мқён•ҙ н•ңлҸҷм•Ҳ кёҖмқ„ м“°м§Җ лӘ»н–ҲлҠ”лҚ°, (~~(мӮ¬мӢӨ мқҳм§Җл Ҙ мқҙмҠҲлЎң)~~) м§ҖкёҲл¶Җн„°лқјлҸ„! лӢӨмӢң м—ҙмӢ¬нһҲ кёҖмқ„ м“°л Өкі  н•ңлӢӨ!\r\n\r\nкҙҖкҙ‘лҚ°мқҙн„° кіөлӘЁм „м—җм„ң лӢӨмӢң expoкё°л°ҳмқҳ React NativeлЎң н”„лЎңм қнҠёлҘј м§„н–үн–Ҳм—ҲлҠ”лҚ°, м—¬кё°м„ң кө¬нҳ„н•ң лӢӨм–‘н•ң кё°лҠҘл“Ө мӨ‘ м—¬н–ү мқјм •мқ„ кҙҖлҰ¬н•ҳкё° мң„н•ҙ л“ңлһҳк·ё м•Ө л“ңлЎӯмқ„ мӮ¬мҡ©н•ҳм—¬ к°Ғ Dayмқҳ мқјм •л“Өмқ„ л“ңлһҳк·ё м•Ө л“ңлЎӯмңјлЎң нҺём§‘н•  мҲҳ мһҲм–ҙм•ј н–ҲлӢӨ. л°ұл¬ёмқҙ л¶Ҳм—¬мқјкІ¬мқҙлқјкі  мӢӨм ң кө¬нҳ„н–ҲлҚҳ л¶Җл¶„мқ„ ліҙм—¬мЈјкІ лӢӨ.\r\n\r\n\u003cimg src=\"1.gif\" alt=\"л“ңлһҳк·ё м•Ө л“ңлЎӯ кө¬нҳ„ нҷ”л©ҙ\"/\u003e\r\n\r\n\r\nлӢӨмқҢкіј к°ҷмқҙ к°ҷмқҖ Day лӮҙм—җм„ңмқҳ мҡ”мҶҢмқҳ н„°м№ҳлҘј нҶөн•ң мқҙлҸҷ, лҰ¬мҠӨнҠёк°„м—җм„ңлҸ„ мҡ”мҶҢлҘј мқҙлҸҷн•  мҲҳ мһҲм–ҙм•ј н–Ҳкі , мҡ”мҶҢк°Җ нҠ№м • кІҪкі„м„ мңјлЎң к°Ҳ кІҪмҡ° мһҗлҸҷ мҠӨнҒ¬лЎӨлҸ„ лҗҳм–ҙм•ј н–ҲлӢӨ.\r\n\r\nм•һмңјлЎң мқҙ кё°лҠҘмқ„ кө¬нҳ„н•  л•Ң н•„мҡ”н–ҲлҚҳ кё°мҲ кіј лҰ¬мҠӨнҠё лӮҙм—җм„ң мҡ”мҶҢлҘј лҶ“лҠ” кІғмқ„ кө¬нҳ„н–ҲлҚҳ л°©лІ•л“Өмқ„ ліҙм—¬мӨ„ кІғмқҙлӢӨ.\r\n\r\nм•„м§Ғ м·ЁмӨҖмғқмқҙлқј л§Һмқҙ л¶ҖмЎұн•ҙліҙмқҙкІ м§Җл§Ң лӘЁмӘјлЎқ мһҳ л¶ҖнғҒл“ңлҰҪлӢҲлӢӨ!!\r\n\r\n## лқјмқҙлёҢлҹ¬лҰ¬ м—Ҷмқҙ Drag \u0026 Dropмқ„ кө¬нҳ„н•ҳкё°лЎң н•ң мқҙмң \r\nмӮ¬мӢӨ... лқјмқҙлёҢлҹ¬лҰ¬лЎң кө¬нҳ„н•ҳлҠ”кІҢ л¶„лӘ…нһҲ лҚ” мүҪкі , м •мӢ кұҙк°•(?)мғҒлҸ„ мўӢм•ҳмқ„ кІғмқҙлӢӨ. н•ҳм§Җл§Ң, к·ёлҹјм—җлҸ„ м§Ғм ‘ кө¬нҳ„мқ„ м„ нғқн–ҲлҚҳ мқҙмң к°Җ мһҲлӢӨ.\r\n\r\nмҡ°м„ , кё°мЎҙм—җ лӮҳмҷҖмһҲлҚҳ лқјмқҙлёҢлҹ¬лҰ¬лҘј мӮҙнҺҙліҙмһҗ.\r\n(2025 8мӣ”~10мӣ” кё°мӨҖмңјлЎң кө¬нҳ„н–Ҳмқ„ л•Ңмқҳ кё°мӨҖмһ…лӢҲлӢӨ.)\r\n\r\n\r\n\r\n## н•„мҡ” кё°мҲ л“Ө\r\n###  react-beautiful-dnd\r\nк°ҖмһҘ мң лӘ…н•ң Drag \u0026 Drop лқјмқҙлёҢлҹ¬лҰ¬лҠ” `react-beautiful-dnd`мҳҖлӢӨ.  \r\nмӣ№ нҷҳкІҪм—җм„ңлҠ” мқҙлҜё кІҖмҰқлҗң лқјмқҙлёҢлҹ¬лҰ¬мқҙкі , м№ёл°ҳліҙл“ң кө¬нҳ„ мӮ¬лЎҖлҸ„ н’Қл¶Җн–ҲлӢӨ. мҳӨ мқҙкұёлЎң н•ҳл©ҙ лҗҳкІ кө°! \r\n\r\nн•ҳм§Җл§Ң,\r\n\r\n-   **мӣ№ м „мҡ© лқјмқҙлёҢлҹ¬лҰ¬**\r\n    \r\n-   React Native нҷҳкІҪм—җм„ңлҠ” мӮ¬мҡ© л¶Ҳк°Җ\r\n    \r\n\r\nм•„л¬ҙлҰ¬ кө¬нҳ„ мӮ¬лЎҖк°Җ л§Һм•„лҸ„, мқҙлІҲ н”„лЎңм қнҠём—җлҠ” м Ғмҡ©н•  мҲҳ м—ҶлҠ” м„ нғқм§ҖмҳҖлӢӨ.\r\n\r\n----------\r\n\r\n###  react-native-draggable-flatlist\r\n\r\nлӢӨмқҢмңјлЎң кІҖнҶ н•ң лқјмқҙлёҢлҹ¬лҰ¬лҠ” м ңмқј мң лӘ…н–ҲлҚҳ  `react-native-draggable-flatlist`мҳҖлӢӨ.  \r\nReact Native нҷҳкІҪм—җм„ң Drag \u0026 Dropмқ„ м§Җмӣҗн•ҳлҠ” лҢҖн‘ңм Ғмқё лқјмқҙлёҢлҹ¬лҰ¬лӢӨ.\r\n\r\nлӢЁмқј лҰ¬мҠӨнҠё лӮҙм—җм„ң м•„мқҙн…ң мҲңм„ңлҘј ліҖкІҪн•ҳлҠ” мҡ©лҸ„лЎңлҠ” м¶©л¶„нһҲ мһҳ лҸҷмһ‘н–ҲлӢӨ.  \r\nн•ҳм§Җл§Ң мӢӨм ң мҡ”кө¬мӮ¬н•ӯкіј л№„көҗн•ҙліҙлӢҲ кІ°м •м Ғмқё м°Ёмқҙк°Җ мһҲм—ҲлӢӨ.\r\n\r\n-    **лӢЁмқј лҰ¬мҠӨнҠё кё°мӨҖ м„Өкі„**\r\n    \r\n-   м—¬лҹ¬ м»¬лҹј(Day) к°„ мқҙлҸҷмқ„ м „м ңлЎң н•ҳм§Җ м•ҠмқҢ\r\n    \r\n-   л“ңлһҳк·ё мӨ‘ лӢӨлҘё лҰ¬мҠӨнҠё мң„лЎң мқҙлҸҷн•ҳлҠ” мӢңлӮҳлҰ¬мҳӨк°Җ кө¬мЎ°м ҒмңјлЎң л§һм§Җ м•ҠмқҢ\r\n    \r\n\r\nм—¬лҹ¬ к°ңмқҳ лӮ м§ң м»¬лҹјмқ„ л„ҳлӮҳл“ңлҠ” **м№ёл°ҳліҙл“ң нҳ•нғңмқҳ Drag \u0026 Drop**мқ„ кө¬нҳ„н•ҳкё°м—җлҠ”  \r\nлқјмқҙлёҢлҹ¬лҰ¬мқҳ кё°ліё м„Өкі„ мһҗмІҙк°Җ л§һм§Җ м•Ҡм•ҳлӢӨ.\r\n\r\nл¬ҙлҰ¬н•ҳкІҢ м»ӨмҠӨн„°л§Ҳмқҙм§•н•  мҲҳлҸ„ мһҲм—ҲкІ м§Җл§Ң,  \r\nк·ё кІҪмҡ° лқјмқҙлёҢлҹ¬лҰ¬ лӮҙл¶Җ кө¬нҳ„м—җ к°•н•ҳкІҢ мқҳмЎҙн•ҳкІҢ лҗҳкі   \r\nмң м§ҖліҙмҲҳ л№„мҡ©мқҙ кёүкІ©нһҲ мҰқк°Җн•  к°ҖлҠҘм„ұмқҙ лҶ’м•ҳлӢӨ.\r\n\r\nк·ё мҷём—җлҸ„ Stack OverflowмҷҖ кө¬кёҖл§Ғмқ„ нҶөн•ҙ кҫёмӨҖнһҲ лқјмқҙлёҢлҹ¬лҰ¬лҘј м°ҫм•„ліҙм•ҳм§Җл§Ң, м№ёл°ҳліҙл“ң нҳ•нғңлЎң лҰ¬мҠӨнҠё к°„ л“ңлһҳк·ё м•Ө л“ңлЎӯмқ„ кө¬нҳ„н•ҳлҠ” мөңмӢ  лқјмқҙлёҢлҹ¬лҰ¬к°Җ м—Ҷм—Ҳкі , мҳҲм ңл“Ө м—ӯмӢң л§Өмҡ° мҳҲм „ кІғл“Ө л°–м—җ м—Ҷм—ҲлӢӨ.\r\n\r\nк·ёлһҳм„ң **м§Ғм ‘ кө¬нҳ„н•ҳмһҗ!** лқјлҠ” кІ°лЎ м—җ лҸ„лӢ¬н•ҳкІҢ лҗҳм—ҲлӢӨ.\r\n\r\n## PanResponderлҘј м„ нғқн•ң мқҙмң \r\n\r\nлқјмқҙлёҢлҹ¬лҰ¬лҘј м§Ғм ‘ кө¬нҳ„н•ҳкё°лЎң кІ°м •н•ң л’Ө, к°ҖмһҘ лЁјм Җ кі лҜјн•ң кұҙ  \r\n**м–ҙл–Ө лҸ„кө¬лЎң л“ңлһҳк·ё мһ…л Ҙмқ„ л°ӣмқ„ кІғмқёк°Җ**мҳҖлӢӨ.\r\n\r\nReact Nativeм—җм„ң м ңмҠӨмІҳлҘј лӢӨлЈЁлҠ” м„ нғқм§ҖлҠ” лӘҮ к°Җм§Җк°Җ мһҲм§Җл§Ң,  \r\nмқҙлІҲ кө¬нҳ„м—җм„ңлҠ” **PanResponder**лҘј кё°л°ҳмңјлЎң н•ҳкё°лЎң н–ҲлӢӨ.\r\n\r\n### PanResponderлһҖ?\r\n\r\nPanResponderлҠ” React Nativeм—җм„ң м ңкіөн•ҳлҠ” кё°ліё м ңмҠӨмІҳ мӢңмҠӨн…ңмқҙлӢӨ.  \r\nн„°м№ҳ мӢңмһ‘, мқҙлҸҷ, мў…лЈҢмҷҖ к°ҷмқҖ мқҙлІӨнҠёлҘј м„ёл°Җн•ҳкІҢ м ңм–ҙн•  мҲҳ мһҲкі ,  \r\nмҷёл¶Җ лқјмқҙлёҢлҹ¬лҰ¬ м—ҶмқҙлҸ„ л“ңлһҳк·ё мқён„°лһҷм…ҳмқ„ кө¬нҳ„н•  мҲҳ мһҲлӢӨ.\r\n\r\n```js\r\nconst panResponder = PanResponder.create({\r\n  onStartShouldSetPanResponder: () =\u003e true,\r\n  onPanResponderMove: (evt, gestureState) =\u003e {\r\n    // н„°м№ҳ мқҙлҸҷ мІҳлҰ¬\r\n  },\r\n  onPanResponderRelease: () =\u003e {\r\n    // н„°м№ҳ мў…лЈҢ мІҳлҰ¬\r\n  },\r\n});\r\n```\r\n\r\nмӮ¬мӢӨ лӢЁмҲңн•ң Drag \u0026 Dropмқҙлқјл©ҙ,  \r\n`gestureState.dx / dy` к°’мқ„ к·ёлҢҖлЎң мӮ¬мҡ©н•ҙм„ң  \r\nм№ҙл“ңлҘј мӣҖм§ҒмқҙлҠ” л°©мӢқлҸ„ м¶©л¶„нһҲ к°ҖлҠҘн•ҳлӢӨ.\r\n\r\nн•ҳм§Җл§Ң мқҙ н”„лЎңм қнҠём—җм„ңлҠ” **к·ё л°©мӢқмқҙ л§һм§Җ м•Ҡм•ҳлӢӨ.**\r\n\r\n----------\r\n\r\n## PanResponderлҘј \"л“ңлһҳк·ё м—”м§„\"мңјлЎң м“°м§Җ м•Ҡкё°лЎң н•ң мқҙмң \r\nм№ёл°ҳліҙл“ң нҳ•нғңмқҳ Drag \u0026 Dropм—җм„ңлҠ”\r\nлӢӨмқҢкіј к°ҷмқҖ мғҒнҷ©мқҙ лҸҷмӢңм—җ л°ңмғқн•ңлӢӨ.\r\n\r\n- м—¬лҹ¬ к°ңмқҳ м„ёлЎң лҰ¬мҠӨнҠё\r\n- к°Ғ лҰ¬мҠӨнҠёмқҳ лҸ…лҰҪм Ғмқё мҠӨнҒ¬лЎӨ\r\n- л“ңлһҳк·ё мӨ‘ лӢӨлҘё м»¬лҹјмңјлЎң мқҙлҸҷ\r\n- нҷ”л©ҙ лҒқм—җм„ң мһҗлҸҷ мҠӨнҒ¬лЎӨ\r\n\r\nмқҙ нҷҳкІҪм—җм„ң PanResponderк°Җ м ңкіөн•ҳлҠ” gestureState.dx / dy кё°л°ҳмқҳ мғҒлҢҖ мўҢн‘ң мӢңмҠӨн…ңмқҖ л№ лҘҙкІҢ н•ңкі„лҘј л“ңлҹ¬лғҲлӢӨ.\r\nмғҒлҢҖ мўҢн‘ңмқҳ л¬ём ңм җ\r\n\r\n- dx/dyлҠ” м ңмҠӨмІҳ мӢңмһ‘м җ кё°мӨҖ лҲ„м Ғ мқҙлҸҷлҹүмқҙлқј мҠӨнҒ¬лЎӨмқҙ к°ңмһ…лҗҳл©ҙ кё°мӨҖм җмқҙ нӢҖм–ҙм§„лӢӨ\r\n- м»¬лҹјмқҙ м—¬лҹ¬ к°ңмқјмҲҳлЎқ к°Ғк°Ғмқҳ л Ҳмқҙм•„мӣғ мўҢн‘ңлҘј м¶”м Ғн•ҳкё° ліөмһЎн•ҙм§„лӢӨ\r\n- PortalлЎң л ҢлҚ”л§Ғлҗң Floating CardлҠ” нҷ”л©ҙ мөңмғҒмң„м—җ мң„м№ҳн•ҳлҜҖлЎң л¶ҖлӘЁ м»ҙнҸ¬л„ҢнҠё кё°мӨҖмқҳ мғҒлҢҖ мўҢн‘ңмҷҖ кё°мӨҖмқҙ м–ҙкёӢлӮңлӢӨ\r\n\r\nкІ°көӯ мӨ‘мҡ”н•ң кұҙ\r\n\"м ңмҠӨмІҳ мӢңмһ‘м җмңјлЎңл¶Җн„° м–јл§ҲлӮҳ мӣҖм§ҒмҳҖлҠ”к°Җ\"к°Җ м•„лӢҲлқј\r\n**м§ҖкёҲ мҶҗк°ҖлқҪмқҙ нҷ”л©ҙмқҳ м–ҙл””м—җ мһҲлҠ”к°Җ**мҳҖлӢӨ.\r\nм ҲлҢҖ мўҢн‘ң кё°л°ҳ м ‘к·ј\r\nк·ёлһҳм„ң PanResponderмқҳ `gestureState.dx/dy`лҘј лІ„лҰ¬кі \r\n`evt.nativeEvent.pageX / pageY`лЎң нҷ”л©ҙ м ҲлҢҖ мўҢн‘ңл§Ңмқ„ мӮ¬мҡ©н–ҲлӢӨ.\r\nмқҙ л°©мӢқмқҳ мһҘм җмқҖ лӘ…нҷ•н–ҲлӢӨ.\r\n\r\n- мҠӨнҒ¬лЎӨ м—¬л¶ҖмҷҖ мғҒкҙҖм—Ҷмқҙ н•ӯмғҒ лҸҷмқјн•ң кё°мӨҖ (нҷ”л©ҙ мўҢмғҒлӢЁ кё°мӨҖ)\r\n- м—¬лҹ¬ м»¬лҹј к°„ мқҙлҸҷм—җлҸ„ мўҢн‘ңк°Җ мқјкҙҖлҗЁ\r\n- Portalм—җ л ҢлҚ”л§Ғлҗң Floating Cardмқҳ мң„м№ҳ кі„мӮ°кіј мһҗм—°мҠӨлҹҪкІҢ м—°кІ°лҗЁ\r\n- л“ңлЎӯ нғҖкІҹ нҢҗлі„ мӢң лӘЁл“  мҡ”мҶҢк°Җ к°ҷмқҖ мўҢн‘ңкі„лҘј кіөмң \r\n\r\nмҰү, PanResponderлҠ”\r\n**мғҒлҢҖ мқҙлҸҷлҹүмқ„ кі„мӮ°н•ҳлҠ” лҸ„кө¬**к°Җ м•„лӢҲлқј\r\n**нҳ„мһ¬ н„°м№ҳ мң„м№ҳлҘј м „лӢ¬н•ҳлҠ” лҸ„кө¬**к°Җ лҗҳм—ҲлӢӨ.\r\n**м—ӯн• мқ„ лӘ…нҷ•нһҲ лӮҳлҲ„лӢӨ**\r\n\r\nмқҙ мӢңм җм—җм„ң Drag \u0026 Drop кө¬мЎ°лҠ” мқҙл ҮкІҢ лӮҳлүҳм—ҲлӢӨ.\r\n\r\n- PanResponder\r\n\r\n  - н„°м№ҳ мӢңмһ‘ / мқҙлҸҷ / мў…лЈҢ к°җм§Җ\r\n  - нҳ„мһ¬ мҶҗк°ҖлқҪмқҳ м ҲлҢҖ мўҢн‘ң(pageX/pageY) м „лӢ¬\r\n\r\n\r\n- л“ңлһҳк·ё лЎңм§Ғ\r\n  - м ҲлҢҖ мўҢн‘ң кё°л°ҳ мғҒлҢҖ мқҙлҸҷлҹү кі„мӮ°\r\n  - л“ңлЎӯ мң„м№ҳ нҢҗлі„ (м–ҙлҠҗ м»¬лҹј, м–ҙлҠҗ мқёлҚұмҠӨ)\r\n  - м»¬лҹј к°„ мқҙлҸҷ кі„мӮ°\r\n  - мҠӨнҒ¬лЎӨ мҳӨн”„м…Ӣ ліҙм •\r\n  - лҚ°мқҙн„° м—…лҚ°мқҙнҠё\r\n\r\n\r\n- мӢңк°Ғм Ғ н‘ңнҳ„\r\n\r\n  - Portalмқ„ нҶөн•ң Floating Card л ҢлҚ”л§Ғ\r\n  - м ҲлҢҖ мўҢн‘ң кё°л°ҳ мҙҲкё° мң„м№ҳ м„Өм •\r\n  - Animated.ValueлЎң мқҙлҸҷлҹү л°ҳмҳҒ\r\n  - opacity, scale л“ұмқҳ н”јл“ңл°ұ м• лӢҲл©”мқҙм…ҳ\r\n\r\n\r\n\r\nPanResponderк°Җ лӘЁл“  кұё мұ…мһ„м§Җм§Җ м•ҠкІҢ лҗҳмһҗ,\r\nкө¬нҳ„мқҖ мҳӨнһҲл Ө лӢЁмҲңн•ҙмЎҢкі \r\nк°Ғ лЎңм§Ғмқ„ лҸ…лҰҪм ҒмңјлЎң н…ҢмҠӨнҠён•ҳкі  к°ңм„ н•  мҲҳ мһҲм—ҲлӢӨ.\r\n\r\n## мқҙм–ҙм„ң\r\nлӢӨмқҢ нҺём—җм„ңлҠ” мқҙлҘј мқҙмҡ©н•ң кө¬нҳ„мҪ”л“ңл“Өмқ„ ліҙм—¬мӨ„ мҳҲм •мқҙлӢӨ. кё°лҢҖ л¶ҖнғҒ~"}]},"__N_SSG":true},"page":"/posts/tag/[tag]","query":{"tag":"л“ңлһҳк·ё м•Ө л“ңлЎӯ"},"buildId":"1eVqubwG0cWqCFZaPcUKt","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
