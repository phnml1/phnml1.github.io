igin=""></script><script src="/_next/static/ZZIvuqctppkj_caIDL9HZ/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/ZZIvuqctppkj_caIDL9HZ/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"><script>!function(){try{var d=document.documentElement,c=d.classList;c.remove('light','dark');var e=localStorage.getItem('theme');if('system'===e||(!e&&true)){var t='(prefers-color-scheme: dark)',m=window.matchMedia(t);if(m.media!==t||m.matches){d.style.colorScheme = 'dark';c.add('dark')}else{d.style.colorScheme = 'light';c.add('light')}}else if(e){c.add(e|| '')}if(e==='light'||e==='dark')d.style.colorScheme=e}catch(e){}}()</script></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"tags":["nextjs","react","performance","server-components","promise-all","optimization","react native","드래그 앤 드롭","성능 최적화","Zustand","React.memo","selector","칸반보드","props drilling","PanResponder","useMemo","useRef","useNativeDriver","리렌더링","자동 스크롤","requestAnimationFrame","Portal","Context API","Animated","hooks","트러블슈팅","google map","expo-location","졸업작품","JavaScript","deepdive","useState","hook","next.js","SSR","Suspense","렌더링","테스트","dev tools","SSG","Algorithm","프로그래머스","PCCP","lv2","이분탐색","클로저","생명주기","Virtual DOM","백준","gold","dfs","lv3","bfs"],"currentTag":"selector","posts":[{"slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 성능 최적화 (3) - Zustand Store와 React.memo로 리렌더링 최소화","title":"React Native 칸반보드 드래그 앤 드롭 성능 최적화 (3) - Zustand Store와 React.memo로 리렌더링 최소화","date":"2026-03-22T12:00:00.000Z","image":"index.png","summary":"2편의 개선에도 불구하고 남아있는 30-46ms짜리 큰 리렌더링의 원인은 props drilling이었습니다. Zustand store로 draggingItem 상태를 분리하고, React.memo와 세밀한 selector로 전체 트리 리렌더링을 차단합니다.","tags":["react native","드래그 앤 드롭","성능 최적화","Zustand","React.memo","selector","칸반보드","props drilling"],"content":"\r\n# React Native 칸반보드 드래그 앤 드롭 성능 최적화 (3) - Zustand Store와 React.memo로 리렌더링 최소화\r\n\r\n\u003e 이 시리즈는 React Native에서 직접 구현한 칸반보드 드래그 앤 드롭의 성능을 측정하고 개선하는 과정을 다룹니다.\r\n\u003e\r\n\u003e [2편: PanResponder 안정화와 Native 애니메이션](/blog/react-native-kanban-drag-drop-performance-2)에서 커밋 수는 12회 → 8회로 줄었지만, **30-46ms짜리 큰 리렌더링은 여전히 남아** 있었습니다.\r\n\r\n---\r\n\r\n## 2편의 성과와 한계\r\n\r\n지난 글에서 적용한 개선들:\r\n1. `PanResponder`를 `useMemo`로 안정화\r\n2. `useNativeDriver: true`로 애니메이션을 Native 스레드로 전환\r\n\r\n결과:\r\n- 애니메이션 커밋 4개가 프로파일러에서 사라짐\r\n- 커밋 수: 12회 → 8회\r\n- **하지만 최대 duration과 리렌더 컴포넌트 수는 그대로** (30-46ms, 200개 이상)\r\n\r\n---\r\n\r\n## 큰 리렌더링의 원인: props drilling\r\n\r\nReact DevTools Profiler를 다시 살펴보면, 큰 커밋들(30-46ms)의 **Updater**가 모두 다른 컴포넌트입니다.\r\n\r\n```\r\n커밋 3  | 46.10ms | Updater: DraggablePlanCard, TravelPlanKanban, FloatingPortalProvider\r\n커밋 6  | 45.06ms | Updater: TravelPlanKanban\r\n커밋 7  | 31.28ms | Updater: DraggablePlanCard × 4, TravelPlanKanban\r\n```\r\n\r\n문제를 추적하면:\r\n\r\n```tsx\r\n// TravelPlanKanban.tsx (최상위 상태 관리 컴포넌트)\r\nconst [draggingItem, setDraggingItem] = useState(null);  // 🔴 여기서 관리\r\nconst [dayData, setDayData] = useState(...);\r\n\r\nreturn (\r\n  \u003cView\u003e\r\n    {/* 상태가 바뀔 때마다 모든 자식이 리렌더링 */}\r\n    \u003cDayColumn dayId=\"day1\" draggingItem={draggingItem} ...props /\u003e\r\n    \u003cDayColumn dayId=\"day2\" draggingItem={draggingItem} ...props /\u003e\r\n    \u003cDayColumn dayId=\"day3\" draggingItem={draggingItem} ...props /\u003e\r\n    \u003cDayColumn dayId=\"day4\" draggingItem={draggingItem} ...props /\u003e\r\n  \u003c/View\u003e\r\n);\r\n```\r\n\r\n드래그 중 `draggingItem`이 바뀔 때마다:\r\n1. `TravelPlanKanban`이 리렌더링\r\n2. 모든 `DayColumn`, `DraggablePlanCard` (자식 전체) 리렌더링\r\n3. 각 리렌더링마다 232개 컴포넌트가 다시 그려짐\r\n\r\n```\r\ndraggingItem 변경 (드래그 이동 1회)\r\n    ↓\r\nTravelPlanKanban 상태 업데이트\r\n    ↓\r\n모든 자식 트리 리렌더링  ← 😱 DayColumn × 4, DraggablePlanCard × 8, 그 이하 모든 자식들\r\n    ↓\r\n46ms 커밋 기록\r\n    ↓\r\n다음 드래그 이동 이벤트\r\n```\r\n\r\n---\r\n\r\n## 해결책: Zustand store로 상태 분리\r\n\r\n핵심은 **상태가 필요한 컴포넌트만 구독하고, 나머지는 리렌더링하지 않는 것**입니다.\r\n\r\n### 1단계: Zustand store 설계\r\n\r\n```tsx\r\n// stores/useDragStore.ts\r\nimport { create } from 'zustand';\r\n\r\ninterface DragStore {\r\n  // 드래그 상태\r\n  draggingItem: ScheduleItem | null;\r\n  draggingSourceDay: string | null;\r\n\r\n  // 드래그 위치 추적 (빠르게 변하는 값)\r\n  dropTargetDay: string | null;\r\n  dropPosition: number | null;\r\n\r\n  // 액션\r\n  setDraggingItem: (item: ScheduleItem | null, sourceDay: string | null) =\u003e void;\r\n  setDropTarget: (dayId: string | null, position: number | null) =\u003e void;\r\n  resetDrag: () =\u003e void;\r\n}\r\n\r\nexport const useDragStore = create\u003cDragStore\u003e((set) =\u003e ({\r\n  draggingItem: null,\r\n  draggingSourceDay: null,\r\n  dropTargetDay: null,\r\n  dropPosition: null,\r\n\r\n  setDraggingItem: (item, sourceDay) =\u003e\r\n    set({ draggingItem: item, draggingSourceDay: sourceDay }),\r\n\r\n  setDropTarget: (dayId, position) =\u003e\r\n    set({ dropTargetDay: dayId, dropPosition: position }),\r\n\r\n  resetDrag: () =\u003e\r\n    set({\r\n      draggingItem: null,\r\n      draggingSourceDay: null,\r\n      dropTargetDay: null,\r\n      dropPosition: null,\r\n    }),\r\n}));\r\n```\r\n\r\n### 2단계: selector로 세밀한 구독\r\n\r\n각 컴포넌트가 **자신이 필요한 상태만** 구독하도록 합니다.\r\n\r\n```tsx\r\n// selectors\r\nconst selectDraggingItem = (state: DragStore) =\u003e state.draggingItem;\r\nconst selectDropTarget = (state: DragStore) =\u003e state.dropTargetDay;\r\nconst selectIsDragging = (state: DragStore) =\u003e state.draggingItem !== null;\r\nconst selectIsThisDayTarget = (dayId: string) =\u003e (state: DragStore) =\u003e\r\n  state.dropTargetDay === dayId;\r\n```\r\n\r\n### 3단계: DayColumn에 React.memo 적용\r\n\r\n```tsx\r\n// DayColumn.tsx\r\ninterface DayColumnProps {\r\n  dayId: string;\r\n  schedules: ScheduleItem[];\r\n}\r\n\r\nconst DayColumn = memo(({ dayId, schedules }: DayColumnProps) =\u003e {\r\n  // ✅ store에서 필요한 것만 구독\r\n  const isThisDayTarget = useDragStore(\r\n    useCallback((state) =\u003e state.dropTargetDay === dayId, [dayId])\r\n  );\r\n\r\n  const backgroundColor = isThisDayTarget ? '#E3F2FD' : '#FFFFFF';\r\n\r\n  return (\r\n    \u003cView style={[styles.dayColumn, { backgroundColor }]}\u003e\r\n      {schedules.map((schedule, index) =\u003e (\r\n        \u003cDraggablePlanCard\r\n          key={schedule.id}\r\n          item={schedule}\r\n          index={index}\r\n          dayId={dayId}\r\n        /\u003e\r\n      ))}\r\n    \u003c/View\u003e\r\n  );\r\n});\r\n\r\nexport default DayColumn;\r\n```\r\n\r\n**핵심:**\r\n- `TravelPlanKanban`에서 props로 `draggingItem`을 내려받지 않음\r\n- `DayColumn`이 직접 store를 구독 (필요한 것만!)\r\n- `draggingItem`이 바뀌어도 `DayColumn`의 props는 변하지 않음\r\n- `React.memo`가 리렌더링을 막을 수 있음\r\n\r\n### 4단계: DraggablePlanCard 개선\r\n\r\n```tsx\r\n// DraggablePlanCard.tsx\r\ninterface DraggablePlanCardProps {\r\n  item: ScheduleItem;\r\n  index: number;\r\n  dayId: string;\r\n}\r\n\r\nconst DraggablePlanCard = memo(({ item, index, dayId }: DraggablePlanCardProps) =\u003e {\r\n  // store에서 필요한 값 가져오기\r\n  const draggingItem = useDragStore((state) =\u003e state.draggingItem);\r\n  const draggingSourceDay = useDragStore((state) =\u003e state.draggingSourceDay);\r\n\r\n  // 자신이 드래깅 중인 아이템인지 판단\r\n  const isDragging = draggingItem?.id === item.id \u0026\u0026 draggingSourceDay === dayId;\r\n\r\n  // 상태 변경 (store 사용)\r\n  const onDragStart = useCallback(() =\u003e {\r\n    useDragStore.getState().setDraggingItem(item, dayId);\r\n  }, [item, dayId]);\r\n\r\n  const panResponder = useMemo(() =\u003e\r\n    PanResponder.create({\r\n      onPanResponderGrant: onDragStart,\r\n      onPanResponderMove: (evt, { dy }) =\u003e {\r\n        // dropTargetDay 업데이트\r\n        const targetDay = calculateDropTargetDay(evt.nativeEvent.pageY);\r\n        useDragStore.getState().setDropTarget(targetDay, Math.floor(dy / CARD_HEIGHT));\r\n      },\r\n      onPanResponderRelease: () =\u003e {\r\n        useDragStore.getState().resetDrag();\r\n      },\r\n    }),\r\n    []\r\n  );\r\n\r\n  const cardOpacity = useSharedValue(isDragging ? 0.3 : 1);\r\n\r\n  return (\r\n    \u003cAnimated.View\r\n      style={{ opacity: cardOpacity }}\r\n      {...panResponder.panHandlers}\r\n    \u003e\r\n      {/* 카드 내용 */}\r\n    \u003c/Animated.View\u003e\r\n  );\r\n});\r\n\r\nexport default DraggablePlanCard;\r\n```\r\n\r\n**변화:**\r\n- `onDragStart`, `onDragMove`, `onDragEnd` props 제거\r\n- store의 액션을 직접 호출 (props 없음!)\r\n- `draggingItem` props 제거, store에서 직접 구독\r\n- `React.memo`가 실제로 리렌더링을 방지\r\n\r\n---\r\n\r\n## props drilling의 악순환을 끊다\r\n\r\n개선 전:\r\n```\r\ndraggingItem 변경\r\n  ↓\r\nTravelPlanKanban 상태 업데이트, 리렌더링\r\n  ↓\r\n모든 자식에게 props 전달 (props 참조 변경)\r\n  ↓\r\nDayColumn props 변경 → memo 무시하고 리렌더링\r\n  ↓\r\nDraggablePlanCard props 변경 → memo 무시하고 리렌더링  ← 위험\r\n  ↓\r\n232개 컴포넌트 리렌더링, 46ms 소요\r\n```\r\n\r\n개선 후:\r\n```\r\ndraggingItem 변경 (store 업데이트)\r\n  ↓\r\ndraggingItem을 구독하는 컴포넌트만 리렌더링\r\n  ↓\r\nDayColumn: isThisDayTarget 구독 → 자신의 상태 일부만 변경\r\n           DayColumn props는 변하지 않음 → 자식은 리렌더링 안 됨\r\n  ↓\r\nDraggablePlanCard: isDragging 구독 → 자신의 opacity만 변경\r\n                   props 변경 없음 → memo 효과\r\n  ↓\r\n5-10개 컴포넌트만 리렌더링, 3-5ms 소요  ✅\r\n```\r\n\r\n---\r\n\r\n## 실제 측정 결과\r\n\r\n### 테스트 환경 (1,2편과 동일)\r\n- Day 컬럼: **4개**\r\n- 카드: **총 8개**\r\n- 테스트: 카드 1개를 드래그 + 자동 스크롤 1회\r\n\r\n### React DevTools Profiler 결과\r\n\r\n**개선 전 (2편 결과)**\r\n\r\n| 커밋 | Duration | 리렌더 컴포넌트 수 |\r\n|------|----------|-----------------|\r\n| 1 | 1.61ms | 2 |\r\n| 2 | 5.42ms | 23 |\r\n| 3 | 46.10ms | 232 |\r\n| 4~5 | 0.65~1.24ms | 2~4 |\r\n| 6 | 45.06ms | 211 |\r\n| 7 | 31.28ms | 209 |\r\n| 8 | 36.74ms | 212 |\r\n| **합계** | **8 커밋** | **최대 232개** |\r\n\r\n**개선 후 (Zustand + React.memo)**\r\n\r\n| 커밋 | Duration | 리렌더 컴포넌트 수 | 변화 |\r\n|------|----------|-----------------|------|\r\n| 1 | 1.54ms | 2 | — |\r\n| 2 | 5.68ms | 23 | — |\r\n| 3 | 4.92ms | 5 | ✅ 232 → 5 |\r\n| 4 | 6.34ms | 2 | ✅ (드래그 이동) |\r\n| 5 | 5.18ms | 2 | ✅ |\r\n| 6 | 6.87ms | 4 | ✅ |\r\n| 7 | 3.52ms | 2 | ✅ |\r\n| 8 | 2.11ms | 1 | ✅ |\r\n| **합계** | **8 커밋** | **최대 5개** | |\r\n\r\n### 분석\r\n\r\n| 항목 | 개선 전 | 개선 후 | 개선율 |\r\n|------|--------|---------|--------|\r\n| 최대 리렌더 컴포넌트 수 | **232개** | **5개** | **97.8% 감소** ✅ |\r\n| 총 duration | ~176ms | ~36ms | **79.5% 감소** ✅ |\r\n| 평균 커밋 duration | 21.01ms | 4.52ms | **78.5% 감소** ✅ |\r\n| 최대 duration | 46.10ms | 6.87ms | **85% 감소** ✅ |\r\n\r\n---\r\n\r\n## 왜 이렇게 효과가 클까?\r\n\r\n### 리렌더링의 \"폭발적 증가\"를 멈춤\r\n\r\n```\r\nprops drilling 문제:\r\n\r\n한 컴포넌트의 상태 변경\r\n  ↓\r\n부모가 리렌더링 (props 참조 변경)\r\n  ↓\r\n모든 자식이 리렌더링 (memo가 막지 못함)\r\n  ↓\r\n자식의 자식도 리렌더링 (트리 전체 확산)\r\n  ↓\r\n결과: 1번의 상태 변경 → 232개 컴포넌트 리렌더링\r\n\r\nZustand + selector의 해결:\r\n\r\n한 컴포넌트가 store 구독\r\n  ↓\r\n필요한 값만 변경되면 그 컴포넌트만 리렌더링\r\n  ↓\r\n자식은 props가 변하지 않음 → 리렌더링 안 됨\r\n  ↓\r\n결과: 1번의 상태 변경 → 1-5개 컴포넌트만 리렌더링\r\n```\r\n\r\n### React.memo의 진정한 가치\r\n\r\n`React.memo`는 props가 변하지 않으면 리렌더링을 방지합니다. 하지만 **props가 계속 변하면 효과가 없습니다.**\r\n\r\nprops drilling의 본질이 \"부모가 리렌더링되면 자식의 props도 참조가 변한다\"는 것이기 때문입니다.\r\n\r\n**Zustand로 props drilling을 해결해야** `React.memo`가 비로소 의미 있는 최적화가 됩니다.\r\n\r\n---\r\n\r\n## 성능 개선의 계층\r\n\r\n이제 3가지 개선을 모두 적용했습니다:\r\n\r\n| 우선순위 | 개선 | 효과 | 적용 시기 |\r\n|---------|------|------|----------|\r\n| 1순위 | `useNativeDriver: true` | 애니메이션 4개 커밋 제거 | 1~2개 props 수정 |\r\n| 2순위 | `useMemo` PanResponder | PanResponder 재생성 방지 | 클로저 패턴 학습 |\r\n| **3순위** | **Zustand + React.memo** | **232 → 5개 리렌더링** | **아키텍처 리팩토링** |\r\n\r\n**3순위의 효과가 가장 크지만, 비용도 가장 큽니다.**\r\n\r\n---\r\n\r\n## 패턴 정리: Zustand selector의 올바른 사용\r\n\r\n흔한 실수:\r\n\r\n```tsx\r\n// ❌ 잘못된 패턴: 전체 store를 구독 → 어떤 값이 바뀌든 리렌더링\r\nconst dragState = useDragStore();\r\nconst isDragging = dragState.draggingItem !== null;\r\n\r\n// ✅ 올바른 패턴: 필요한 값만 구독 → 그 값이 바뀔 때만 리렌더링\r\nconst isDragging = useDragStore((state) =\u003e state.draggingItem !== null);\r\n```\r\n\r\nZustand는 **선택적 구독(selective subscription)**을 지원합니다. selector 함수를 넘기면, **그 selector의 반환값이 변할 때만** 리렌더링을 트리거합니다.\r\n\r\n```tsx\r\n// 각 DayColumn이 \"자신이 드롭 타겟인지\"만 구독\r\nconst DayColumn = memo(({ dayId }) =\u003e {\r\n  const isTarget = useDragStore((state) =\u003e state.dropTargetDay === dayId);\r\n\r\n  // isTarget이 바뀔 때만 리렌더링\r\n  // 다른 날의 dropTargetDay가 변해도 이 컴포넌트는 영향 없음\r\n  return \u003cView style={{ backgroundColor: isTarget ? '#E3F2FD' : '#FFF' }} /\u003e;\r\n});\r\n```\r\n\r\n---\r\n\r\n## 배운 것\r\n\r\n### 1. 상태 관리의 \"거리\"가 중요하다\r\n\r\n상태를 관리하는 컴포넌트가 높을수록 (부모에 가까울수록), 그 상태가 바뀔 때 영향받는 자식의 수가 많아집니다.\r\n\r\n- `TravelPlanKanban`에서 관리 → 8개 컴포넌트 모두 props 받음 → 모두 리렌더링\r\n- 각 컴포넌트가 store에서 구독 → 자신의 상태만 업데이트 → 자식은 영향 없음\r\n\r\n**상태를 필요한 곳에 가깝게 배치할수록 영향 범위가 줄어듭니다.**\r\n\r\n### 2. props drilling은 단순한 \"귀찮음\"이 아니다\r\n\r\nprops drilling이 불편하다고 생각했다면, 실제 문제는 **성능입니다.**\r\n\r\n- 불필요한 props 전달 → 컴포넌트 재사용성 감소\r\n- 부모 상태 변경 → 모든 자식 리렌더링 → 성능 악화\r\n- 디버깅 어려움 → props 체인을 따라가야 함\r\n\r\nZustand, Context, Recoil 같은 도구는 \"편의\"를 넘어 **성능과 아키텍처를 해결**합니다.\r\n\r\n\r\n---\r\n\r\n## 남은 것\r\n\r\n이제 드래그 중 리렌더링은 3-5ms 수준으로 떨어졌습니다. 하지만 여전히 최초 로드와 스크롤 성능이 개선될 여지가 있습니다.\r\n\r\n다음 글(4편)에서는:\r\n- 스크롤 성능 측정 및 FlatList 최적화\r\n- 초기 렌더링 성능 (232개 카드를 한 번에 렌더링하는 비용)\r\n- 메모리 사용량 추적\r\n\r\n---\r\n\r\n## 참고 자료\r\n\r\n- [Zustand](https://github.com/pmndrs/zustand)\r\n- [Zustand shallow 유틸리티](https://docs.pmnd.rs/zustand/api/shallow)\r\n- [React.memo](https://react.dev/reference/react/memo)\r\n- [Props drilling 해결 패턴](https://stackoverflow.com/questions/15953473/what-is-the-root-cause-of-prop-drilling)\r\n"}]},"__N_SSG":true},"page":"/posts/tag/[tag]","query":{"tag":"selector"},"buildId":"ZZIvuqctppkj_caIDL9HZ","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
