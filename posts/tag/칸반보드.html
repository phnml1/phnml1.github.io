igin=""></script><script src="/_next/static/sHwiCpr0I6yryhs4L_oOJ/_buildManifest.js" defer="" crossorigin=""></script><script src="/_next/static/sHwiCpr0I6yryhs4L_oOJ/_ssgManifest.js" defer="" crossorigin=""></script></head><body><div id="__next"><script>!function(){try{var d=document.documentElement,c=d.classList;c.remove('light','dark');var e=localStorage.getItem('theme');if('system'===e||(!e&&true)){var t='(prefers-color-scheme: dark)',m=window.matchMedia(t);if(m.media!==t||m.matches){d.style.colorScheme = 'dark';c.add('dark')}else{d.style.colorScheme = 'light';c.add('light')}}else if(e){c.add(e|| '')}if(e==='light'||e==='dark')d.style.colorScheme=e}catch(e){}}()</script></div><script id="__NEXT_DATA__" type="application/json" crossorigin="">{"props":{"pageProps":{"tags":["react native","드래그 앤 드롭","성능 최적화","Zustand","React.memo","selector","칸반보드","props drilling","PanResponder","useMemo","useRef","useNativeDriver","리렌더링","자동 스크롤","requestAnimationFrame","Portal","Context API","Animated","hooks","트러블슈팅","google map","expo-location","졸업작품","react","JavaScript","deepdive","useState","hook","next.js","SSR","Suspense","렌더링","테스트","dev tools","SSG","Algorithm","프로그래머스","PCCP","lv2","이분탐색","클로저","생명주기","Virtual DOM","백준","gold","dfs","lv3","bfs"],"currentTag":"칸반보드","posts":[{"slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 성능 최적화 (3) - Zustand Store와 React.memo로 리렌더링 최소화","title":"React Native 칸반보드 드래그 앤 드롭 성능 최적화 (3) - Zustand Store와 React.memo로 리렌더링 최소화","date":"2026-03-22T12:00:00.000Z","image":"index.png","summary":"2편의 개선에도 불구하고 남아있는 30-46ms짜리 큰 리렌더링의 원인은 props drilling이었습니다. Zustand store로 draggingItem 상태를 분리하고, React.memo와 세밀한 selector로 전체 트리 리렌더링을 차단합니다.","tags":["react native","드래그 앤 드롭","성능 최적화","Zustand","React.memo","selector","칸반보드","props drilling"],"content":"\r\n# React Native 칸반보드 드래그 앤 드롭 성능 최적화 (3) - Zustand Store와 React.memo로 리렌더링 최소화\r\n\r\n\u003e 이 시리즈는 React Native에서 직접 구현한 칸반보드 드래그 앤 드롭의 성능을 측정하고 개선하는 과정을 다룹니다.\r\n\u003e\r\n\u003e [2편: PanResponder 안정화와 Native 애니메이션](/blog/react-native-kanban-drag-drop-performance-2)에서 커밋 수는 12회 → 8회로 줄었지만, **30-46ms짜리 큰 리렌더링은 여전히 남아** 있었습니다.\r\n\r\n---\r\n\r\n## 2편의 성과와 한계\r\n\r\n지난 글에서 적용한 개선들:\r\n1. `PanResponder`를 `useMemo`로 안정화\r\n2. `useNativeDriver: true`로 애니메이션을 Native 스레드로 전환\r\n\r\n결과:\r\n- 애니메이션 커밋 4개가 프로파일러에서 사라짐\r\n- 커밋 수: 12회 → 8회\r\n- **하지만 최대 duration과 리렌더 컴포넌트 수는 그대로** (30-46ms, 200개 이상)\r\n\r\n---\r\n\r\n## 큰 리렌더링의 원인: props drilling\r\n\r\nReact DevTools Profiler를 다시 살펴보면, 큰 커밋들(30-46ms)의 **Updater**가 모두 다른 컴포넌트입니다.\r\n\r\n```\r\n커밋 3  | 46.10ms | Updater: DraggablePlanCard, TravelPlanKanban, FloatingPortalProvider\r\n커밋 6  | 45.06ms | Updater: TravelPlanKanban\r\n커밋 7  | 31.28ms | Updater: DraggablePlanCard × 4, TravelPlanKanban\r\n```\r\n\r\n문제를 추적하면:\r\n\r\n```tsx\r\n// TravelPlanKanban.tsx (최상위 상태 관리 컴포넌트)\r\nconst [draggingItem, setDraggingItem] = useState(null);  // 🔴 여기서 관리\r\nconst [dayData, setDayData] = useState(...);\r\n\r\nreturn (\r\n  \u003cView\u003e\r\n    {/* 상태가 바뀔 때마다 모든 자식이 리렌더링 */}\r\n    \u003cDayColumn dayId=\"day1\" draggingItem={draggingItem} ...props /\u003e\r\n    \u003cDayColumn dayId=\"day2\" draggingItem={draggingItem} ...props /\u003e\r\n    \u003cDayColumn dayId=\"day3\" draggingItem={draggingItem} ...props /\u003e\r\n    \u003cDayColumn dayId=\"day4\" draggingItem={draggingItem} ...props /\u003e\r\n  \u003c/View\u003e\r\n);\r\n```\r\n\r\n드래그 중 `draggingItem`이 바뀔 때마다:\r\n1. `TravelPlanKanban`이 리렌더링\r\n2. 모든 `DayColumn`, `DraggablePlanCard` (자식 전체) 리렌더링\r\n3. 각 리렌더링마다 232개 컴포넌트가 다시 그려짐\r\n\r\n```\r\ndraggingItem 변경 (드래그 이동 1회)\r\n    ↓\r\nTravelPlanKanban 상태 업데이트\r\n    ↓\r\n모든 자식 트리 리렌더링  ← 😱 DayColumn × 4, DraggablePlanCard × 8, 그 이하 모든 자식들\r\n    ↓\r\n46ms 커밋 기록\r\n    ↓\r\n다음 드래그 이동 이벤트\r\n```\r\n\r\n---\r\n\r\n## 해결책: Zustand store로 상태 분리\r\n\r\n핵심은 **상태가 필요한 컴포넌트만 구독하고, 나머지는 리렌더링하지 않는 것**입니다.\r\n\r\n### 1단계: Zustand store 설계\r\n\r\n```tsx\r\n// stores/useDragStore.ts\r\nimport { create } from 'zustand';\r\n\r\ninterface DragStore {\r\n  // 드래그 상태\r\n  draggingItem: ScheduleItem | null;\r\n  draggingSourceDay: string | null;\r\n\r\n  // 드래그 위치 추적 (빠르게 변하는 값)\r\n  dropTargetDay: string | null;\r\n  dropPosition: number | null;\r\n\r\n  // 액션\r\n  setDraggingItem: (item: ScheduleItem | null, sourceDay: string | null) =\u003e void;\r\n  setDropTarget: (dayId: string | null, position: number | null) =\u003e void;\r\n  resetDrag: () =\u003e void;\r\n}\r\n\r\nexport const useDragStore = create\u003cDragStore\u003e((set) =\u003e ({\r\n  draggingItem: null,\r\n  draggingSourceDay: null,\r\n  dropTargetDay: null,\r\n  dropPosition: null,\r\n\r\n  setDraggingItem: (item, sourceDay) =\u003e\r\n    set({ draggingItem: item, draggingSourceDay: sourceDay }),\r\n\r\n  setDropTarget: (dayId, position) =\u003e\r\n    set({ dropTargetDay: dayId, dropPosition: position }),\r\n\r\n  resetDrag: () =\u003e\r\n    set({\r\n      draggingItem: null,\r\n      draggingSourceDay: null,\r\n      dropTargetDay: null,\r\n      dropPosition: null,\r\n    }),\r\n}));\r\n```\r\n\r\n### 2단계: selector로 세밀한 구독\r\n\r\n각 컴포넌트가 **자신이 필요한 상태만** 구독하도록 합니다.\r\n\r\n```tsx\r\n// selectors\r\nconst selectDraggingItem = (state: DragStore) =\u003e state.draggingItem;\r\nconst selectDropTarget = (state: DragStore) =\u003e state.dropTargetDay;\r\nconst selectIsDragging = (state: DragStore) =\u003e state.draggingItem !== null;\r\nconst selectIsThisDayTarget = (dayId: string) =\u003e (state: DragStore) =\u003e\r\n  state.dropTargetDay === dayId;\r\n```\r\n\r\n### 3단계: DayColumn에 React.memo 적용\r\n\r\n```tsx\r\n// DayColumn.tsx\r\ninterface DayColumnProps {\r\n  dayId: string;\r\n  schedules: ScheduleItem[];\r\n}\r\n\r\nconst DayColumn = memo(({ dayId, schedules }: DayColumnProps) =\u003e {\r\n  // ✅ store에서 필요한 것만 구독\r\n  const isThisDayTarget = useDragStore(\r\n    useCallback((state) =\u003e state.dropTargetDay === dayId, [dayId])\r\n  );\r\n\r\n  const backgroundColor = isThisDayTarget ? '#E3F2FD' : '#FFFFFF';\r\n\r\n  return (\r\n    \u003cView style={[styles.dayColumn, { backgroundColor }]}\u003e\r\n      {schedules.map((schedule, index) =\u003e (\r\n        \u003cDraggablePlanCard\r\n          key={schedule.id}\r\n          item={schedule}\r\n          index={index}\r\n          dayId={dayId}\r\n        /\u003e\r\n      ))}\r\n    \u003c/View\u003e\r\n  );\r\n});\r\n\r\nexport default DayColumn;\r\n```\r\n\r\n**핵심:**\r\n- `TravelPlanKanban`에서 props로 `draggingItem`을 내려받지 않음\r\n- `DayColumn`이 직접 store를 구독 (필요한 것만!)\r\n- `draggingItem`이 바뀌어도 `DayColumn`의 props는 변하지 않음\r\n- `React.memo`가 리렌더링을 막을 수 있음\r\n\r\n### 4단계: DraggablePlanCard 개선\r\n\r\n```tsx\r\n// DraggablePlanCard.tsx\r\ninterface DraggablePlanCardProps {\r\n  item: ScheduleItem;\r\n  index: number;\r\n  dayId: string;\r\n}\r\n\r\nconst DraggablePlanCard = memo(({ item, index, dayId }: DraggablePlanCardProps) =\u003e {\r\n  // store에서 필요한 값 가져오기\r\n  const draggingItem = useDragStore((state) =\u003e state.draggingItem);\r\n  const draggingSourceDay = useDragStore((state) =\u003e state.draggingSourceDay);\r\n\r\n  // 자신이 드래깅 중인 아이템인지 판단\r\n  const isDragging = draggingItem?.id === item.id \u0026\u0026 draggingSourceDay === dayId;\r\n\r\n  // 상태 변경 (store 사용)\r\n  const onDragStart = useCallback(() =\u003e {\r\n    useDragStore.getState().setDraggingItem(item, dayId);\r\n  }, [item, dayId]);\r\n\r\n  const panResponder = useMemo(() =\u003e\r\n    PanResponder.create({\r\n      onPanResponderGrant: onDragStart,\r\n      onPanResponderMove: (evt, { dy }) =\u003e {\r\n        // dropTargetDay 업데이트\r\n        const targetDay = calculateDropTargetDay(evt.nativeEvent.pageY);\r\n        useDragStore.getState().setDropTarget(targetDay, Math.floor(dy / CARD_HEIGHT));\r\n      },\r\n      onPanResponderRelease: () =\u003e {\r\n        useDragStore.getState().resetDrag();\r\n      },\r\n    }),\r\n    []\r\n  );\r\n\r\n  const cardOpacity = useSharedValue(isDragging ? 0.3 : 1);\r\n\r\n  return (\r\n    \u003cAnimated.View\r\n      style={{ opacity: cardOpacity }}\r\n      {...panResponder.panHandlers}\r\n    \u003e\r\n      {/* 카드 내용 */}\r\n    \u003c/Animated.View\u003e\r\n  );\r\n});\r\n\r\nexport default DraggablePlanCard;\r\n```\r\n\r\n**변화:**\r\n- `onDragStart`, `onDragMove`, `onDragEnd` props 제거\r\n- store의 액션을 직접 호출 (props 없음!)\r\n- `draggingItem` props 제거, store에서 직접 구독\r\n- `React.memo`가 실제로 리렌더링을 방지\r\n\r\n---\r\n\r\n## props drilling의 악순환을 끊다\r\n\r\n개선 전:\r\n```\r\ndraggingItem 변경\r\n  ↓\r\nTravelPlanKanban 상태 업데이트, 리렌더링\r\n  ↓\r\n모든 자식에게 props 전달 (props 참조 변경)\r\n  ↓\r\nDayColumn props 변경 → memo 무시하고 리렌더링\r\n  ↓\r\nDraggablePlanCard props 변경 → memo 무시하고 리렌더링  ← 위험\r\n  ↓\r\n232개 컴포넌트 리렌더링, 46ms 소요\r\n```\r\n\r\n개선 후:\r\n```\r\ndraggingItem 변경 (store 업데이트)\r\n  ↓\r\ndraggingItem을 구독하는 컴포넌트만 리렌더링\r\n  ↓\r\nDayColumn: isThisDayTarget 구독 → 자신의 상태 일부만 변경\r\n           DayColumn props는 변하지 않음 → 자식은 리렌더링 안 됨\r\n  ↓\r\nDraggablePlanCard: isDragging 구독 → 자신의 opacity만 변경\r\n                   props 변경 없음 → memo 효과\r\n  ↓\r\n5-10개 컴포넌트만 리렌더링, 3-5ms 소요  ✅\r\n```\r\n\r\n---\r\n\r\n## 실제 측정 결과\r\n\r\n### 테스트 환경 (1,2편과 동일)\r\n- Day 컬럼: **4개**\r\n- 카드: **총 8개**\r\n- 테스트: 카드 1개를 드래그 + 자동 스크롤 1회\r\n\r\n### React DevTools Profiler 결과\r\n\r\n**개선 전 (2편 결과)**\r\n\r\n| 커밋 | Duration | 리렌더 컴포넌트 수 |\r\n|------|----------|-----------------|\r\n| 1 | 1.61ms | 2 |\r\n| 2 | 5.42ms | 23 |\r\n| 3 | 46.10ms | 232 |\r\n| 4~5 | 0.65~1.24ms | 2~4 |\r\n| 6 | 45.06ms | 211 |\r\n| 7 | 31.28ms | 209 |\r\n| 8 | 36.74ms | 212 |\r\n| **합계** | **8 커밋** | **최대 232개** |\r\n\r\n**개선 후 (Zustand + React.memo)**\r\n\r\n| 커밋 | Duration | 리렌더 컴포넌트 수 | 변화 |\r\n|------|----------|-----------------|------|\r\n| 1 | 1.54ms | 2 | — |\r\n| 2 | 5.68ms | 23 | — |\r\n| 3 | 4.92ms | 5 | ✅ 232 → 5 |\r\n| 4 | 6.34ms | 2 | ✅ (드래그 이동) |\r\n| 5 | 5.18ms | 2 | ✅ |\r\n| 6 | 6.87ms | 4 | ✅ |\r\n| 7 | 3.52ms | 2 | ✅ |\r\n| 8 | 2.11ms | 1 | ✅ |\r\n| **합계** | **8 커밋** | **최대 5개** | |\r\n\r\n### 분석\r\n\r\n| 항목 | 개선 전 | 개선 후 | 개선율 |\r\n|------|--------|---------|--------|\r\n| 최대 리렌더 컴포넌트 수 | **232개** | **5개** | **97.8% 감소** ✅ |\r\n| 총 duration | ~176ms | ~36ms | **79.5% 감소** ✅ |\r\n| 평균 커밋 duration | 21.01ms | 4.52ms | **78.5% 감소** ✅ |\r\n| 최대 duration | 46.10ms | 6.87ms | **85% 감소** ✅ |\r\n\r\n---\r\n\r\n## 왜 이렇게 효과가 클까?\r\n\r\n### 리렌더링의 \"폭발적 증가\"를 멈춤\r\n\r\n```\r\nprops drilling 문제:\r\n\r\n한 컴포넌트의 상태 변경\r\n  ↓\r\n부모가 리렌더링 (props 참조 변경)\r\n  ↓\r\n모든 자식이 리렌더링 (memo가 막지 못함)\r\n  ↓\r\n자식의 자식도 리렌더링 (트리 전체 확산)\r\n  ↓\r\n결과: 1번의 상태 변경 → 232개 컴포넌트 리렌더링\r\n\r\nZustand + selector의 해결:\r\n\r\n한 컴포넌트가 store 구독\r\n  ↓\r\n필요한 값만 변경되면 그 컴포넌트만 리렌더링\r\n  ↓\r\n자식은 props가 변하지 않음 → 리렌더링 안 됨\r\n  ↓\r\n결과: 1번의 상태 변경 → 1-5개 컴포넌트만 리렌더링\r\n```\r\n\r\n### React.memo의 진정한 가치\r\n\r\n`React.memo`는 props가 변하지 않으면 리렌더링을 방지합니다. 하지만 **props가 계속 변하면 효과가 없습니다.**\r\n\r\nprops drilling의 본질이 \"부모가 리렌더링되면 자식의 props도 참조가 변한다\"는 것이기 때문입니다.\r\n\r\n**Zustand로 props drilling을 해결해야** `React.memo`가 비로소 의미 있는 최적화가 됩니다.\r\n\r\n---\r\n\r\n## 성능 개선의 계층\r\n\r\n이제 3가지 개선을 모두 적용했습니다:\r\n\r\n| 우선순위 | 개선 | 효과 | 적용 시기 |\r\n|---------|------|------|----------|\r\n| 1순위 | `useNativeDriver: true` | 애니메이션 4개 커밋 제거 | 1~2개 props 수정 |\r\n| 2순위 | `useMemo` PanResponder | PanResponder 재생성 방지 | 클로저 패턴 학습 |\r\n| **3순위** | **Zustand + React.memo** | **232 → 5개 리렌더링** | **아키텍처 리팩토링** |\r\n\r\n**3순위의 효과가 가장 크지만, 비용도 가장 큽니다.**\r\n\r\n---\r\n\r\n## 패턴 정리: Zustand selector의 올바른 사용\r\n\r\n흔한 실수:\r\n\r\n```tsx\r\n// ❌ 잘못된 패턴: 전체 store를 구독 → 어떤 값이 바뀌든 리렌더링\r\nconst dragState = useDragStore();\r\nconst isDragging = dragState.draggingItem !== null;\r\n\r\n// ✅ 올바른 패턴: 필요한 값만 구독 → 그 값이 바뀔 때만 리렌더링\r\nconst isDragging = useDragStore((state) =\u003e state.draggingItem !== null);\r\n```\r\n\r\nZustand는 **선택적 구독(selective subscription)**을 지원합니다. selector 함수를 넘기면, **그 selector의 반환값이 변할 때만** 리렌더링을 트리거합니다.\r\n\r\n```tsx\r\n// 각 DayColumn이 \"자신이 드롭 타겟인지\"만 구독\r\nconst DayColumn = memo(({ dayId }) =\u003e {\r\n  const isTarget = useDragStore((state) =\u003e state.dropTargetDay === dayId);\r\n\r\n  // isTarget이 바뀔 때만 리렌더링\r\n  // 다른 날의 dropTargetDay가 변해도 이 컴포넌트는 영향 없음\r\n  return \u003cView style={{ backgroundColor: isTarget ? '#E3F2FD' : '#FFF' }} /\u003e;\r\n});\r\n```\r\n\r\n---\r\n\r\n## 배운 것\r\n\r\n### 1. 상태 관리의 \"거리\"가 중요하다\r\n\r\n상태를 관리하는 컴포넌트가 높을수록 (부모에 가까울수록), 그 상태가 바뀔 때 영향받는 자식의 수가 많아집니다.\r\n\r\n- `TravelPlanKanban`에서 관리 → 8개 컴포넌트 모두 props 받음 → 모두 리렌더링\r\n- 각 컴포넌트가 store에서 구독 → 자신의 상태만 업데이트 → 자식은 영향 없음\r\n\r\n**상태를 필요한 곳에 가깝게 배치할수록 영향 범위가 줄어듭니다.**\r\n\r\n### 2. props drilling은 단순한 \"귀찮음\"이 아니다\r\n\r\nprops drilling이 불편하다고 생각했다면, 실제 문제는 **성능입니다.**\r\n\r\n- 불필요한 props 전달 → 컴포넌트 재사용성 감소\r\n- 부모 상태 변경 → 모든 자식 리렌더링 → 성능 악화\r\n- 디버깅 어려움 → props 체인을 따라가야 함\r\n\r\nZustand, Context, Recoil 같은 도구는 \"편의\"를 넘어 **성능과 아키텍처를 해결**합니다.\r\n\r\n\r\n---\r\n\r\n## 남은 것\r\n\r\n이제 드래그 중 리렌더링은 3-5ms 수준으로 떨어졌습니다. 하지만 여전히 최초 로드와 스크롤 성능이 개선될 여지가 있습니다.\r\n\r\n다음 글(4편)에서는:\r\n- 스크롤 성능 측정 및 FlatList 최적화\r\n- 초기 렌더링 성능 (232개 카드를 한 번에 렌더링하는 비용)\r\n- 메모리 사용량 추적\r\n\r\n---\r\n\r\n## 참고 자료\r\n\r\n- [Zustand](https://github.com/pmndrs/zustand)\r\n- [Zustand shallow 유틸리티](https://docs.pmnd.rs/zustand/api/shallow)\r\n- [React.memo](https://react.dev/reference/react/memo)\r\n- [Props drilling 해결 패턴](https://stackoverflow.com/questions/15953473/what-is-the-root-cause-of-prop-drilling)\r\n"},{"slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 성능 최적화 (2) - PanResponder 안정화와 Native 애니메이션","title":"React Native 칸반보드 드래그 앤 드롭 성능 최적화 (2) - PanResponder 안정화와 Native 애니메이션","date":"2026-03-08T22:00:00.000Z","image":"index.png","summary":"1편에서 측정한 문제들 중 즉각적인 효과가 있는 것부터 개선합니다. PanResponder를 useMemo로 안정화하고, 애니메이션을 Native 스레드로 전환합니다. 그리고 실제 측정 결과를 봅니다.","tags":["react native","드래그 앤 드롭","성능 최적화","PanResponder","useMemo","useRef","useNativeDriver","칸반보드"],"content":"\r\n\r\n# React Native 칸반보드 드래그 앤 드롭 성능 최적화 (2) - PanResponder 안정화와 Native 애니메이션\r\n\r\n\u003e 이 시리즈는 React Native에서 직접 구현한 칸반보드 드래그 앤 드롭의 성능을 측정하고 개선하는 과정을 다룹니다.\r\n\u003e\r\n\u003e [1편: 문제 인식과 측정](/blog/react-native-kanban-drag-drop-performance-1)에서 드래그 1회에 **총 12번의 커밋, 최대 44.93ms, 최대 232개 컴포넌트 리렌더링**이 발생한다는 것을 확인했습니다.\r\n\r\n---\r\n\r\n## 개선 우선순위 복습\r\n\r\n1편에서 세운 계획입니다.\r\n\r\n### 1순위: 즉시 효과가 있는 것\r\n1. `useNativeDriver: true` 전환 — 애니메이션을 Native 스레드로\r\n2. `PanResponder` useMemo 적용 — 불필요한 객체 생성 방지\r\n\r\n### 2순위: 구조적 개선\r\n3. Zustand store로 props drilling 해결 — 중간 컴포넌트 리렌더링 방지\r\n4. `React.memo` 적용 — 불필요한 리렌더링 차단\r\n\r\n이번 글에서는 **1순위** 개선을 적용하고 결과를 측정합니다.\r\n\r\n---\r\n\r\n## 문제 1: PanResponder가 매 렌더링마다 재생성\r\n\r\n### 먼저, PanResponder가 뭔가요?\r\n\r\n`PanResponder`는 손가락의 터치 이벤트(시작, 이동, 끝)를 감지하는 React Native의 API입니다. 드래그 앤 드롭은 `PanResponder`를 통해 \"지금 어디를 누르고 있는지\", \"얼마나 움직였는지\"를 계속 추적합니다.\r\n\r\n### 개선 전 코드\r\n\r\n```tsx\r\n// DraggablePlanCard.tsx - 개선 전\r\nconst DraggablePlanCard = ({ item, index, dayId, onDragStart, onDragMove, onDragEnd }) =\u003e {\r\n\r\n  const panResponder = PanResponder.create({  // 🔴 렌더링마다 새 객체 생성\r\n    onStartShouldSetPanResponder: () =\u003e isPanEnabled,\r\n    onPanResponderGrant: (evt) =\u003e {\r\n      onDragStart(item, dayId, index, ...);\r\n    },\r\n    onPanResponderMove: (evt, gestureState) =\u003e {\r\n      onDragMove(...);\r\n    },\r\n    onPanResponderRelease: (evt) =\u003e {\r\n      onDragEnd(evt.nativeEvent.pageY);\r\n    },\r\n  });\r\n\r\n  return \u003cAnimated.View {...panResponder.panHandlers} /\u003e;\r\n};\r\n```\r\n\r\n`PanResponder.create()`가 컴포넌트 **함수 본문 안**에 그냥 놓여 있습니다. React 컴포넌트는 상태가 바뀔 때마다 함수 전체를 다시 실행하기 때문에, 이 코드는 **리렌더링이 일어날 때마다 PanResponder를 새로 만들고 버립니다.** 드래그 중에 리렌더링이 발생하면 드래그 핸들러도 함께 새로 교체되는 셈입니다.\r\n\r\n### 그냥 useMemo로 감싸면 안 되나?\r\n\r\n`useMemo`로 감싸면 PanResponder를 한 번만 만들 수 있습니다. 그런데 새로운 문제가 생깁니다.\r\n\r\n**클로저 문제**입니다. `onPanResponderGrant` 안에서 `item`, `dayId`, `onDragStart` 같은 값들을 사용합니다. 이 값들은 부모에서 props로 내려오는데, `useMemo`로 감싸는 순간 **\"최초에 PanResponder를 만들 때의 값\"이 그대로 고정**됩니다.\r\n\r\n부모에서 `item`이 바뀌어도 PanResponder 내부는 여전히 처음 `item`을 바라보고 있는 것입니다.\r\n\r\n```\r\nuseMemo 의존성 배열에 [item, dayId, onDragStart] 추가\r\n  → props가 바뀔 때마다 PanResponder 재생성  🔴 (처음과 같은 문제)\r\n\r\nuseMemo 의존성 배열을 [] (빈 배열)로\r\n  → PanResponder는 한 번만 생성되지만 내부 값이 고정됨  🔴 (오래된 값 참조)\r\n```\r\n\r\n결국 **재생성 비용을 없애려면 값이 고정되고, 값을 최신으로 유지하려면 재생성 비용이 발생하는 딜레마**입니다.\r\n\r\n### 해결책: callbacksRef 패턴\r\n\r\n이 딜레마를 끊는 방법이 `useRef`입니다.\r\n\r\n`useRef`는 렌더링과 무관하게 **항상 동일한 객체**를 반환합니다. 그리고 그 안의 `.current` 값은 언제든지 바꿀 수 있습니다. 이 특성을 활용합니다.\r\n\r\n```tsx\r\n// DraggablePlanCard.tsx - 개선 후\r\nconst DraggablePlanCard = memo(({ item, index, dayId, onDragStart, onDragMove, onDragEnd }) =\u003e {\r\n\r\n  // ✅ ref는 렌더링마다 같은 객체. .current 값만 교체\r\n  const callbacksRef = useRef({ onDragStart, onDragMove, onDragEnd });\r\n  const propsRef = useRef({ item, dayId, index });\r\n  const isPanEnabledRef = useRef(isPanEnabled);\r\n\r\n  // 렌더링마다 최신 값으로 덮어씀 (.current 교체, ref 객체 자체는 그대로)\r\n  callbacksRef.current = { onDragStart, onDragMove, onDragEnd };\r\n  propsRef.current = { item, dayId, index };\r\n  isPanEnabledRef.current = isPanEnabled;\r\n\r\n  // ✅ useMemo로 PanResponder 한 번만 생성\r\n  const panResponder = useMemo(() =\u003e PanResponder.create({\r\n    onStartShouldSetPanResponder: () =\u003e isPanEnabledRef.current,  // ✅ ref 통해 최신 값\r\n    onMoveShouldSetPanResponder: () =\u003e isPanEnabledRef.current,\r\n\r\n    onPanResponderGrant: (evt) =\u003e {\r\n      const { item, dayId, index } = propsRef.current;           // ✅ 항상 최신 값\r\n      callbacksRef.current.onDragStart(item, dayId, index, ...);\r\n    },\r\n    onPanResponderMove: (evt, gestureState) =\u003e {\r\n      callbacksRef.current.onDragMove(...);                       // ✅ 항상 최신 콜백\r\n    },\r\n    onPanResponderRelease: (evt) =\u003e {\r\n      callbacksRef.current.onDragEnd(evt.nativeEvent.pageY);\r\n    },\r\n    onPanResponderTerminate: () =\u003e { ... },\r\n  }), [cardOpacity]);  // 사실상 마운트 시 1회만 생성\r\n\r\n  ...\r\n});\r\n```\r\n\r\n### 왜 이 패턴이 동작하는가\r\n\r\n핵심은 **ref 객체와 .current 값을 분리해서 생각**하는 것입니다.\r\n\r\n```\r\n렌더링 발생 (props 변경)\r\n    │\r\n    ├─ callbacksRef        →  동일한 객체  (useMemo가 참조하는 것)\r\n    │    └─ .current       →  최신 콜백으로 교체  ✅\r\n    │\r\n    ├─ propsRef            →  동일한 객체\r\n    │    └─ .current       →  최신 item, dayId, index로 교체  ✅\r\n    │\r\n    └─ panResponder        →  재생성 없음  (useMemo가 바라보는 ref 객체는 안 바뀜)\r\n\r\n터치 이벤트 발생\r\n    │\r\n    └─ propsRef.current.item              →  최신 item  ✅\r\n       callbacksRef.current.onDragStart   →  최신 콜백  ✅\r\n```\r\n\r\nPanResponder 내부의 핸들러는 **ref 객체**를 클로저로 캡처합니다. ref 객체 자체는 바뀌지 않으므로 `useMemo`는 재생성하지 않고, `.current`는 렌더링마다 최신 값으로 갱신되므로 터치 이벤트 시 항상 올바른 값을 읽습니다.\r\n\r\nref는 렌더링 사이클과 무관하게 항상 최신 값을 담고 있습니다. PanResponder는 한 번 생성된 후, 핸들러 내부에서 ref를 통해 최신 값을 읽어오기 때문에 의존성 배열 문제가 사라집니다.\r\n\r\n---\r\n\r\n## 문제 2: useNativeDriver: false로 인한 JS 스레드 애니메이션\r\n\r\n### 개선 전 코드\r\n\r\n```tsx\r\n// 개선 전 — 여러 곳에 useNativeDriver: false\r\nAnimated.timing(floatingOpacity, {\r\n  toValue: 0.9,\r\n  duration: 150,\r\n  useNativeDriver: false,  // 🔴 JS 스레드에서 실행\r\n}).start();\r\n```\r\n\r\n`useNativeDriver: false`일 때 애니메이션 계산은 **JavaScript 스레드**에서 실행됩니다.\r\n\r\n```\r\n드래그 중 JS 스레드\r\n┌──────────────────────────────────────────────────┐\r\n│  드래그 위치 계산                                  │\r\n│  드롭 타겟 감지                                   │\r\n│  상태 업데이트 → 리렌더링                          │\r\n│  애니메이션 프레임 계산  ← 이것도 JS 스레드에서!   │  ← 병목\r\n└──────────────────────────────────────────────────┘\r\n```\r\n\r\n드래그 중에 JS 스레드가 바쁘면 애니메이션도 버벅입니다.\r\n\r\n### 왜 false를 쓰고 있었나\r\n\r\n`useNativeDriver: true`는 `transform`, `opacity`처럼 레이아웃에 영향을 주지 않는 속성만 지원합니다. `width`, `height`, `backgroundColor` 같은 속성은 지원하지 않아서, 이런 속성을 쓸 때는 어쩔 수 없이 `false`를 씁니다.\r\n\r\n기존 코드를 추적해보니, 실제로는 `opacity`와 `transform`만 사용하고 있었습니다. **`false`를 쓸 이유가 없었던 것입니다.**\r\n\r\n### 개선 후 코드\r\n\r\n```tsx\r\n// DraggablePlanCard.tsx — 드래그 시작 시 카드 투명하게\r\nAnimated.timing(cardOpacity, {\r\n  toValue: 0.3,\r\n  duration: 150,\r\n  useNativeDriver: true,  // ✅ opacity → Native 스레드\r\n}).start();\r\n\r\n// FloatingPortal.tsx — 따라다니는 플로팅 카드\r\n\u003cAnimated.View\r\n  style={{\r\n    opacity: floatingOpacity,           // ✅\r\n    transform: [\r\n      { translateX: floatingPan.x },   // ✅\r\n      { translateY: floatingPan.y },   // ✅\r\n    ],\r\n  }}\r\n/\u003e\r\n```\r\n\r\n`opacity`와 `transform`은 `useNativeDriver: true`가 지원되므로 모두 Native 스레드로 전환했습니다.\r\n\r\n---\r\n\r\n## 두 가지 개선의 관계\r\n\r\n사실 이 두 문제는 서로 얽혀 있습니다.\r\n\r\n```\r\nuseMemo로 PanResponder 안정화\r\n        │\r\n        ├─ 클로저 문제 발생\r\n        │       └─ callbacksRef / isPanEnabledRef 패턴으로 해결\r\n        │\r\n        └─ PanResponder 재생성 없음\r\n                └─ useNativeDriver를 true로 바꿔도\r\n                   \"매 렌더마다 driver 옵션이 바뀐다\"는 경고 사라짐  ✅\r\n```\r\n\r\n두 가지를 같이 적용해야 온전히 동작합니다.\r\n\r\n---\r\n\r\n## 실제 측정 결과\r\n\r\n### 테스트 환경 (1편과 동일)\r\n- Day 컬럼: **4개** (Day1 ~ Day4)\r\n- 카드: **총 8개**\r\n- 테스트: 카드 1개를 드래그 + 자동 스크롤 1회\r\n\r\n### React DevTools Profiler 결과\r\n\r\n**개선 전 (`성능개선전.json`)**\r\n\r\n| 커밋 | Duration | 리렌더 컴포넌트 수 | Updater |\r\n|------|----------|-----------------|---------|\r\n| 1 | 1.36ms | 2 | View (Animated) |\r\n| 2 | 5.29ms | 23 | DraggablePlanCard |\r\n| 3 | **40.90ms** | **232** | DraggablePlanCard, TravelPlanKanban, FloatingPortalProvider |\r\n| 4~8 | 0.65~1.48ms | 2 | View (애니메이션 프레임) |\r\n| 9 | **44.93ms** | **211** | TravelPlanKanban |\r\n| 10 | 39.77ms | 209 | DraggablePlanCard × 4, TravelPlanKanban |\r\n| 11 | 38.89ms | 209 | DraggablePlanCard × 2, TravelPlanKanban |\r\n| 12 | 35.16ms | 212 | FloatingPortalProvider |\r\n| **합계** | **총 12 커밋** | **최대 232개** | |\r\n\r\n**개선 후 (`성능개선후(2).json`)**\r\n\r\n| 커밋 | Duration | 리렌더 컴포넌트 수 | 변화 |\r\n|------|----------|-----------------|------|\r\n| 1 | 1.61ms | 2 | — |\r\n| 2 | 5.42ms | 23 | — |\r\n| 3 | 46.10ms | 232 | — |\r\n| 4~5 | 0.65~1.24ms | 2~4 | — |\r\n| 6 | 45.06ms | 211 | — |\r\n| 7 | 31.28ms | 209 | — |\r\n| 8 | 36.74ms | 212 | — |\r\n| **합계** | **총 8 커밋** | **최대 232개** | **커밋 수 12 → 8** |\r\n\r\n### 분석\r\n\r\n| 항목 | 개선 전 | 개선 후 |\r\n|------|--------|---------|\r\n| 총 커밋 수 | **12회** | **8회** |\r\n| 최대 duration | 44.93ms | 46.10ms |\r\n| 평균 duration | 17.63ms | 21.01ms |\r\n| 최대 리렌더 컴포넌트 수 | 232개 | 232개 |\r\n\r\n**커밋 수는 4개 줄었지만, duration과 리렌더 컴포넌트 수는 거의 그대로입니다.**\r\n\r\n---\r\n\r\n## 왜 duration이 줄지 않았나?\r\n\r\n줄어든 4개의 커밋은 개선 전 **4~8번 커밋** (0.65~1.48ms짜리들)입니다.\r\n\r\n```\r\n개선 전\r\n커밋 4 | 0.65ms | View (애니메이션 프레임)  ─┐\r\n커밋 5 | 1.03ms | View (애니메이션 프레임)   │  useNativeDriver: false일 때\r\n커밋 6 | 0.97ms | View (애니메이션 프레임)   │  JS 스레드에서 실행 → DevTools에 기록됨\r\n커밋 7 | 1.07ms | View (애니메이션 프레임)  ─┘\r\n\r\n개선 후 → 이 커밋들이 사라짐\r\n→ useNativeDriver: true로 전환 → Native 스레드에서 실행\r\n→ JS DevTools 프로파일러에 기록되지 않음  ✅\r\n```\r\n\r\n`useNativeDriver: true`로 바꾼 효과가 바로 여기 나타납니다. 애니메이션 커밋들이 프로파일러에서 보이지 않는 것은, **Native 스레드로 넘어가서 JS 스레드와 무관하게 실행되기 때문**입니다.\r\n\r\n반면 큰 커밋들 (30~46ms, 200개 이상 리렌더)은 여전히 남아있습니다. 이건 **props drilling과 React.memo 부재**로 인한 전체 트리 리렌더링이 원인이고, 이번 개선으로는 해결되지 않습니다.\r\n\r\n---\r\n\r\n## 정리\r\n\r\n이번에 적용한 개선들의 실제 효과를 정리하면:\r\n\r\n| 개선 항목 | 실제 효과 | 한계 |\r\n|-----------|----------|------|\r\n| `useNativeDriver: true` | 애니메이션 커밋 4개 → Native 스레드로 이동, JS 스레드 부하 감소 | 큰 리렌더링 커밋은 그대로 |\r\n| `useMemo` PanResponder | 렌더마다 PanResponder 재생성 없음, `isPanEnabled` 버그 해결 | 리렌더링 횟수 자체는 변화 없음 |\r\n| `callbacksRef` 패턴 | 클로저 문제 없이 항상 최신 값 참조 | — |\r\n\r\n드래그 중 JS 스레드는 가벼워졌고, 애니메이션은 더 부드러워졌습니다. 하지만 **큰 리렌더링 커밋 (30~46ms, 200개 이상)은 여전히 남아** 있습니다.\r\n\r\n---\r\n\r\n## 배운 것\r\n\r\n### 1. useMemo와 클로저는 같이 생각해야 한다\r\n\r\n`useMemo`로 값비싼 객체를 한 번만 만드는 것은 좋지만, 내부에서 외부 변수를 참조한다면 클로저 문제가 생깁니다. `callbacksRef` 패턴은 이 둘을 동시에 해결합니다.\r\n\r\n```tsx\r\n// 핵심 패턴 요약\r\nconst latestRef = useRef(value);\r\nlatestRef.current = value;  // 렌더마다 동기화\r\n\r\nconst memoized = useMemo(() =\u003e {\r\n  // latestRef.current으로 항상 최신 값 참조\r\n}, []);\r\n```\r\n\r\n### 2. 프로파일러에서 \"사라진 커밋\"의 의미\r\n\r\n`useNativeDriver: true` 후 애니메이션 커밋이 프로파일러에서 보이지 않는 것은 버그가 아니라 **성공**입니다. Native 스레드에서 실행되므로 JS 프로파일러에 기록되지 않습니다.\r\n\r\n### 3. 즉각적인 개선과 구조적 개선을 구분할 것\r\n\r\n이번 개선들은 코드 몇 줄로 적용 가능하지만, 큰 리렌더링 문제는 구조를 바꿔야 합니다. 효과의 크기도 다릅니다 — **측정 결과가 그것을 증명**합니다.\r\n\r\n---\r\n\r\n## 다음 글 예고\r\n\r\n이번 개선으로 애니메이션 품질은 개선됐지만, **30~46ms짜리 전체 트리 리렌더링**은 여전히 남아있습니다.\r\n\r\n다음 글에서는 `draggingItem` 상태를 **Zustand store로 분리**하고, `React.memo`와 세밀한 selector로 리렌더링을 최소화합니다. 실제로 이 개선을 적용한 후 평균 커밋 duration이 **17.63ms → 6.63ms**로 떨어지는 것을 확인했습니다.\r\n\r\n---\r\n\r\n## 참고 자료\r\n\r\n- [React Native Animated - useNativeDriver](https://reactnative.dev/docs/animated#using-the-native-driver)\r\n- [PanResponder API](https://reactnative.dev/docs/panresponder)\r\n- [useRef로 최신 값 참조하기](https://react.dev/learn/referencing-values-with-refs)\r\n"},{"slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 성능 최적화 (1) - 문제 인식과 측정","title":"React Native 칸반보드 드래그 앤 드롭 성능 최적화 (1) - 문제 인식과 측정","date":"2026-02-22T22:00:00.000Z","image":"index.png","summary":"칸반보드 드래그 앤 드롭에서 드래그 중에 불필요한 리렌더링 및 버벅임이 발생하는 문제를 수치로 측정하고 원인을 분석합니다.","tags":["react native","드래그 앤 드롭","성능 최적화","리렌더링","칸반보드","PanResponder","props drilling"],"content":"\r\n\r\n# React Native 칸반보드 드래그 앤 드롭 성능 최적화 (1) - 문제 인식과 측정\r\n\r\n\u003e 이 시리즈는 React Native에서 직접 구현한 칸반보드 드래그 앤 드롭의 성능을 측정하고 개선하는 과정을 다룹니다.\r\n\r\n\r\n---\r\n\r\n## 배경\r\n\r\n여행 일정 플래닝 앱 **Fly:On**을 개발하면서, 사용자가 여행 일정을 Day별로 드래그해서 순서를 바꿀 수 있는 칸반보드를 구현했습니다.\r\n\r\nReact Native에는 다중 리스트 간 드래그 앤 드롭을 지원하는 라이브러리가 없어서, **PanResponder를 사용해 직접 구현**했습니다.\r\n\r\n기능은 동작했지만, 성능에 관해 아직 부족한 이슈가 많았기에 이번부터는 이 기능의 성능을 개선하는 과정을 다루려고 합니다.\r\n\r\n\r\n---\r\n\r\n## 문제 인식: 코드 리뷰\r\n\r\n구현을 마치고 코드를 다시 살펴보니, 몇 가지 문제점이 보였습니다.\r\n\r\n### 1. Props Drilling이 4단계\r\n\r\n```\r\nTravelKanban\r\n    ↓ onDragStart, onDragMove, onDragEnd, draggingItem...\r\nDayColumn\r\n    ↓ onDragStart, onDragMove, onDragEnd, draggingItem...\r\nDayContent\r\n    ↓ onDragStart, onDragMove, onDragEnd, draggingItem...\r\nPlanList\r\n    ↓ onDragStart, onDragMove, onDragEnd...\r\nDraggablePlanCard\r\n```\r\n\r\n`draggingItem` 상태가 최상위에서 최하위까지 4단계를 거쳐 전달됩니다. 이 경우 상태가 바뀔 때마다 **중간의 모든 컴포넌트가 리렌더링**될 것입니다.\r\n\r\n### 2. useNativeDriver: false\r\n\r\n```tsx\r\n// useDragDrop.ts\r\nAnimated.timing(floatingPortal.floatingOpacity, {\r\n  toValue: 0.9,\r\n  duration: 150,\r\n  useNativeDriver: false,  // 🔴 JS 스레드에서 애니메이션 실행\r\n}).start();\r\n```\r\n\r\n`useNativeDriver: false`는 애니메이션이 JS 스레드에서 실행된다는 의미입니다. 드래그 중에 다른 JS 작업이 있으면 **애니메이션이 버벅일 수 있습니다**.\r\n\r\n### 3. PanResponder가 매 렌더링마다 재생성\r\n\r\n```tsx\r\n// DraggablePlanCard.tsx\r\nconst DraggablePlanCard = ({ ... }) =\u003e {\r\n  const panResponder = PanResponder.create({  // 🔴 useMemo 없음\r\n    onStartShouldSetPanResponder: () =\u003e isPanEnabled,\r\n    ...\r\n  });\r\n  ...\r\n}\r\n```\r\n\r\n`PanResponder.create()`가 컴포넌트 내부에서 호출되면, **렌더링될 때마다 새 객체가 생성**되는 문제가 발생합니다.\r\n\r\n---\r\n\r\n## 측정 방법: 렌더링 카운터\r\n\r\n문제가 있다고 \"느낌\"만으로 판단하면 안 됩니다. **수치로 측정**해야 합니다.\r\n\r\n각 컴포넌트에 렌더링 횟수를 출력하는 커스텀 훅을 추가했습니다.\r\n\r\n```tsx\r\n// 🔍 성능 측정용 커스텀 훅\r\nconst useRenderCount = (componentName: string) =\u003e {\r\n  const renderCount = useRef(0);\r\n  renderCount.current += 1;\r\n  console.log(`🔄 [${componentName}] 렌더링 횟수: ${renderCount.current}`);\r\n};\r\n\r\n// 사용 예시\r\nconst TravelPlanKanban = () =\u003e {\r\n  useRenderCount('TravelPlanKanban');\r\n  // ...\r\n}\r\n```\r\n\r\n측정 대상 컴포넌트:\r\n- `TravelPlanKanban` (최상위)\r\n- `DayColumn` (Day별 컬럼)\r\n- `DayContent` (컬럼 내용)\r\n- `PlanList` (카드 리스트)\r\n- `DraggablePlanCard` (개별 카드)\r\n\r\n---\r\n\r\n## 측정 결과: 개선 전\r\n\r\n### 테스트 환경\r\n- Day 컬럼: **4개** (Day1 ~ Day4)\r\n- 카드: **총 8개** (Day1에 3개, Day2에 2개, Day3에 1개, Day4에 1개, 이동 후 +1개)\r\n- 테스트: 카드 1개를 드래그 + 자동 스크롤 1회\r\n\r\n### 콘솔 로그 (실제 측정)\r\n\r\n```\r\n// ===== 초기 렌더링 =====\r\n🔄 [TravelPlanKanban] 렌더링 횟수: 1\r\n🔄 [TravelPlanKanban] 렌더링 횟수: 2\r\n🔄 [DayColumn-day1] 렌더링 횟수: 1\r\n🔄 [DayContent-day1] 렌더링 횟수: 1\r\n🔄 [PlanList-day1] 렌더링 횟수: 1\r\n🔄 [Card-day1-0] 렌더링 횟수: 1\r\n🔄 [Card-day1-1] 렌더링 횟수: 1\r\n🔄 [Card-day1-2] 렌더링 횟수: 1\r\n🔄 [DayColumn-day2] 렌더링 횟수: 1\r\n🔄 [DayContent-day2] 렌더링 횟수: 1\r\n🔄 [PlanList-day2] 렌더링 횟수: 1\r\n🔄 [Card-day2-0] 렌더링 횟수: 1\r\n🔄 [Card-day2-1] 렌더링 횟수: 1\r\n🔄 [DayColumn-day3] 렌더링 횟수: 1\r\n🔄 [DayContent-day3] 렌더링 횟수: 1\r\n🔄 [PlanList-day3] 렌더링 횟수: 1\r\n🔄 [Card-day3-0] 렌더링 횟수: 1\r\n🔄 [DayColumn-day4] 렌더링 횟수: 1\r\n🔄 [DayContent-day4] 렌더링 횟수: 1\r\n🔄 [PlanList-day4] 렌더링 횟수: 1\r\n🔄 [Card-day4-0] 렌더링 횟수: 1\r\n\r\n// ===== 드래그 시작 (1차 전체 리렌더링) =====\r\n🔄 [TravelPlanKanban] 렌더링 횟수: 3\r\n🔄 [DayColumn-day1] 렌더링 횟수: 2\r\n🔄 [DayContent-day1] 렌더링 횟수: 2\r\n🔄 [PlanList-day1] 렌더링 횟수: 2\r\n🔄 [Card-day1-0] 렌더링 횟수: 2\r\n🔄 [Card-day1-1] 렌더링 횟수: 2\r\n🔄 [Card-day1-2] 렌더링 횟수: 2\r\n🔄 [DayColumn-day2] 렌더링 횟수: 2\r\n... (모든 컴포넌트 리렌더링)\r\n\r\n// ===== 드래그 중 (2~6차 전체 리렌더링) =====\r\n... (계속 전체 트리 리렌더링 반복)\r\n\r\n// ===== 최종 상태 =====\r\n🔄 [TravelPlanKanban] 렌더링 횟수: 9\r\n🔄 [DayColumn-day1] 렌더링 횟수: 8\r\n🔄 [DayContent-day1] 렌더링 횟수: 8\r\n🔄 [PlanList-day1] 렌더링 횟수: 8\r\n🔄 [Card-day1-0] 렌더링 횟수: 8\r\n🔄 [Card-day1-1] 렌더링 횟수: 8\r\n🔄 [DayColumn-day2] 렌더링 횟수: 8\r\n🔄 [DayContent-day2] 렌더링 횟수: 8\r\n🔄 [PlanList-day2] 렌더링 횟수: 8\r\n🔄 [Card-day2-0] 렌더링 횟수: 8\r\n🔄 [Card-day2-1] 렌더링 횟수: 8\r\n🔄 [Card-day2-2] 렌더링 횟수: 3  // 새로 이동된 카드\r\n🔄 [DayColumn-day3] 렌더링 횟수: 8\r\n🔄 [DayContent-day3] 렌더링 횟수: 8\r\n🔄 [PlanList-day3] 렌더링 횟수: 8\r\n🔄 [Card-day3-0] 렌더링 횟수: 8\r\n🔄 [DayColumn-day4] 렌더링 횟수: 8\r\n🔄 [DayContent-day4] 렌더링 횟수: 8\r\n🔄 [PlanList-day4] 렌더링 횟수: 8\r\n🔄 [Card-day4-0] 렌더링 횟수: 8\r\n```\r\n\r\n### 분석 결과\r\n\r\n| 컴포넌트 유형 | 개수 | 렌더링 횟수 | 드래그로 인한 렌더링 |\r\n|-------------|------|------------|-------------------|\r\n| TravelPlanKanban | 1개 | 9회 | 7회 |\r\n| DayColumn | 4개 | 각 8회 | 각 7회 |\r\n| DayContent | 4개 | 각 8회 | 각 7회 |\r\n| PlanList | 4개 | 각 8회 | 각 7회 |\r\n| Card | 8개 | 대부분 8회 | 대부분 7회 |\r\n\r\n### 총 렌더링 횟수 계산\r\n\r\n```\r\n드래그 1회 (자동 스크롤 포함)에 발생한 리렌더링:\r\n\r\nTravelPlanKanban: 7회\r\nDayColumn: 4개 × 7회 = 28회\r\nDayContent: 4개 × 7회 = 28회\r\nPlanList: 4개 × 7회 = 28회\r\nCard: 8개 × 7회 = 56회\r\n────────────────────────────\r\n총 약 147회의 컴포넌트 렌더링!\r\n```\r\n\r\n**드래그 1회에 147번의 리렌더링이 발생했습니다.**\r\n\r\n실제로 필요한 리렌더링은:\r\n- 드래그 시작: 드래그 중인 카드 1개\r\n- 드래그 종료: 이동된 카드 + 영향받는 Day 2개\r\n\r\n즉, **약 5~10회면 충분**한데 **147회**가 발생하고 있습니다.\r\n\r\n---\r\n\r\n## 문제 시각화\r\n\r\n```\r\n드래그 시작\r\n    │\r\n    ▼\r\nsetDraggingItem({ item, sourceDay, sourceIndex })\r\n    │\r\n    ▼\r\nTravelPlanKanban 리렌더링 (state 변경)\r\n    │\r\n    ├─▶ DayColumn-day1 리렌더링 (props 변경)\r\n    │       └─▶ DayContent-day1 리렌더링\r\n    │               └─▶ PlanList-day1 리렌더링\r\n    │                       ├─▶ Card-day1-0 리렌더링  ← 드래그 중인 카드\r\n    │                       ├─▶ Card-day1-1 리렌더링  ← 관련 없음!\r\n    │                       └─▶ Card-day1-2 리렌더링  ← 관련 없음!\r\n    │\r\n    ├─▶ DayColumn-day2 리렌더링  ← 관련 없음!\r\n    │       └─▶ ... (전체 하위 트리 리렌더링)\r\n    │\r\n    ├─▶ DayColumn-day3 리렌더링  ← 관련 없음!\r\n    │       └─▶ ...\r\n    │\r\n    └─▶ DayColumn-day4 리렌더링  ← 관련 없음!\r\n            └─▶ ...\r\n```\r\n\r\n**문제의 핵심:**\r\n1. `draggingItem` 상태가 최상위에서 관리됨\r\n2. 이 상태가 바뀌면 전체 트리가 리렌더링됨\r\n3. `React.memo`가 없어서 props가 같아도 리렌더링됨\r\n4. 이 과정이 드래그 중에 **7번** 반복됨\r\n\r\n---\r\n\r\n## React DevTools Profiler 결과\r\n\r\nReact DevTools로 측정한 결과, 개별 커밋(렌더링)의 소요 시간:\r\n\r\n| 커밋 | Duration | 트리거 |\r\n|------|----------|--------|\r\n| 1차 | 1.36ms | Animated.View |\r\n| 2차 | 5.29ms | DraggablePlanCard |\r\n| 3차 | **40.90ms** | 전체 리렌더링 |\r\n| 4차~ | 8~40ms | 반복 리렌더링 |\r\n\r\n**40ms**는 60fps 기준 **2.5프레임**에 해당합니다. 드래그 중에 이런 렌더링이 반복되면 **버벅임이 발생**할 수 있습니다.\r\n\r\n---\r\n\r\n## 개선 목표\r\n\r\n| 항목 | 개선 전 | 목표 |\r\n|------|--------|------|\r\n| 드래그 1회 리렌더링 | **147회** | **10회 이하** |\r\n| 단일 커밋 Duration | **40ms** | **16ms 이하** (60fps) |\r\n| 애니메이션 | JS 스레드 | **Native 스레드** |\r\n| PanResponder 생성 | 매 렌더링 | **1회 (useMemo)** |\r\n\r\n---\r\n\r\n## 개선 계획\r\n\r\n### 1순위: 즉시 효과가 있는 것\r\n1. `useNativeDriver: true` 전환 - 애니메이션을 Native 스레드로\r\n2. `PanResponder` useMemo 적용 - 불필요한 객체 생성 방지\r\n3. `useEffect` 의존성 배열 수정 - 버그 수정\r\n\r\n### 2순위: 구조적 개선\r\n4. Context API로 props drilling 해결 - 중간 컴포넌트 리렌더링 방지\r\n5. `React.memo` 적용 - 불필요한 리렌더링 차단\r\n\r\n---\r\n\r\n## 배운 점\r\n\r\n1. **\"동작한다\" ≠ \"잘 동작한다\"**\r\n   - 기능이 동작하는 것과 성능이 좋은 것은 다릅니다.\r\n\r\n2. **측정 없이 최적화하지 말 것**\r\n   - \"느낌\"이 아닌 \"수치\"로 판단해야 합니다.\r\n   - 개선 전 수치가 있어야 개선 효과를 증명할 수 있습니다.\r\n\r\n3. **Props Drilling은 성능 문제를 일으킬 수 있다**\r\n   - 단순히 \"코드가 지저분하다\"가 아니라 실제 성능에 영향을 줍니다.\r\n\r\n---\r\n\r\n## 참고 자료\r\n\r\n- [React Native Performance Overview](https://reactnative.dev/docs/performance)\r\n- [Animated API - useNativeDriver](https://reactnative.dev/docs/animated#using-the-native-driver)\r\n- [React DevTools Profiler](https://react.dev/learn/react-developer-tools)\r\n\r\n---"},{"slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 구현기_4","title":"React Native 칸반보드 드래그 앤 드롭 구현기 (4)","date":"2026-02-08T22:00:00.000Z","image":"index.png","summary":"드래그 중 화면 경계에서 자동으로 스크롤되는 기능을 requestAnimationFrame 기반으로 구현합니다.","tags":["react native","드래그 앤 드롭","자동 스크롤","requestAnimationFrame","칸반보드"],"content":"\r\n# React Native 칸반보드 드래그 앤 드롭 구현기(4)\r\n\r\n## 서론\r\n\r\n3편에서는 Portal 패턴으로 Floating Card를 최상위에 렌더링하여 드래그 앤 드롭의 시각적 완성도를 높이는 방법을 다뤘다.\r\n\r\n이번 편에서는 드래그 앤 드롭의 **사용성**을 크게 좌우하는 기능을 다룬다:\r\n\r\n- **자동 스크롤** - 화면 경계에서 자동으로 스크롤되게 하기\r\n\r\n---\r\n\r\n## 왜 자동 스크롤이 필요한가?\r\n\r\n칸반보드에 Day가 많아지면 세로 스크롤이 생긴다. 이때 문제가 하나 생기는데:\r\n\r\n\u003e 카드를 드래그해서 Day 3에서 Day 7로 옮기고 싶은데... 화면에 Day 7이 안 보인다?\r\n\r\n손가락을 떼면 드래그가 끝나버리니, 드래그를 유지하면서 스크롤할 방법이 없다.\r\n\r\n```\r\n┌──────────────────────────────┐\r\n│  Day 1                       │\r\n│  ┌──────┐                    │\r\n│  │Card A│ ← 이걸 드래그 중    │\r\n│  └──────┘                    │\r\n│  Day 2                       │\r\n│  ┌──────┐                    │\r\n│  │Card B│                    │\r\n│  └──────┘                    │\r\n│  Day 3                       │\r\n│  ┌──────┐                    │  ← 화면 하단 경계\r\n├──│Card C│────────────────────┤\r\n│  └──────┘                    │\r\n│  Day 4  (화면 밖)             │  ← 여기로 옮기고 싶은데\r\n│  Day 5  (화면 밖)             │    스크롤이 안 된다!\r\n│  ...                         │\r\n└──────────────────────────────┘\r\n```\r\n\r\n**해결책:** 드래그 중 손가락이 화면 경계 근처에 오면 자동으로 스크롤해주면 된다!\r\n\r\n---\r\n\r\n## 자동 스크롤의 핵심 개념: 스크롤 존\r\n\r\n화면의 위아래에 **스크롤 존(Scroll Zone)**이라는 가상의 영역을 만든다. 드래그 중 손가락이 이 영역에 들어오면 자동 스크롤을 시작하고, 벗어나면 멈춘다.\r\n\r\n```\r\n┌──────────────────────────────┐\r\n│ ▒▒▒▒▒▒ 상단 스크롤 존 ▒▒▒▒▒▒ │ ← threshold (40px)\r\n│  ↑ 여기로 오면 위로 스크롤    │\r\n├──────────────────────────────┤\r\n│                              │\r\n│                              │\r\n│     일반 영역                 │ ← 스크롤 안 함\r\n│     (드래그만 처리)            │\r\n│                              │\r\n│                              │\r\n├──────────────────────────────┤\r\n│  ↓ 여기로 오면 아래로 스크롤   │\r\n│ ▒▒▒▒▒▒ 하단 스크롤 존 ▒▒▒▒▒▒ │ ← threshold (40px)\r\n└──────────────────────────────┘\r\n```\r\n\r\n이 개념을 코드로 구현한 것이 `useAutoScroll` 훅이다.\r\n\r\n---\r\n\r\n## useAutoScroll 훅 구현\r\n\r\n### 설정값과 상태\r\n\r\n```tsx\r\ninterface UseAutoScrollOptions {\r\n  scrollSpeed?: number;  // 한 프레임당 스크롤할 픽셀 수\r\n  threshold?: number;    // 스크롤 존의 크기 (px)\r\n}\r\n\r\nexport const useAutoScroll = (options: UseAutoScrollOptions = {}) =\u003e {\r\n  const { scrollSpeed = 15, threshold = 40 } = options;\r\n\r\n  const scrollViewRef = useRef\u003cScrollView\u003e(null);\r\n  const scrollOffsetRef = useRef(0);              // 현재 스크롤 위치\r\n  const isAutoScrollingRef = useRef(false);        // 자동 스크롤 중인지\r\n  const autoScrollDirectionRef = useRef\u003c'up' | 'down' | null\u003e(null);\r\n  const autoScrollFrameId = useRef\u003cnumber | null\u003e(null);  // rAF ID (정리용)\r\n\r\n  // ...\r\n};\r\n```\r\n\r\n두 가지 설정값이 있다:\r\n- **scrollSpeed (기본값: 15)** - 프레임당 스크롤할 픽셀 수. 값이 클수록 빠르게 스크롤된다.\r\n- **threshold (기본값: 40)** - 스크롤 존의 크기(px). 화면 위/아래에서 이 범위 안에 손가락이 들어오면 스크롤이 시작된다.\r\n\r\n모든 상태를 `useRef`로 관리하는 이유가 있다. `useState`를 쓰면 매 프레임마다 리렌더링이 발생하는데, 자동 스크롤은 requestAnimationFrame으로 **매 프레임**(약 16ms 간격)마다 실행되기 때문에 리렌더링이 발생하면 성능이 급격히 떨어진다.\r\n\r\n### 스크롤 오프셋 추적\r\n\r\n자동 스크롤을 구현하려면 먼저 **현재 스크롤 위치**를 항상 알고 있어야 한다.\r\n\r\n```tsx\r\nconst handleScroll = useCallback((event: ScrollEvent) =\u003e {\r\n  scrollOffsetRef.current = event.nativeEvent.contentOffset.y;\r\n}, []);\r\n```\r\n\r\nScrollView의 `onScroll` 이벤트에 연결해서, 스크롤이 발생할 때마다 현재 오프셋을 ref에 저장한다. 이 값은 자동 스크롤 시 \"어디서부터 스크롤할지\"의 기준점이 된다.\r\n\r\n```tsx\r\n// TravelKanban/index.tsx\r\n\u003cScrollView\r\n  ref={scrollViewRef}\r\n  onScroll={handleScroll}\r\n  scrollEventThrottle={16}  // 16ms 간격으로 이벤트 발생 (60fps)\r\n\u003e\r\n```\r\n\r\n`scrollEventThrottle={16}`을 설정해야 스크롤 이벤트가 충분히 자주 발생한다. 이걸 빠뜨리면 스크롤 위치가 부정확해져서 자동 스크롤이 뚝뚝 끊기게 된다.\r\n\r\n---\r\n\r\n### 자동 스크롤 시작: requestAnimationFrame 루프\r\n\r\n자동 스크롤의 핵심은 **requestAnimationFrame(rAF) 루프**다.\r\n\r\n```tsx\r\nconst startAutoScroll = useCallback((direction: 'up' | 'down') =\u003e {\r\n  // 이미 같은 방향으로 스크롤 중이면 무시\r\n  if (isAutoScrollingRef.current \u0026\u0026 autoScrollDirectionRef.current === direction) {\r\n    return;\r\n  }\r\n\r\n  // 기존 스크롤 중지 후 새로 시작\r\n  stopAutoScroll();\r\n  isAutoScrollingRef.current = true;\r\n  autoScrollDirectionRef.current = direction;\r\n\r\n  const scroll = () =\u003e {\r\n    // 스크롤이 중지되었으면 루프 탈출\r\n    if (!isAutoScrollingRef.current) return;\r\n\r\n    const currentOffset = scrollOffsetRef.current;\r\n    const newOffset = direction === 'up'\r\n      ? Math.max(0, currentOffset - scrollSpeed)   // 위로: 오프셋 감소\r\n      : currentOffset + scrollSpeed;                // 아래로: 오프셋 증가\r\n\r\n    // 맨 위에 도달하면 스크롤 중지\r\n    if (direction === 'up' \u0026\u0026 newOffset \u003c= 0) {\r\n      stopAutoScroll();\r\n      return;\r\n    }\r\n\r\n    // 실제 스크롤 실행\r\n    if (scrollViewRef.current) {\r\n      scrollViewRef.current.scrollTo({\r\n        y: newOffset,\r\n        animated: false  // ⚠️ 중요: false여야 즉시 이동\r\n      });\r\n    }\r\n\r\n    // 다음 프레임에서 다시 실행\r\n    autoScrollFrameId.current = requestAnimationFrame(scroll);\r\n  };\r\n\r\n  // 루프 시작\r\n  autoScrollFrameId.current = requestAnimationFrame(scroll);\r\n}, [scrollSpeed, stopAutoScroll]);\r\n```\r\n\r\n#### 왜 requestAnimationFrame인가?\r\n\r\n자동 스크롤을 구현하는 방법은 여러 가지가 있다:\r\n\r\n| 방법 | 장점 | 단점 |\r\n|:------|:------|:------|\r\n| `setInterval` | 구현 간단 | 프레임과 무관하게 실행, 끊김 발생 |\r\n| `Animated.timing` | Native Driver 사용 가능 | 스크롤 위치를 직접 제어하기 어려움 |\r\n| `requestAnimationFrame` | 화면 주사율에 맞춰 실행, 부드러움 | 직접 루프를 관리해야 함 |\r\n\r\n**requestAnimationFrame(rAF)**은 브라우저/런타임이 다음 화면을 그리기 직전에 콜백을 실행한다. 즉, 화면 주사율(보통 60fps)에 정확히 맞춰서 스크롤이 실행되므로 가장 부드러운 결과를 얻을 수 있다.\r\n\r\n#### animated: false가 중요한 이유\r\n\r\n```tsx\r\nscrollViewRef.current.scrollTo({\r\n  y: newOffset,\r\n  animated: false  // 이거!\r\n});\r\n```\r\n\r\n`animated: true`로 하면 ScrollView가 자체적으로 스크롤 애니메이션을 실행하는데, 이게 rAF 루프와 겹치면 **서로 간섭**하면서 스크롤이 덜덜 떨리게 된다. `animated: false`로 즉시 이동시키고, rAF 루프가 부드러움을 담당하는 게 올바른 역할 분배다.\r\n\r\n#### 재귀적 rAF 루프 구조\r\n\r\n```\r\nFrame 1: scroll() 실행 → scrollTo() → rAF(scroll) 예약\r\nFrame 2: scroll() 실행 → scrollTo() → rAF(scroll) 예약\r\nFrame 3: scroll() 실행 → scrollTo() → rAF(scroll) 예약\r\n  ...\r\nFrame N: scroll() 실행 → isAutoScrolling이 false → 루프 종료\r\n```\r\n\r\n`scroll` 함수가 자기 자신을 다음 프레임에 예약하는 **재귀적 패턴**이다. 멈출 때는 `isAutoScrollingRef.current`를 `false`로 바꾸면 다음 프레임에서 자연스럽게 루프가 끊긴다.\r\n\r\n---\r\n\r\n### 자동 스크롤 중지\r\n\r\n```tsx\r\nconst stopAutoScroll = useCallback(() =\u003e {\r\n  if (autoScrollFrameId.current) {\r\n    cancelAnimationFrame(autoScrollFrameId.current);\r\n    autoScrollFrameId.current = null;\r\n  }\r\n  isAutoScrollingRef.current = false;\r\n  autoScrollDirectionRef.current = null;\r\n}, []);\r\n```\r\n\r\n중지는 두 가지를 동시에 한다:\r\n1. **cancelAnimationFrame** - 다음 프레임에 예약된 콜백을 취소\r\n2. **ref 초기화** - 재귀 루프 내부에서도 체크하므로 확실하게 중지됨\r\n\r\n왜 두 가지를 모두 해야 할까? `cancelAnimationFrame`만 하면 이미 실행 중인 `scroll()` 함수가 끝나기 전에 새 rAF를 예약할 수 있다. ref도 함께 초기화해야 `scroll()` 내부의 `if (!isAutoScrollingRef.current) return;` 체크에서 확실히 멈춘다.\r\n\r\n---\r\n\r\n### 드래그 위치에 따른 스크롤 판단\r\n\r\n이제 핵심 로직이다. 드래그 중 손가락 위치를 받아서 **스크롤 존에 있는지 판단**하는 함수:\r\n\r\n```tsx\r\nconst handleAutoScrollForDrag = useCallback((\r\n  cursorY: number,                   // 손가락의 화면 Y 좌표\r\n  scrollViewLayout: ScrollViewLayout  // ScrollView의 위치/크기\r\n) =\u003e {\r\n  const scrollViewTop = scrollViewLayout.y;\r\n  const scrollViewBottom = scrollViewLayout.y + scrollViewLayout.height;\r\n\r\n  // 상단 스크롤 존에 있는가?\r\n  const isInTopScrollZone = cursorY \u003c= scrollViewTop + threshold;\r\n  // 하단 스크롤 존에 있는가?\r\n  const isInBottomScrollZone = cursorY \u003e= scrollViewBottom - threshold;\r\n\r\n  if (isInTopScrollZone \u0026\u0026 scrollOffsetRef.current \u003e 0) {\r\n    // 상단 스크롤 존 + 아직 위로 스크롤할 여유가 있으면\r\n    if (!isAutoScrollingRef.current || autoScrollDirectionRef.current !== 'up') {\r\n      startAutoScroll('up');\r\n    }\r\n  } else if (isInBottomScrollZone) {\r\n    // 하단 스크롤 존이면\r\n    if (!isAutoScrollingRef.current || autoScrollDirectionRef.current !== 'down') {\r\n      startAutoScroll('down');\r\n    }\r\n  } else {\r\n    // 스크롤 존 밖이면 → 중지\r\n    if (isAutoScrollingRef.current) {\r\n      stopAutoScroll();\r\n    }\r\n  }\r\n}, [threshold, startAutoScroll, stopAutoScroll]);\r\n```\r\n\r\n시각적으로 표현하면:\r\n\r\n```\r\n                  scrollViewTop (= scrollViewLayout.y)\r\n                        │\r\n┌───────────────────────▼───────────────────────────┐\r\n│ ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ │\r\n│ ▒  상단 스크롤 존 (scrollViewTop + threshold)   ▒ │\r\n│ ▒  cursorY ≤ 여기면 → startAutoScroll('up')     ▒ │\r\n│ ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ │\r\n│                                                   │\r\n│              일반 영역                             │\r\n│              → stopAutoScroll()                   │\r\n│                                                   │\r\n│ ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ │\r\n│ ▒  하단 스크롤 존 (scrollViewBottom - threshold) ▒ │\r\n│ ▒  cursorY ≥ 여기면 → startAutoScroll('down')   ▒ │\r\n│ ▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒▒ │\r\n└───────────────────────▲───────────────────────────┘\r\n                        │\r\n                  scrollViewBottom\r\n```\r\n\r\n#### 중복 실행 방지\r\n\r\n```tsx\r\nif (!isAutoScrollingRef.current || autoScrollDirectionRef.current !== 'up') {\r\n  startAutoScroll('up');\r\n}\r\n```\r\n\r\n이 조건이 없으면 `handleAutoScrollForDrag`가 호출될 때마다 (매 프레임마다!) `startAutoScroll`이 호출되어 rAF 루프가 무한히 생성된다. **이미 같은 방향으로 스크롤 중이면 무시**하는 것이 핵심이다.\r\n\r\n---\r\n\r\n## 드래그 시스템과의 통합\r\n\r\n`useAutoScroll` 훅은 단독으로 동작하지 않는다. `TravelKanban/index.tsx`에서 드래그 이벤트와 연결된다.\r\n\r\n```tsx\r\n// TravelKanban/index.tsx\r\n\r\nconst handleEnhancedDragMove = useCallback((\r\n  x: number,\r\n  y: number,\r\n  gestureState: GestureState,\r\n  evt: GestureResponderEvent,\r\n  initialPosition: { x: number; y: number }\r\n) =\u003e {\r\n  // 1. 자동 스크롤 처리\r\n  if (scrollViewLayoutRef.current.height) {\r\n    handleAutoScrollForDrag(y, scrollViewLayoutRef.current);\r\n  }\r\n\r\n  // 2. 드래그 이동 처리 (Floating Card 위치 업데이트)\r\n  handleDragMove(x, y, gestureState, evt, initialPosition);\r\n}, [handleAutoScrollForDrag, handleDragMove]);\r\n```\r\n\r\n`handleEnhancedDragMove`가 **자동 스크롤**과 **Floating Card 이동**을 하나로 묶는 역할을 한다. `PanResponder`의 `onPanResponderMove`에서 매 프레임마다 호출되므로, 손가락이 움직일 때마다 스크롤 존 진입 여부를 자연스럽게 체크할 수 있다.\r\n\r\n### 전체 흐름\r\n\r\n```\r\n┌────────────────────────────────────────────────────────────────────┐\r\n│                    자동 스크롤 전체 흐름                              │\r\n├────────────────────────────────────────────────────────────────────┤\r\n│                                                                    │\r\n│   User: 카드를 드래그하면서 화면 하단으로 이동                        │\r\n│                                                                    │\r\n│   ① PanResponder.onMove                                           │\r\n│   │  └→ pageY = 750 (화면 하단 근처)                               │\r\n│   │                                                                │\r\n│   ② handleEnhancedDragMove(x, 750, ...)                           │\r\n│   │  ├→ handleAutoScrollForDrag(750, scrollViewLayout)             │\r\n│   │  │   └→ 750 \u003e= scrollViewBottom - 40?                         │\r\n│   │  │       └→ YES → startAutoScroll('down')                     │\r\n│   │  │                                                            │\r\n│   │  └→ handleDragMove(x, 750, ...)                               │\r\n│   │      └→ floatingPan.setValue({ x: dx, y: dy })                │\r\n│   │                                                                │\r\n│   ③ rAF 루프 시작                                                  │\r\n│   │  Frame 1: scrollTo({ y: offset + 15 }) → rAF(scroll)         │\r\n│   │  Frame 2: scrollTo({ y: offset + 30 }) → rAF(scroll)         │\r\n│   │  Frame 3: scrollTo({ y: offset + 45 }) → rAF(scroll)         │\r\n│   │  ...                                                           │\r\n│   │                                                                │\r\n│   ④ User: 손가락을 다시 화면 중앙으로 이동                            │\r\n│   │  └→ handleAutoScrollForDrag(400, scrollViewLayout)             │\r\n│   │      └→ 스크롤 존 밖 → stopAutoScroll()                       │\r\n│   │                                                                │\r\n│   ⑤ rAF 루프 종료                                                  │\r\n│      └→ cancelAnimationFrame + ref 초기화                          │\r\n│                                                                    │\r\n└────────────────────────────────────────────────────────────────────┘\r\n```\r\n\r\n### 드래그 종료 시 자동 스크롤 정리\r\n\r\n한 가지 더 중요한 포인트가 있다. 드래그가 끝나면 자동 스크롤도 반드시 중지해야 한다.\r\n\r\n```tsx\r\n// useDragDrop.ts - handleDragEnd 내부\r\nconst handleDragEnd = useCallback((y, dayData, setDayData) =\u003e {\r\n  stopAutoScroll();  // ← 드래그 종료 시 가장 먼저!\r\n  // ... 드롭 처리 ...\r\n}, [/* deps */]);\r\n```\r\n\r\n이걸 빠뜨리면? 손가락을 떼도 스크롤이 계속 돌아간다...! rAF 루프는 PanResponder와 독립적으로 동작하기 때문에, 명시적으로 멈춰줘야 한다.\r\n\r\n---\r\n\r\n## 구현하면서 만났던 함정들\r\n\r\n### 1. scrollEventThrottle 누락\r\n\r\n```tsx\r\n// ❌ scrollEventThrottle 없이\r\n\u003cScrollView onScroll={handleScroll}\u003e\r\n\r\n// ✅ scrollEventThrottle 설정\r\n\u003cScrollView onScroll={handleScroll} scrollEventThrottle={16}\u003e\r\n```\r\n\r\n`scrollEventThrottle`을 설정하지 않으면 iOS에서 스크롤 이벤트가 매우 드물게 발생한다. 자동 스크롤로 `scrollTo`를 호출해도 `onScroll` 이벤트가 충분히 빠르게 오지 않아서 `scrollOffsetRef`가 업데이트되지 않고, 다음 스크롤 계산이 틀어진다.\r\n\r\n### 2. animated: true로 인한 떨림\r\n\r\n처음에는 자연스럽게 보이라고 `animated: true`로 했었다.\r\n\r\n```tsx\r\n// ❌ rAF 루프 안에서 animated: true\r\nscrollViewRef.current.scrollTo({ y: newOffset, animated: true });\r\n```\r\n\r\n하지만 ScrollView의 내장 애니메이션과 rAF 루프가 경쟁하면서 스크롤이 앞뒤로 왔다 갔다 하는 진동 현상이 발생했다. 각자의 역할을 명확히 분리해야 한다:\r\n- **rAF 루프** → 매 프레임 새 위치 계산\r\n- **scrollTo** → 계산된 위치로 즉시 이동 (animated: false)\r\n\r\n### 3. 상태 관리를 useState로 했다가 성능 문제\r\n\r\n처음에는 `isAutoScrolling`을 `useState`로 관리했다.\r\n\r\n```tsx\r\n// ❌ 매 프레임마다 리렌더링 발생\r\nconst [isAutoScrolling, setIsAutoScrolling] = useState(false);\r\n```\r\n\r\nrAF 루프 안에서 state를 변경하면 매 프레임마다 리렌더링이 발생한다. 60fps에서 리렌더링이 겹치면 프레임 드롭이 발생하고, 드래그 중인 Floating Card의 움직임까지 버벅거리게 된다.\r\n\r\n```tsx\r\n// ✅ ref로 관리 → 리렌더링 없이 값만 업데이트\r\nconst isAutoScrollingRef = useRef(false);\r\n```\r\n\r\n자동 스크롤의 상태는 **화면에 직접 표시되는 값이 아니다.** 그래서 `useRef`로 관리하는 것이 정답이다.\r\n\r\n### 4. 방향 전환 시 이전 루프가 남아있는 문제\r\n\r\n```tsx\r\n// ❌ 방향 전환 시 이전 루프를 정리하지 않으면\r\nstartAutoScroll('down');\r\n// ... 손가락이 위로 이동 ...\r\nstartAutoScroll('up');\r\n// → 두 개의 rAF 루프가 동시에 실행!\r\n// → 아래로 15px, 위로 15px → 제자리에서 떨림\r\n```\r\n\r\n`startAutoScroll` 시작 시 `stopAutoScroll()`을 먼저 호출하는 이유가 바로 이것이다.\r\n\r\n```tsx\r\nconst startAutoScroll = useCallback((direction: 'up' | 'down') =\u003e {\r\n  // 이미 같은 방향이면 무시\r\n  if (isAutoScrollingRef.current \u0026\u0026 autoScrollDirectionRef.current === direction) {\r\n    return;\r\n  }\r\n\r\n  stopAutoScroll();  // ← 기존 루프 확실히 정리\r\n  // ... 새 루프 시작 ...\r\n}, [scrollSpeed, stopAutoScroll]);\r\n```\r\n\r\n## 마치며\r\n\r\n자동 스크롤은 구현 자체는 단순해 보이지만, 실제로 부드럽게 동작하게 만들려면 세심한 주의가 필요하다.\r\n\r\n핵심 포인트를 정리하면:\r\n\r\n- **스크롤 존**: 화면 경계에 가상의 영역을 만들어 스크롤 트리거로 사용\r\n- **requestAnimationFrame**: 화면 주사율에 맞춘 부드러운 스크롤 구현\r\n- **ref 기반 상태 관리**: 매 프레임 업데이트에도 리렌더링 없이 60fps 유지\r\n- **animated: false**: rAF 루프와 ScrollView 내장 애니메이션의 충돌 방지\r\n\r\n이번 편까지 해서 드래그 앤 드롭의 핵심 기능들을 모두 다뤘다:\r\n1. [1편] PanResponder와 절대 좌표 시스템\r\n2. [2편] 레이아웃 측정과 드롭 타겟 계산\r\n3. [3편] Portal 패턴의 Floating Card\r\n4. [4편] requestAnimationFrame 기반 자동 스크롤\r\n\r\n라이브러리 없이 직접 구현하면서 정말 많은 것을 배울 수 있었다. 특히 React Native에서 성능을 신경 쓰면서 인터랙션을 구현하는 방법에 대해 많이 깨달았던 것 같다.\r\n\r\n글을 읽어주셔서 감사합니다!\r\n"},{"slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 구현기_2","title":"React Native 칸반보드 드래그 앤 드롭 구현기 (2)","date":"2026-01-11T21:50:00.000Z","image":"index.png","summary":"드래그 앤 드롭의 핵심 훅 구조와 절대 좌표 기반 레이아웃 측정, 드롭 타겟 계산 로직을 구현합니다.","tags":["react native","드래그 앤 드롭","PanResponder","칸반보드","hooks"],"content":"\r\n# React Native 칸반보드 드래그 앤 드롭 구현기(2)\r\n\r\n## 서론\r\n1편에서는 왜 라이브러리 없이 직접 구현하게 되었는지, 그리고 PanResponder를 \"절대 좌표 전달 도구\"로 사용하기로 한 이유를 설명했다.\r\n\r\n이번 편에서는 실제 구현 코드를 살펴보자. 핵심은 **3개의 커스텀 훅**으로 역할을 분리한 것이다.\r\n\r\n## 훅 구조 설계\r\n\r\n드래그 앤 드롭 로직을 하나의 거대한 컴포넌트에 넣으면 금방 스파게티 코드가 된다. 그래서 관심사별로 훅을 분리했다.\r\n\r\n```\r\nTravelPlanKanban\r\n├── useAutoScroll      → 자동 스크롤\r\n├── useLayoutMeasurement → 레이아웃 측정 \u0026 드롭 타겟 계산\r\n└── useDragDrop        → 드래그 상태 관리 \u0026 데이터 업데이트\r\n```\r\n\r\n각 훅은 독립적으로 테스트할 수 있고, 필요한 곳에서만 조합해서 사용한다.\r\n\r\n```tsx\r\n// TravelKanban/index.tsx\r\nexport const TravelPlanKanban = () =\u003e {\r\n  // 1. 자동 스크롤\r\n  const {\r\n    scrollViewRef,\r\n    scrollOffsetRef,\r\n    handleScroll,\r\n    handleAutoScrollForDrag,\r\n    stopAutoScroll,\r\n  } = useAutoScroll({ scrollSpeed: 15, threshold: 40 });\r\n\r\n  // 2. 레이아웃 측정\r\n  const {\r\n    scrollViewLayout,\r\n    containerRef,\r\n    dayRefs,\r\n    measureScrollViewPosition,\r\n    measureDay,\r\n    measureCard,\r\n    remeasureDayLayouts,\r\n    getDropTarget,\r\n  } = useLayoutMeasurement(scrollOffsetRef);\r\n\r\n  // 3. 드래그 앤 드롭\r\n  const {\r\n    draggingItem,\r\n    handleDragStart,\r\n    handleDragMove,\r\n    handleDragEnd,\r\n  } = useDragDrop({\r\n    scrollOffsetRef,\r\n    measureScrollViewPosition,\r\n    remeasureDayLayouts,\r\n    getDropTarget,\r\n    stopAutoScroll,\r\n    FloatingPortalContext,\r\n  });\r\n\r\n  // ... 렌더링\r\n};\r\n```\r\n\r\n---\r\n\r\n## useLayoutMeasurement: 레이아웃 측정의 핵심\r\n\r\n1편에서 강조했듯이, 이 구현의 핵심은 **절대 좌표**다. 모든 요소의 위치를 화면 기준 절대 좌표로 측정해야 한다.\r\n\r\n### measureInWindow 사용하기\r\n\r\nReact Native에서 절대 좌표를 얻으려면 `measureInWindow`를 사용한다.\r\n\r\n```tsx\r\n// 일반적인 onLayout은 부모 기준 상대 좌표\r\n\u003cView onLayout={(e) =\u003e {\r\n  const { x, y } = e.nativeEvent.layout; // 부모 기준!\r\n}} /\u003e\r\n\r\n// measureInWindow는 화면 기준 절대 좌표\r\nviewRef.current.measureInWindow((x, y, width, height) =\u003e {\r\n  // x, y는 화면 좌상단 기준 절대 좌표\r\n});\r\n```\r\n\r\n### 측정해야 할 것들\r\n\r\n칸반보드에서는 3가지를 측정해야 한다:\r\n\r\n1. **ScrollView 영역** - 자동 스크롤 경계 판단용\r\n2. **각 Day 컬럼** - 어느 Day에 드롭할지 판단용\r\n3. **각 카드** - 몇 번째 위치에 드롭할지 판단용\r\n\r\n```tsx\r\nexport const useLayoutMeasurement = (\r\n  scrollOffsetRef: MutableRefObject\u003cnumber\u003e\r\n) =\u003e {\r\n  const [dayLayouts, setDayLayouts] = useState\u003cDayLayouts\u003e({});\r\n  const [cardLayouts, setCardLayouts] = useState\u003cCardLayouts\u003e({});\r\n  const dayRefs = useRef\u003c{ [key: string]: View }\u003e({});\r\n\r\n  // Day 컬럼 레이아웃 측정\r\n  const measureDay = useCallback((dayId: string, event: any) =\u003e {\r\n    const { x, y, width, height } = event.nativeEvent.layout;\r\n    setDayLayouts(prev =\u003e ({\r\n      ...prev,\r\n      [dayId]: { x, y, width, height, originalY: y }\r\n    }));\r\n  }, []);\r\n\r\n  // 카드 레이아웃 측정\r\n  const measureCard = useCallback((dayId: string, index: number, event: any) =\u003e {\r\n    const { x, y, width, height } = event.nativeEvent.layout;\r\n    setCardLayouts(prev =\u003e {\r\n      const dayCards = [...(prev[dayId] || [])];\r\n      dayCards[index] = { x, y, width, height, index };\r\n      return { ...prev, [dayId]: dayCards };\r\n    });\r\n  }, []);\r\n\r\n  // ...\r\n};\r\n```\r\n\r\n### 드래그 시작 시 재측정이 필요한 이유\r\n\r\n여기서 중요한 포인트가 있다. **드래그를 시작할 때 모든 Day의 레이아웃을 다시 측정해야 한다.**\r\n\r\n왜냐하면:\r\n- 사용자가 스크롤을 했을 수 있음\r\n- `onLayout`으로 저장한 값은 **콘텐츠 기준 상대 좌표**\r\n- 드롭 타겟 계산에는 **현재 화면 기준 절대 좌표**가 필요\r\n\r\n```tsx\r\nconst remeasureDayLayouts = useCallback(() =\u003e {\r\n  return new Promise\u003cvoid\u003e((resolve) =\u003e {\r\n    const dayIds = Object.keys(dayRefs.current);\r\n\r\n    // 빈 배열이면 바로 resolve (이거 빠뜨리면 Promise가 영원히 pending됨)\r\n    if (dayIds.length === 0) {\r\n      resolve();\r\n      return;\r\n    }\r\n\r\n    const currentScrollOffset = scrollOffsetRef.current;\r\n    let measured = 0;\r\n\r\n    dayIds.forEach((dayId) =\u003e {\r\n      const dayRef = dayRefs.current[dayId];\r\n      if (dayRef?.measureInWindow) {\r\n        dayRef.measureInWindow((x, y, width, height) =\u003e {\r\n          // 스크롤 오프셋을 더해서 콘텐츠 기준 좌표로 변환\r\n          const contentY = y + currentScrollOffset;\r\n          setDayLayouts(prev =\u003e ({\r\n            ...prev,\r\n            [dayId]: { x, y: contentY, width, height }\r\n          }));\r\n          measured++;\r\n          if (measured \u003e= dayIds.length) resolve();\r\n        });\r\n      }\r\n    });\r\n  });\r\n}, [scrollOffsetRef]);\r\n```\r\n\r\n---\r\n\r\n## 드롭 타겟 계산: getDropTarget\r\n\r\n레이아웃을 측정했으니, 이제 \"손가락이 어디에 있는지\"를 바탕으로 \"어디에 드롭해야 하는지\"를 계산할 수 있다.\r\n\r\n### 로직 설명\r\n\r\n1. 현재 터치 Y 좌표 + 스크롤 오프셋 = 콘텐츠 기준 Y 좌표\r\n2. 각 Day 컬럼을 순회하며 해당 Y가 어느 Day 범위에 있는지 확인\r\n3. 해당 Day의 카드들을 순회하며 몇 번째 위치에 넣을지 계산\r\n\r\n```tsx\r\nconst getDropTarget = useCallback((pageY: number): {\r\n  dayId: string;\r\n  insertIndex: number\r\n} | null =\u003e {\r\n  const currentScrollOffset = scrollOffsetRef.current;\r\n  const contentY = pageY + currentScrollOffset;\r\n\r\n  for (const dayId of Object.keys(dayLayouts)) {\r\n    const dayLayout = dayLayouts[dayId];\r\n    if (!dayLayout) continue;\r\n\r\n    const dayTop = dayLayout.y;\r\n    const dayBottom = dayLayout.y + dayLayout.height;\r\n\r\n    // 여유값 50px을 줘서 경계 근처에서도 인식되게\r\n    if (contentY \u003e= dayTop - 50 \u0026\u0026 contentY \u003c= dayBottom + 50) {\r\n      const cards = cardLayouts[dayId] || [];\r\n\r\n      // 빈 Day면 0번 인덱스\r\n      if (cards.length === 0) {\r\n        return { dayId, insertIndex: 0 };\r\n      }\r\n\r\n      // 각 카드의 중간점을 기준으로 삽입 위치 결정\r\n      for (let i = 0; i \u003c cards.length; i++) {\r\n        const card = cards[i];\r\n        const cardCenterY = dayLayout.y + card.y + card.height / 2;\r\n\r\n        if (contentY \u003c cardCenterY) {\r\n          return { dayId, insertIndex: i };\r\n        }\r\n      }\r\n\r\n      // 모든 카드보다 아래면 마지막에 삽입\r\n      return { dayId, insertIndex: cards.length };\r\n    }\r\n  }\r\n\r\n  return null;\r\n}, [dayLayouts, cardLayouts, scrollOffsetRef]);\r\n```\r\n\r\n### 왜 카드 중간점을 기준으로 할까?\r\n\r\n드래그 중인 카드가 다른 카드 위에 있을 때:\r\n- 중간점보다 **위**에 있으면 → 그 카드 **앞**에 삽입\r\n- 중간점보다 **아래**에 있으면 → 그 카드 **뒤**에 삽입\r\n\r\n이게 사용자 입장에서 가장 직관적이다.\r\n\r\n```\r\n┌─────────────┐\r\n│   Card 0    │  ← contentY가 여기면 insertIndex = 0\r\n├─────────────┤\r\n│   Card 1    │  ← contentY가 Card1 중간점 위면 insertIndex = 1\r\n│ ─ ─ 중간 ─ ─│\r\n│             │  ← contentY가 Card1 중간점 아래면 insertIndex = 2\r\n├─────────────┤\r\n│   Card 2    │\r\n└─────────────┘\r\n```\r\n\r\n---\r\n\r\n## useDragDrop: 드래그 상태 관리\r\n\r\n이제 실제 드래그 로직을 담당하는 훅을 살펴보자.\r\n\r\n### 드래그 시작\r\n\r\n```tsx\r\nconst handleDragStart = useCallback(async (\r\n  item: Plan,\r\n  dayId: string,\r\n  index: number,\r\n  cardLayout: { x: number; y: number; width: number; height: number },\r\n  initialPosition: { x: number; y: number }\r\n) =\u003e {\r\n  // 1. 드래그 중인 아이템 정보 저장\r\n  setDraggingItem({ item, sourceDay: dayId, sourceIndex: index });\r\n\r\n  // 2. 레이아웃 재측정 (스크롤 위치 반영)\r\n  measureScrollViewPosition();\r\n  await remeasureDayLayouts();\r\n\r\n  // 3. Floating Card 생성\r\n  if (!cardLayout.width || !cardLayout.height || !floatingPortal) return;\r\n\r\n  floatingPortal.createFloatingCard(\r\n    item, dayId, index, cardLayout, initialPosition, { dx: 0, dy: 0 }\r\n  );\r\n\r\n  // 4. 페이드인 애니메이션\r\n  Animated.timing(floatingPortal.floatingOpacity, {\r\n    toValue: 0.9,\r\n    duration: 150,\r\n    useNativeDriver: false,\r\n  }).start();\r\n}, [/* deps */]);\r\n```\r\n\r\n### 드래그 종료 \u0026 데이터 업데이트\r\n\r\n드롭 시 핵심 로직은 **같은 Day 내 이동**인지 **다른 Day로 이동**인지에 따라 다르다.\r\n\r\n```tsx\r\nconst handleDragEnd = useCallback((\r\n  y: number,\r\n  dayData: any,\r\n  setDayData: (updater: (prev: any) =\u003e any) =\u003e void\r\n) =\u003e {\r\n  // 1. 드래그 종료 시 자동 스크롤 중지\r\n  stopAutoScroll();\r\n\r\n  // 드래그 중인 아이템이 없으면 early return\r\n  if (!draggingItem) return;\r\n\r\n  // 2. 현재 손가락 위치(y)를 기반으로 드롭할 위치 계산\r\n  const dropTarget = getDropTarget(y);\r\n\r\n  if (dropTarget) {\r\n    const { dayId: targetDay, insertIndex } = dropTarget;\r\n    const { item, sourceDay, sourceIndex } = draggingItem;\r\n\r\n    if (targetDay === sourceDay) {\r\n      // ============================================\r\n      // Case 1: 같은 Day 내에서 순서 변경\r\n      // ============================================\r\n\r\n      // 위치가 실제로 변경되는 경우에만 업데이트\r\n      // - insertIndex === sourceIndex: 제자리\r\n      // - insertIndex === sourceIndex + 1: 바로 아래칸 (실질적으로 제자리)\r\n      if (insertIndex !== sourceIndex \u0026\u0026 insertIndex !== sourceIndex + 1) {\r\n        setDayData((prevData) =\u003e {\r\n          const newDayData = { ...prevData };\r\n          const plans = [...newDayData[sourceDay].plans];\r\n\r\n          // 원본 위치에서 아이템 제거\r\n          const [movedItem] = plans.splice(sourceIndex, 1);\r\n\r\n          // ⚠️ 인덱스 보정 (중요!)\r\n          // 아이템을 제거하면 뒤쪽 인덱스가 모두 1씩 줄어듦\r\n          // 예: [A,B,C,D]에서 B(1)를 제거 → [A,C,D]\r\n          //     원래 D 뒤(insertIndex=4)에 넣으려면 → 실제로는 3에 삽입\r\n          const finalIndex = insertIndex \u003e sourceIndex\r\n            ? insertIndex - 1\r\n            : insertIndex;\r\n\r\n          // 계산된 위치에 아이템 삽입\r\n          plans.splice(finalIndex, 0, movedItem);\r\n\r\n          newDayData[sourceDay].plans = plans;\r\n          return newDayData;\r\n        });\r\n      }\r\n    } else {\r\n      // ============================================\r\n      // Case 2: 다른 Day로 이동\r\n      // ============================================\r\n      setDayData((prevData) =\u003e {\r\n        const newDayData = { ...prevData };\r\n\r\n        // 원본 Day에서 아이템 제거\r\n        const [movedItem] = newDayData[sourceDay].plans.splice(sourceIndex, 1);\r\n\r\n        // 새 Day에 맞게 아이템 정보 업데이트\r\n        const newItem = {\r\n          ...movedItem,\r\n          day: targetDay,\r\n          // ⚠️ key 재생성 필수!\r\n          // React가 같은 key를 다른 리스트에서 발견하면\r\n          // 예기치 않은 렌더링 문제가 발생할 수 있음\r\n          key: `${targetDay}-${Date.now()}`\r\n        };\r\n\r\n        // 타겟 Day의 계산된 위치에 삽입\r\n        newDayData[targetDay].plans.splice(insertIndex, 0, newItem);\r\n\r\n        return newDayData;\r\n      });\r\n    }\r\n  }\r\n\r\n  // 3. Floating Card 정리 (페이드아웃 애니메이션 등)\r\n  // ...\r\n}, [/* deps */]);\r\n```\r\n\r\n### 인덱스 보정이 필요한 이유\r\n\r\n같은 Day 내에서 아이템을 이동할 때 주의할 점이 있다:\r\n\r\n```\r\nBefore: [A, B, C, D]\r\n        0  1  2  3\r\n\r\nB를 D 뒤로 옮기고 싶다면?\r\n→ insertIndex = 4 (D 다음)\r\n\r\n하지만 B를 먼저 제거하면:\r\n[A, C, D]\r\n 0  1  2\r\n\r\n이제 insertIndex = 4는 범위를 벗어난다!\r\n→ 실제로는 insertIndex - 1 = 3에 삽입해야 함\r\n```\r\n\r\n그래서 `insertIndex \u003e sourceIndex`일 때는 1을 빼줘야 한다.\r\n\r\n---\r\n\r\n## 다음 편에서\r\n\r\n지금까지 레이아웃 측정과 드롭 타겟 계산, 기본적인 드래그 상태 관리를 구현했다.\r\n\r\n다음 편에서는:\r\n- **Floating Card**: Portal 패턴으로 드래그 중인 카드를 최상위에 렌더링하기\r\n- **자동 스크롤**: 화면 경계에서 자동으로 스크롤되게 하기\r\n- **트러블슈팅**: 구현하면서 만났던 함정들\r\n\r\n을 다룰 예정이다.\r\n\r\n기대부탁 만반잘부!\r\n"},{"slug":"posts/React Native/React Native 칸반보드 드래그 앤 드롭 구현기_1","title":"React Native 칸반보드 드래그 앤 드롭 구현기 (1)","date":"2025-12-28T22:16:00.000Z","image":"index.png","summary":"React Native에서 칸반보드 형태의 Drag \u0026 Drop을 구현하며 PanResponder 기반 절대 좌표 시스템을 선택한 이유와 구현 과정을 공유합니다.","tags":["react native","드래그 앤 드롭","PanResponder","칸반보드","트러블슈팅"],"content":"\r\n# React Native 칸반보드 드래그 앤 드롭 구현기(1)\r\n\r\n## 서론\r\n안녕하십니까. 오랜만에 다시 글을 쓰게 되었다.\r\n여러 프로젝트와 취업준비로 인해 한동안 글을 쓰지 못했는데, (~~(사실 의지력 이슈로)~~) 지금부터라도! 다시 열심히 글을 쓰려고 한다!\r\n\r\n관광데이터 공모전에서 다시 expo기반의 React Native로 프로젝트를 진행했었는데, 여기서 구현한 다양한 기능들 중 여행 일정을 관리하기 위해 드래그 앤 드롭을 사용하여 각 Day의 일정들을 드래그 앤 드롭으로 편집할 수 있어야 했다. 백문이 불여일견이라고 실제 구현했던 부분을 보여주겠다.\r\n\r\n\u003cimg src=\"1.gif\" alt=\"드래그 앤 드롭 구현 화면\"/\u003e\r\n\r\n\r\n다음과 같이 같은 Day 내에서의 요소의 터치를 통한 이동, 리스트간에서도 요소를 이동할 수 있어야 했고, 요소가 특정 경계선으로 갈 경우 자동 스크롤도 되어야 했다.\r\n\r\n앞으로 이 기능을 구현할 때 필요했던 기술과 리스트 내에서 요소를 놓는 것을 구현했던 방법들을 보여줄 것이다.\r\n\r\n아직 취준생이라 많이 부족해보이겠지만 모쪼록 잘 부탁드립니다!!\r\n\r\n## 라이브러리 없이 Drag \u0026 Drop을 구현하기로 한 이유\r\n사실... 라이브러리로 구현하는게 분명히 더 쉽고, 정신건강(?)상도 좋았을 것이다. 하지만, 그럼에도 직접 구현을 선택했던 이유가 있다.\r\n\r\n우선, 기존에 나와있던 라이브러리를 살펴보자.\r\n(2025 8월~10월 기준으로 구현했을 때의 기준입니다.)\r\n\r\n\r\n\r\n## 필요 기술들\r\n###  react-beautiful-dnd\r\n가장 유명한 Drag \u0026 Drop 라이브러리는 `react-beautiful-dnd`였다.  \r\n웹 환경에서는 이미 검증된 라이브러리이고, 칸반보드 구현 사례도 풍부했다. 오 이걸로 하면 되겠군! \r\n\r\n하지만,\r\n\r\n-   **웹 전용 라이브러리**\r\n    \r\n-   React Native 환경에서는 사용 불가\r\n    \r\n\r\n아무리 구현 사례가 많아도, 이번 프로젝트에는 적용할 수 없는 선택지였다.\r\n\r\n----------\r\n\r\n###  react-native-draggable-flatlist\r\n\r\n다음으로 검토한 라이브러리는 제일 유명했던  `react-native-draggable-flatlist`였다.  \r\nReact Native 환경에서 Drag \u0026 Drop을 지원하는 대표적인 라이브러리다.\r\n\r\n단일 리스트 내에서 아이템 순서를 변경하는 용도로는 충분히 잘 동작했다.  \r\n하지만 실제 요구사항과 비교해보니 결정적인 차이가 있었다.\r\n\r\n-    **단일 리스트 기준 설계**\r\n    \r\n-   여러 컬럼(Day) 간 이동을 전제로 하지 않음\r\n    \r\n-   드래그 중 다른 리스트 위로 이동하는 시나리오가 구조적으로 맞지 않음\r\n    \r\n\r\n여러 개의 날짜 컬럼을 넘나드는 **칸반보드 형태의 Drag \u0026 Drop**을 구현하기에는  \r\n라이브러리의 기본 설계 자체가 맞지 않았다.\r\n\r\n무리하게 커스터마이징할 수도 있었겠지만,  \r\n그 경우 라이브러리 내부 구현에 강하게 의존하게 되고  \r\n유지보수 비용이 급격히 증가할 가능성이 높았다.\r\n\r\n그 외에도 Stack Overflow와 구글링을 통해 꾸준히 라이브러리를 찾아보았지만, 칸반보드 형태로 리스트 간 드래그 앤 드롭을 구현하는 최신 라이브러리가 없었고, 예제들 역시 매우 예전 것들 밖에 없었다.\r\n\r\n그래서 **직접 구현하자!** 라는 결론에 도달하게 되었다.\r\n\r\n## PanResponder를 선택한 이유\r\n\r\n라이브러리를 직접 구현하기로 결정한 뒤, 가장 먼저 고민한 건  \r\n**어떤 도구로 드래그 입력을 받을 것인가**였다.\r\n\r\nReact Native에서 제스처를 다루는 선택지는 몇 가지가 있지만,  \r\n이번 구현에서는 **PanResponder**를 기반으로 하기로 했다.\r\n\r\n### PanResponder란?\r\n\r\nPanResponder는 React Native에서 제공하는 기본 제스처 시스템이다.  \r\n터치 시작, 이동, 종료와 같은 이벤트를 세밀하게 제어할 수 있고,  \r\n외부 라이브러리 없이도 드래그 인터랙션을 구현할 수 있다.\r\n\r\n```js\r\nconst panResponder = PanResponder.create({\r\n  onStartShouldSetPanResponder: () =\u003e true,\r\n  onPanResponderMove: (evt, gestureState) =\u003e {\r\n    // 터치 이동 처리\r\n  },\r\n  onPanResponderRelease: () =\u003e {\r\n    // 터치 종료 처리\r\n  },\r\n});\r\n```\r\n\r\n사실 단순한 Drag \u0026 Drop이라면,  \r\n`gestureState.dx / dy` 값을 그대로 사용해서  \r\n카드를 움직이는 방식도 충분히 가능하다.\r\n\r\n하지만 이 프로젝트에서는 **그 방식이 맞지 않았다.**\r\n\r\n----------\r\n\r\n## PanResponder를 \"드래그 엔진\"으로 쓰지 않기로 한 이유\r\n칸반보드 형태의 Drag \u0026 Drop에서는\r\n다음과 같은 상황이 동시에 발생한다.\r\n\r\n- 여러 개의 세로 리스트\r\n- 각 리스트의 독립적인 스크롤\r\n- 드래그 중 다른 컬럼으로 이동\r\n- 화면 끝에서 자동 스크롤\r\n\r\n이 환경에서 PanResponder가 제공하는 gestureState.dx / dy 기반의 상대 좌표 시스템은 빠르게 한계를 드러냈다.\r\n상대 좌표의 문제점\r\n\r\n- dx/dy는 제스처 시작점 기준 누적 이동량이라 스크롤이 개입되면 기준점이 틀어진다\r\n- 컬럼이 여러 개일수록 각각의 레이아웃 좌표를 추적하기 복잡해진다\r\n- Portal로 렌더링된 Floating Card는 화면 최상위에 위치하므로 부모 컴포넌트 기준의 상대 좌표와 기준이 어긋난다\r\n\r\n결국 중요한 건\r\n\"제스처 시작점으로부터 얼마나 움직였는가\"가 아니라\r\n**지금 손가락이 화면의 어디에 있는가**였다.\r\n절대 좌표 기반 접근\r\n그래서 PanResponder의 `gestureState.dx/dy`를 버리고\r\n`evt.nativeEvent.pageX / pageY`로 화면 절대 좌표만을 사용했다.\r\n이 방식의 장점은 명확했다.\r\n\r\n- 스크롤 여부와 상관없이 항상 동일한 기준 (화면 좌상단 기준)\r\n- 여러 컬럼 간 이동에도 좌표가 일관됨\r\n- Portal에 렌더링된 Floating Card의 위치 계산과 자연스럽게 연결됨\r\n- 드롭 타겟 판별 시 모든 요소가 같은 좌표계를 공유\r\n\r\n즉, PanResponder는\r\n**상대 이동량을 계산하는 도구**가 아니라\r\n**현재 터치 위치를 전달하는 도구**가 되었다.\r\n**역할을 명확히 나누다**\r\n\r\n이 시점에서 Drag \u0026 Drop 구조는 이렇게 나뉘었다.\r\n\r\n- PanResponder\r\n\r\n  - 터치 시작 / 이동 / 종료 감지\r\n  - 현재 손가락의 절대 좌표(pageX/pageY) 전달\r\n\r\n\r\n- 드래그 로직\r\n  - 절대 좌표 기반 상대 이동량 계산\r\n  - 드롭 위치 판별 (어느 컬럼, 어느 인덱스)\r\n  - 컬럼 간 이동 계산\r\n  - 스크롤 오프셋 보정\r\n  - 데이터 업데이트\r\n\r\n\r\n- 시각적 표현\r\n\r\n  - Portal을 통한 Floating Card 렌더링\r\n  - 절대 좌표 기반 초기 위치 설정\r\n  - Animated.Value로 이동량 반영\r\n  - opacity, scale 등의 피드백 애니메이션\r\n\r\n\r\n\r\nPanResponder가 모든 걸 책임지지 않게 되자,\r\n구현은 오히려 단순해졌고\r\n각 로직을 독립적으로 테스트하고 개선할 수 있었다.\r\n\r\n## 이어서\r\n다음 편에서는 이를 이용한 구현코드들을 보여줄 예정이다. 기대 부탁~"}]},"__N_SSG":true},"page":"/posts/tag/[tag]","query":{"tag":"칸반보드"},"buildId":"sHwiCpr0I6yryhs4L_oOJ","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
